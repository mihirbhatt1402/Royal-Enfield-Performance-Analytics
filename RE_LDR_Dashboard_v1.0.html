      ce('p',{style:{fontSize:13,color:'#6b7280',margin:'0 0 4px',lineHeight:1.5}},user.email+' is pending role assignment.'),
      ce('p',{style:{fontSize:12,color:'#9ca3af',margin:'0 0 24px'}},'Contact mihir.bhatt@girnarsoft.com to request access.'),
      ce('button',{onClick:onSignOut,style:{padding:'9px 22px',borderRadius:8,border:'1px solid #d1d5db',background:'#fff',fontSize:13,cursor:'pointer',color:'#374151',fontWeight:600,fontFamily:'inherit'}},'Sign Out')
    )
  );
}

/* ── Presence strip (who's live) ─────────────────────────────────── */
function PresenceStrip({presence,fbUser,role,onSignOut,onAdminOpen}){
  var pArr=Object.values(presence||{});
  var others=pArr.filter(function(p){return p.uid!==fbUser.uid;});
  var selfPres=pArr.find(function(p){return p.uid===fbUser.uid;})||{name:fbUser.displayName,photo:fbUser.photoURL,email:fbUser.email,uid:fbUser.uid};
  var COLORS=['#2563eb','#16a34a','#d97706','#7c3aed','#db2777','#0891b2','#ea580c','#0d9488'];
  function colorFor(uid){return COLORS[((uid||'').charCodeAt(0)+((uid||'').charCodeAt(1)||0))%COLORS.length]||COLORS[0];}
  function initials(n){return((n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2)||'?').toUpperCase();}
  function Av(p,highlight){
    return ce('div',{key:p.uid,className:'avatar',style:{background:colorFor(p.uid),border:highlight?'2px solid #A8D5BA':'2px solid rgba(255,255,255,.4)'},title:p.name||p.email},
      ce('div',{className:'avatar-tip'},p.name||p.email),
      p.photo?ce('img',{src:p.photo,style:{width:'100%',height:'100%',borderRadius:'50%',objectFit:'cover'},alt:''}):initials(p.name||p.email)
    );
  }
  return ce('div',{className:'presence-strip'},
    others.length>0&&ce('div',{style:{display:'flex',alignItems:'center',gap:2,marginRight:4}},
      ce('span',{style:{fontSize:8,color:'rgba(255,255,255,.6)',textTransform:'uppercase',letterSpacing:'.07em',marginRight:4}},'Live:'),
      others.slice(0,6).map(function(p){return Av(p,false);}),
      others.length>6&&ce('div',{className:'avatar',style:{background:'rgba(255,255,255,.25)',fontSize:9,color:'#fff'}},'+' +(others.length-6))
    ),
    Av(selfPres,true),
    (role==='admin'||role==='full')&&ce('span',{className:'viewer-badge',style:{background:'rgba(255,255,255,.15)',color:'#D8EED8',borderRadius:20,padding:'2px 8px',fontSize:9,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginLeft:4}},role==='admin'?'Admin':'Full'),
    role==='viewer'&&ce('span',{className:'viewer-badge',style:{marginLeft:4}},'Viewer'),
    (role==='admin')&&ce('button',{
      style:{marginLeft:6,padding:'4px 10px',borderRadius:6,border:'1px solid rgba(255,255,255,.3)',background:'rgba(255,255,255,.12)',fontSize:11,cursor:'pointer',color:'#fff',fontWeight:600,fontFamily:'inherit',whiteSpace:'nowrap'},
      onClick:onAdminOpen
    },'⚙ Admin'),
    ce('button',{
      style:{marginLeft:4,padding:'4px 10px',borderRadius:6,border:'1px solid rgba(255,255,255,.3)',background:'rgba(255,255,255,.1)',fontSize:11,cursor:'pointer',color:'rgba(255,255,255,.85)',fontFamily:'inherit',whiteSpace:'nowrap'},
      onClick:onSignOut
    },'Sign Out')
  );
}

/* ── Admin panel — role management ─────────────────────────────── */
function AdminPanel({onClose}){
  var[users,setUsers]=useState([]);
  var[saving,setSaving]=useState(null);
  var[panelErr,setPanelErr]=useState('');
  useEffect(function(){
    var unsub=getFbDb().collection(USERS_COL).orderBy('createdAt','asc').onSnapshot(
      function(snap){setUsers(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}));},
      function(e){setPanelErr(e.message);}
    );
    return unsub;
  },[]);
  function changeRole(uid,newRole){
    setSaving(uid);
    getFbDb().collection(USERS_COL).doc(uid).update({role:newRole})
      .then(function(){setSaving(null);})
      .catch(function(e){setPanelErr(e.message);setSaving(null);});
  }
  var roleColor={admin:'#92400e',full:'#15803d',viewer:'#1d4ed8',pending:'#6b7280'};
  var roleBg={admin:'#fef3c7',full:'#dcfce7',viewer:'#dbeafe',pending:'#f3f4f6'};
  return ce('div',{className:'admin-panel-overlay',onClick:function(e){if(e.target===e.currentTarget)onClose();}},
    ce('div',{className:'admin-card'},
      ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}},
        ce('span',{style:{fontSize:15,fontWeight:700,color:'#111827'}},'👥 User Access Management'),
        ce('button',{style:{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#9ca3af',lineHeight:1},onClick:onClose},'×')
      ),
      ce('p',{style:{fontSize:11,color:'#6b7280',margin:'0 0 14px',lineHeight:1.7}},
        ce('strong',null,'pending'),' — awaiting access  ·  ',
        ce('strong',null,'viewer'),' — totals only (no source breakdown)  ·  ',
        ce('strong',null,'full'),' — all columns  ·  ',
        ce('strong',null,'admin'),' — full + manage users'
      ),
      panelErr&&ce('div',{style:{background:'#fef2f2',color:'#dc2626',padding:'8px 12px',borderRadius:8,fontSize:12,marginBottom:12}},panelErr),
      ce('div',{style:{overflowX:'auto'}},
        ce('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12,minWidth:480}},
          ce('thead',null,ce('tr',{style:{background:'#f0f7f4'}},
            ['Email','Name','Role','Change To'].map(function(h,i){
              return ce('th',{key:i,style:{padding:'8px 10px',textAlign:'left',fontWeight:700,color:'#1B4332',fontSize:11,borderBottom:'2px solid #A8D5BA'}},h);
            })
          )),
          ce('tbody',null,users.map(function(u){
            return ce('tr',{key:u.id,style:{borderBottom:'1px solid #F0F7F4'}},
              ce('td',{style:{padding:'7px 10px',color:'#6b7280',fontSize:11,maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},u.email),
              ce('td',{style:{padding:'7px 10px',color:'#374151',fontSize:11,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},u.displayName||'—'),
              ce('td',{style:{padding:'7px 10px'}},
                ce('span',{style:{padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:700,background:roleBg[u.role]||roleBg.pending,color:roleColor[u.role]||roleColor.pending}},u.role||'pending')
              ),
              ce('td',{style:{padding:'7px 10px'}},
                u.email===ADMIN_EMAIL
                  ?ce('span',{style:{fontSize:11,color:'#9ca3af'}},'—')
                  :saving===u.id
                    ?ce('span',{style:{fontSize:11,color:'#9ca3af'}},'Saving…')
                    :ce('select',{
                        value:u.role||'pending',
                        onChange:function(e){changeRole(u.id,e.target.value);},
                        style:{fontSize:11,padding:'3px 8px',borderRadius:6,border:'1px solid #d1d5db',cursor:'pointer',background:'#fff',fontFamily:'inherit'}
                      },
                      ['pending','viewer','full','admin'].map(function(r){
                        return ce('option',{key:r,value:r},r.charAt(0).toUpperCase()+r.slice(1));
                      })
                    )
              )
            );
          }))
        )
      )
    )
  );
}

/* ── AuthGate — wraps App, handles login / role / presence ──────── */
function AuthGate(){
  var[authState,setAuthState]=useState('loading');
  var[fbUser,setFbUser]=useState(null);
  var[role,setRole]=useState(null);
  var[presence,setPresence]=useState({});
  var[authErr,setAuthErr]=useState('');
  var[authLoading,setAuthLoading]=useState(false);
  var[showAdmin,setShowAdmin]=useState(false);
  var cleanups=React.useRef([]);

  useEffect(function(){
    var auth=getFbAuth();
    var unsubAuth=auth.onAuthStateChanged(function(user){
      cleanups.current.forEach(function(f){try{f();}catch(e){}});
      cleanups.current=[];
      if(!user){setAuthState('unauth');setFbUser(null);setRole(null);setPresence({});return;}
      if(!user.email||!user.email.endsWith(ALLOWED_DOMAIN)){
        setAuthErr('Only '+ALLOWED_DOMAIN+' accounts are allowed.');
        auth.signOut();return;
      }
      setFbUser(user);
      ensureUserDoc(user).catch(function(e){console.error('[Auth] ensureUserDoc:',e.message);});
      var presRef=setupPresence(user);
      cleanups.current.push(function(){try{presRef.remove();}catch(e){}});
      var unsubRole=getFbDb().collection(USERS_COL).doc(user.uid).onSnapshot(
        function(snap){
          var r=(snap.data()||{}).role||'pending';
          setRole(r);
          setAuthState(r==='pending'?'pending':'authed');
        },
        function(e){console.error('[Auth] role watch:',e.message);}
      );
      cleanups.current.push(unsubRole);
      var presListenRef=getFbRTDB().ref(PRESENCE_PATH);
      presListenRef.on('value',function(snap){setPresence(snap.val()||{});});
      cleanups.current.push(function(){presListenRef.off();});
    });
    return function(){unsubAuth();cleanups.current.forEach(function(f){try{f();}catch(e){}});};
  },[]);

  function handleLogin(){
    setAuthLoading(true);setAuthErr('');
    var provider=new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({hd:'girnarsoft.com',prompt:'select_account'});
    getFbAuth().signInWithPopup(provider)
      .catch(function(e){if(e.code!=='auth/popup-closed-by-user')setAuthErr(e.message);})
      .then(function(){setAuthLoading(false);},function(){setAuthLoading(false);});
  }

  function handleSignOut(){
    cleanups.current.forEach(function(f){try{f();}catch(e){}});
    getFbAuth().signOut();
  }

  if(authState==='loading')return ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#6b7280',fontSize:13,fontFamily:'DM Mono,monospace'}},'Authenticating…');
  if(authState==='unauth')return ce(LoginPage,{onLogin:handleLogin,loading:authLoading,error:authErr});
  if(authState==='pending')return ce(PendingPage,{user:fbUser,onSignOut:handleSignOut});

  return ce(React.Fragment,null,
    showAdmin&&ce(AdminPanel,{onClose:function(){setShowAdmin(false);}}),
    ce(App,{fbUser:fbUser,role:role,presence:presence,onSignOut:handleSignOut,onAdminOpen:function(){setShowAdmin(true);}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(ce(AuthGate,null));
</script>
