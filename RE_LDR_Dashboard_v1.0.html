<body>
<div id="root"></div>
<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════
   GOOGLE SHEETS SYNC CONFIG — Royal Enfield LDR Dashboard
   ═══════════════════════════════════════════════════════════════════ */
const SHEETS_CONFIG = Object.freeze({
  LDR_SHEET_URL:         "INJECT_SHEET_URL_HERE",
  AUTO_SYNC_ON_LOAD:     true,
  AUTO_SYNC_INTERVAL_MS: 0,
});

function sheetUrlToCsvUrl(url){
  const u=(url||'').trim();
  if(!u) throw new Error('Sheet URL is empty — paste it in the Sync panel.');
  const idM=u.match(/\/spreadsheets\/d\/([a-zA-Z0-9_\-]+)/);
  if(!idM) throw new Error('Not a valid Google Sheets URL.\nExpected: https://docs.google.com/spreadsheets/d/…');
  const id=idM[1];
  const gidM=u.match(/[#&?]gid=(\d+)/);
  const gid=gidM?gidM[1]:'0';
  return 'https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:csv&gid='+gid;
}

async function fetchSheetCsv(url){
  const csvUrl=sheetUrlToCsvUrl(url);
  let res;
  try{ res=await fetch(csvUrl,{cache:'no-store'}); }
  catch(e){ throw new Error('Network error — check internet connection. ('+e.message+')'); }
  if(!res.ok){
    if(res.status===401||res.status===403)
      throw new Error('Access denied.\nShare the sheet: File → Share → Anyone with the link → Viewer');
    if(res.status===404) throw new Error('Sheet not found. Double-check the URL.');
    throw new Error('Google Sheets fetch failed: HTTP '+res.status);
  }
  const text=await res.text();
  if(!text||text.trim().length<5) throw new Error('Sheet returned no data.');
  if(text.trim().startsWith('<')) throw new Error('Sheet returned HTML instead of CSV.\nShare it as "Anyone with the link → Viewer".');
  return text;
}

/* Dedicated single-pass CSV parser — gviz/tq output is well-formed CSV, so this
   avoids SheetJS's much heavier general-purpose type-inference parser, which was
   the main bottleneck on large sheets (tens of thousands of rows). */
function parseCsvToRows(csvText){
  let text=csvText;
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const rows=[];
  let row=[],field='',inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQuotes){
      if(c==='"'){
        if(text[i+1]==='"'){ field+='"'; i++; }
        else inQuotes=false;
      } else field+=c;
    } else if(c==='"'){ inQuotes=true; }
    else if(c===','){ row.push(field); field=''; }
    else if(c==='\r'){ /* skip — \n handles the line break */ }
    else if(c==='\n'){ row.push(field); field=''; rows.push(row); row=[]; }
    else field+=c;
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return[];
  const headers=rows[0];
  const out=[];
  for(let r=1;r<rows.length;r++){
    const rv=rows[r];
    if(rv.length===1&&rv[0]==='') continue;
    const obj={};
    for(let c=0;c<headers.length;c++) obj[headers[c]]=rv[c]!==undefined?rv[c]:'';
    out.push(obj);
  }
  return out;
}

const ce=React.createElement;
const {useState,useEffect,useMemo,useRef,useCallback,useTransition}=React;

/* ── Month helpers ────────────────────────────────────────────────── */
const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* year*12+monthIndex — a genuinely linear month count, not just a sortable encoding.
   aggRE/aggMulti subtract two monthOrder() values to get a month delta for the booking
   lookback window; with *100 instead of *12 that delta jumps by 89 across every Dec→Jan
   boundary (e.g. Jan'2027 - Dec'2026 = 202700-202611 = 89, not 1), silently dropping any
   booking attribution that spans a calendar year. *12 makes consecutive months always
   differ by exactly 1, year boundary or not. */
function monthOrder(m){
  if(!m||m==='-'||m==='') return 0;
  const match=m.match(/([A-Za-z]+)'(\d+)/);
  if(!match) return 0;
  const mi=MONTH_NAMES.indexOf(match[1]);
  return parseInt(match[2])*12+mi;
}

/* ── Parse raw rows into structured records ───────────────────────── */
/* Real CRM exports carry messy/inconsistent free-text values for State and Model —
   confirmed against the live sheet: "Jammu & Kashmir" vs "Jammu and Kashmir" and
   "Orissa" vs "Odisha" both appear as distinct literal values for the same state,
   fragmenting State × Source grid rows; "#N/A" and "\0" appear as literal State values
   instead of blank; "Royan Enfield Bullet 350" (typo, missing the "l") appears alongside
   "Royal Enfield Bullet 350" as a separate Model. Canonicalize at parse time so every
   tab groups these into one row instead of splitting the same real-world value in two. */
const STATE_GARBAGE=new Set(['#N/A','\\0','\0','N/A','NA']);
const STATE_FIX={'Jammu & Kashmir':'Jammu and Kashmir','Orissa':'Odisha'};
function canonicalState(s){
  const t=(s||'').trim();
  if(!t||STATE_GARBAGE.has(t)) return '';
  return STATE_FIX[t]||t;
}
const MODEL_FIX={'Royan Enfield Bullet 350':'Royal Enfield Bullet 350'};
function canonicalModel(s){
  const t=(s||'').trim();
  return MODEL_FIX[t]||t;
}

function parseRows(raw){
  if(!raw.length) return [];
  /* Build a normalized-column-name -> actual-key map ONCE, instead of
     re-normalizing every column name for every field on every row. */
  const keyMap={};
  Object.keys(raw[0]).forEach(rk=>{
    keyMap[rk.toLowerCase().replace(/\s+/g,' ').trim()]=rk;
  });
  return raw.map(function(r){
    function get(keys){
      for(const k of(Array.isArray(keys)?keys:[keys])){
        const kl=k.toLowerCase().replace(/\s+/g,' ').trim();
        const rk=keyMap[kl];
        if(rk!==undefined) return String(r[rk]||'').trim();
      }
      return '';
    }
    const lead_number   = get('Lead Number');
    const lt            = get('LT');
    const source        = get('Source');
    const primary_src   = get('Primary Source');
    const model         = get('Model');
    const city          = get('City');
    const state         = get('State');
    const dup           = get(['Duplicate Check','Duplicity Check']);
    const lead_month    = get('Lead Month');
    const booking_status= get('Booking Status');
    const booking_month = get('Booking Month');
    const isUnique      = dup.toLowerCase()==='unique';
    const bm            = (booking_month==='-'||booking_month==='')?'':booking_month;
    return{
      lead_number,
      lt:lt||'Unknown',
      source:source||'Unknown',
      primary_src:primary_src||'Unknown',
      model:canonicalModel(model)||'Unknown',
      city:city||'Unknown',
      state:canonicalState(state)||'Unknown',
      lead_month,
      booking_status,
      booking_month:bm,
      isUnique,
      isBooked:booking_status.toLowerCase()==='booked'
    };
  }).filter(r=>r.lead_number&&r.lead_month);
}

/* ── Core aggregate function ──────────────────────────────────────── */
/* rows   = already filtered by source / lt / primarySrc (NOT by lead_month)
   mf     = monthFilter string ('All' or e.g. "Mar'2026")
   Single pass over `rows` instead of one filter pass per distinct month — the old
   'All' branch was O(months × n), which dominated render time once grids started
   aggregating across many months (Geo wise Model, "All Months Summary" grids, etc). */
function aggRE(rows,mf){
  const isAll=mf==='All';
  let totalLeads=0;
  const uniqueSet=new Set();
  const bookingSet=new Set();

  if(isAll){
    const leadMonthsPresent=new Set();
    for(const r of rows){ if(r.lead_month) leadMonthsPresent.add(r.lead_month); }
    for(const r of rows){
      totalLeads++;
      if(r.isUnique) uniqueSet.add(r.lead_number);
      if(r.booking_month&&leadMonthsPresent.has(r.booking_month)){
        const diff=monthOrder(r.booking_month)-monthOrder(r.lead_month);
        if(diff>=0&&diff<=2) bookingSet.add(r.lead_number);
      }
    }
  } else {
    const mfOrder=monthOrder(mf);
    for(const r of rows){
      if(r.lead_month===mf){
        totalLeads++;
        if(r.isUnique) uniqueSet.add(r.lead_number);
      }
      /* Backward attribution: count bookings that happened IN mf from leads mf, mf-1, mf-2 */
      if(r.booking_month===mf){
        const diff=mfOrder-monthOrder(r.lead_month);
        if(diff>=0&&diff<=2) bookingSet.add(r.lead_number);
      }
    }
  }

  const uniqueLeads=uniqueSet.size;
  const dupLeads=totalLeads-uniqueLeads;
  const dupPct=totalLeads>0?(totalLeads-uniqueLeads)/totalLeads*100:0;
  const bookings=bookingSet.size;
  const e2bPct=uniqueLeads>0?(bookings/uniqueLeads*100):0;
  return{totalLeads,uniqueLeads,dupLeads,dupPct,bookings,e2bPct};
}

/* Aggregate across an arbitrary set of selected months (used by mini-charts) — single pass. */
function aggMulti(rows,months){
  if(!months||!months.length) return{totalLeads:0,uniqueLeads:0,dupLeads:0,dupPct:0,bookings:0,e2bPct:0};
  const monthSet=new Set(months);
  let totalLeads=0;
  const uniqueSet=new Set();
  const bookingSet=new Set();
  for(const r of rows){
    if(monthSet.has(r.lead_month)){
      totalLeads++;
      if(r.isUnique) uniqueSet.add(r.lead_number);
    }
    /* Backward attribution: bookings IN a month in monthSet, from leads within 0-2 months before */
    if(r.booking_month&&monthSet.has(r.booking_month)){
      const diff=monthOrder(r.booking_month)-monthOrder(r.lead_month);
      if(diff>=0&&diff<=2) bookingSet.add(r.lead_number);
    }
  }
  const uniqueLeads=uniqueSet.size;
  const dupLeads=totalLeads-uniqueLeads;
  const dupPct=totalLeads>0?(totalLeads-uniqueLeads)/totalLeads*100:0;
  const bookings=bookingSet.size;
  const e2bPct=uniqueLeads>0?(bookings/uniqueLeads*100):0;
  return{totalLeads,uniqueLeads,dupLeads,dupPct,bookings,e2bPct};
}

const EMPTY_AGG=Object.freeze({totalLeads:0,uniqueLeads:0,dupLeads:0,dupPct:0,bookings:0,e2bPct:0});

/* ── Excel export helpers ─────────────────────────────────────────── */
function exportXlsx(sheetMap,filename){
  if(!window.XLSX){alert('XLSX library not loaded');return;}
  const wb=window.XLSX.utils.book_new();
  for(const[name,aoa] of Object.entries(sheetMap)){
    const ws=window.XLSX.utils.aoa_to_sheet(aoa);
    /* auto column widths — scan all rows, set each col to max string length + 2 */
    const colWidths=[];
    for(const row of aoa) row.forEach((cell,ci)=>{const l=String(cell==null?'':cell).length;if(!colWidths[ci]||l>colWidths[ci])colWidths[ci]=l;});
    ws['!cols']=colWidths.map(w=>({wch:Math.min(w+2,40)}));
    window.XLSX.utils.book_append_sheet(wb,ws,String(name).slice(0,31));
  }
  window.XLSX.writeFile(wb,filename+'.xlsx');
}

/* Convert an aggGrouped() result into an array-of-arrays for one Excel sheet.
   Produces: [DimLabel] + Total cols + Paid cols + Organic+NonMS cols + per-source cols */
function aggToAoa(grouped,dimLabel){
  const{grand,grandPaid,grandOrg,grandSrc,dimAggs}=grouped;
  const srcs=Object.keys(grandSrc).sort();
  const hdr=[
    dimLabel,
    'Total Leads','Unique Leads','Bookings','E2B%','Dup Leads','Dup%',
    'Paid Unique','Paid Bookings','Paid E2B%',
    'Org+NonMS Unique','Org+NonMS Bookings','Org+NonMS E2B%',
    ...srcs.flatMap(s=>[s+' Unique',s+' Bookings',s+' E2B%']),
  ];
  function toRow(label,a,paid,org,srcMap){
    return[
      label,
      a.totalLeads,a.uniqueLeads,a.bookings,+a.e2bPct.toFixed(2),a.dupLeads,+a.dupPct.toFixed(2),
      paid.uniqueLeads,paid.bookings,+paid.e2bPct.toFixed(2),
      org.uniqueLeads,org.bookings,+org.e2bPct.toFixed(2),
      ...srcs.flatMap(s=>{const x=(srcMap&&srcMap[s])||EMPTY_AGG;return[x.uniqueLeads,x.bookings,+x.e2bPct.toFixed(2)];})
    ];
  }
  const aoa=[hdr,toRow('∑ Grand Total',grand,grandPaid,grandOrg,grandSrc)];
  for(const[dv,da] of Object.entries(dimAggs)){
    aoa.push(toRow(dv,da.total,da.paid||EMPTY_AGG,da.org||EMPTY_AGG,da.src));
  }
  return aoa;
}

function ExportBtn({onClick}){
  return ce('button',{onClick,title:'Export to Excel',
    style:{padding:'4px 14px',fontSize:10,fontFamily:'inherit',fontWeight:700,
      border:'1px solid #A8D5BA',borderRadius:20,background:'#fff',color:'#1B4332',
      cursor:'pointer',display:'inline-flex',alignItems:'center',gap:4,whiteSpace:'nowrap'}
  },'⬇ Export Excel');
}

/* Single-pass grouped aggregation — computes grand total + per-source + per-Paid/Organic-group +
   (if dimKey given) per-dimension-value + per-(dimension×source) stats all in ONE pass over `rows`.
   This replaces calling aggRE() once per (dim,source) combination, which was O(rows × dims × sources)
   and the dominant cost behind multi-second tab/filter renders once a real dataset (hundreds of
   thousands of rows, 30+ states) was loaded — that blew up to millions of redundant row scans per
   render. Here every row is visited exactly once; sorting/finalizing the resulting (small) group
   map afterward is essentially free by comparison. */
function aggGrouped(rows,mf,dimKey){
  const isAll=mf==='All';
  let leadMonthsPresent=null;
  if(isAll){
    leadMonthsPresent=new Set();
    for(const r of rows){ if(r.lead_month) leadMonthsPresent.add(r.lead_month); }
  }
  const mfOrder=isAll?0:monthOrder(mf);
  const PAID_MBRS=SRC_GROUPS[0].members,ORG_MBRS=SRC_GROUPS[1].members;

  function mk(){ return{totalLeads:0,uniqueSet:new Set(),bookingSet:new Set()}; }
  const total=mk(),paid=mk(),org=mk();
  const bySrc=new Map(),byDim=new Map(),byDimSrc=new Map(),byDimPaid=new Map(),byDimOrg=new Map();
  function acc(map,key){ let a=map.get(key); if(a===undefined){a=mk();map.set(key,a);} return a; }

  for(const r of rows){
    let countsLead,countsBooking;
    if(isAll){
      countsLead=true;
      if(r.booking_month&&leadMonthsPresent.has(r.booking_month)){
        const d=monthOrder(r.booking_month)-monthOrder(r.lead_month);
        countsBooking=d>=0&&d<=2;
      } else countsBooking=false;
    } else {
      countsLead=r.lead_month===mf;
      if(r.booking_month===mf){
        const d=mfOrder-monthOrder(r.lead_month);
        countsBooking=d>=0&&d<=2;
      } else countsBooking=false;
    }
    if(!countsLead&&!countsBooking) continue;
    const countsUnique=countsLead&&r.isUnique;
    const src=r.source;
    const inPaid=PAID_MBRS.includes(src),inOrg=ORG_MBRS.includes(src);
    const dv=dimKey?dimKey(r):null;

    const bump=a=>{
      if(countsLead){ a.totalLeads++; if(countsUnique) a.uniqueSet.add(r.lead_number); }
      if(countsBooking) a.bookingSet.add(r.lead_number);
    };
    bump(total);
    if(inPaid) bump(paid);
    if(inOrg) bump(org);
    bump(acc(bySrc,src));
    if(dv!=null){
      bump(acc(byDim,dv));
      bump(acc(byDimSrc,dv+''+src));
      if(inPaid) bump(acc(byDimPaid,dv));
      if(inOrg) bump(acc(byDimOrg,dv));
    }
  }

  function fin(a){
    const uniqueLeads=a.uniqueSet.size,dupLeads=a.totalLeads-uniqueLeads;
    const dupPct=a.totalLeads>0?dupLeads/a.totalLeads*100:0;
    const bookings=a.bookingSet.size;
    const e2bPct=uniqueLeads>0?bookings/uniqueLeads*100:0;
    return{totalLeads:a.totalLeads,uniqueLeads,dupLeads,dupPct,bookings,e2bPct};
  }

  const grandSrc={}; for(const[k,v] of bySrc) grandSrc[k]=fin(v);
  const dimAggs={};
  if(dimKey){
    for(const dv of byDim.keys()){
      const srcAgg={};
      for(const k of bySrc.keys()){
        const a=byDimSrc.get(dv+''+k);
        srcAgg[k]=a?fin(a):EMPTY_AGG;
      }
      dimAggs[dv]={
        total:fin(byDim.get(dv)),
        paid:byDimPaid.has(dv)?fin(byDimPaid.get(dv)):EMPTY_AGG,
        org:byDimOrg.has(dv)?fin(byDimOrg.get(dv)):EMPTY_AGG,
        src:srcAgg,
      };
    }
  }
  return{grand:fin(total),grandPaid:fin(paid),grandOrg:fin(org),grandSrc,dimAggs};
}

/* Same shape as aggGrouped(), but for EVERY lead month in `rows` at once — one single pass
   produces a Map<month, {grand,grandPaid,grandOrg,grandSrc,dimAggs}> instead of calling
   aggGrouped() once per month (which would re-scan the full row set per month just to find
   the handful of rows that belong to it). A row's lead-side counts land in its own
   lead_month's bucket; its booking-side count (if within the M-2 attribution window) lands
   in its own booking_month's bucket — independently, exactly like aggRE's per-month branch,
   just computed for every month in one traversal. This is what makes showing "by month"
   grids for every month (not just the latest) affordable on large datasets. */
function aggGroupedByMonth(rows,dimKey){
  const PAID_MBRS=SRC_GROUPS[0].members,ORG_MBRS=SRC_GROUPS[1].members;
  function mk(){ return{totalLeads:0,uniqueSet:new Set(),bookingSet:new Set()}; }
  function acc(map,key){ let a=map.get(key); if(a===undefined){a=mk();map.set(key,a);} return a; }
  function newBundle(){ return{total:mk(),paid:mk(),org:mk(),bySrc:new Map(),byDim:new Map(),byDimSrc:new Map(),byDimPaid:new Map(),byDimOrg:new Map()}; }

  const bundles=new Map();
  function getBundle(m){ let b=bundles.get(m); if(!b){b=newBundle();bundles.set(m,b);} return b; }

  for(const r of rows){
    const src=r.source;
    const inPaid=PAID_MBRS.includes(src),inOrg=ORG_MBRS.includes(src);
    const dv=dimKey?dimKey(r):null;

    if(r.lead_month){
      const b=getBundle(r.lead_month);
      const bumpLead=a=>{ a.totalLeads++; if(r.isUnique) a.uniqueSet.add(r.lead_number); };
      bumpLead(b.total);
      if(inPaid) bumpLead(b.paid);
      if(inOrg) bumpLead(b.org);
      bumpLead(acc(b.bySrc,src));
      if(dv!=null){
        bumpLead(acc(b.byDim,dv));
        bumpLead(acc(b.byDimSrc,dv+''+src));
        if(inPaid) bumpLead(acc(b.byDimPaid,dv));
        if(inOrg) bumpLead(acc(b.byDimOrg,dv));
      }
    }
    /* Backward attribution: booking credited to booking_month bucket; lead must be within 0-2 months before */
    if(r.booking_month&&r.lead_month){
      const diff=monthOrder(r.booking_month)-monthOrder(r.lead_month);
      if(diff>=0&&diff<=2){
        const b=getBundle(r.booking_month);
        const bumpBooking=a=>a.bookingSet.add(r.lead_number);
        bumpBooking(b.total);
        if(inPaid) bumpBooking(b.paid);
        if(inOrg) bumpBooking(b.org);
        bumpBooking(acc(b.bySrc,src));
        if(dv!=null){
          bumpBooking(acc(b.byDim,dv));
          bumpBooking(acc(b.byDimSrc,dv+''+src));
          if(inPaid) bumpBooking(acc(b.byDimPaid,dv));
          if(inOrg) bumpBooking(acc(b.byDimOrg,dv));
        }
      }
    }
  }

  function fin(a){
    const uniqueLeads=a.uniqueSet.size,dupLeads=a.totalLeads-uniqueLeads;
    const dupPct=a.totalLeads>0?dupLeads/a.totalLeads*100:0;
    const bookings=a.bookingSet.size;
    const e2bPct=uniqueLeads>0?bookings/uniqueLeads*100:0;
    return{totalLeads:a.totalLeads,uniqueLeads,dupLeads,dupPct,bookings,e2bPct};
  }

  const out=new Map();
  for(const[month,b] of bundles){
    const grandSrc={}; for(const[k,v] of b.bySrc) grandSrc[k]=fin(v);
    const dimAggs={};
    if(dimKey){
      for(const dv of b.byDim.keys()){
        const srcAgg={};
        for(const k of b.bySrc.keys()){
          const a=b.byDimSrc.get(dv+''+k);
          srcAgg[k]=a?fin(a):EMPTY_AGG;
        }
        dimAggs[dv]={
          total:fin(b.byDim.get(dv)),
          paid:b.byDimPaid.has(dv)?fin(b.byDimPaid.get(dv)):EMPTY_AGG,
          org:b.byDimOrg.has(dv)?fin(b.byDimOrg.get(dv)):EMPTY_AGG,
          src:srcAgg,
        };
      }
    }
    out.set(month,{grand:fin(b.total),grandPaid:fin(b.paid),grandOrg:fin(b.org),grandSrc,dimAggs});
  }
  return out;
}

function normState(s){
  let t=(s||'').toLowerCase().replace(/&/g,' and ').replace(/[^a-z]/g,'');
  const ALIAS={
    jammukashmir:'jammuandkashmir',
    /* Target corrected to 'andamanandnicobarisland' — that's what normState() actually
       produces for the real Vahan key "Andaman & Nicobar Island" (it keeps the "and"
       from the & replacement). The previous target 'andamannicobarisland' (no "and")
       didn't match that key under ANY input, so this state's Vahan column silently
       failed to resolve regardless of which alias fired. */
    andamanandnicobar:'andamanandnicobarisland',
    andamannicobarislands:'andamanandnicobarisland',
    andamanandnicobarislands:'andamanandnicobarisland',
    dadraandnagarhaveli:'utofdnhanddd',

    dadranagarhavelidamandiu:'utofdnhanddd',

    dnhdd:'utofdnhanddd',
    pondicherry:'puducherry',
    orissa:'odisha',
    nctofdelhi:'delhi',
  };
  return ALIAS[t]||t;
}

const VAHAN_RETAILS=Object.fromEntries(Object.entries(VAHAN_RAW).map(([m,obj])=>

));
/* monthOrMonths may be a single month string or an array — sums across all of them
   (used by grids that aggregate multiple months, e.g. Geo wise Model tab). */
function vahanRetailFor(state,monthOrMonths){
  const months=Array.isArray(monthOrMonths)?monthOrMonths:[monthOrMonths];
  let total=0,found=false;
  for(const M of months){
    const monthData=VAHAN_RETAILS[M];
    if(!monthData) continue;
    const v=monthData[normState(state)];
    if(v!=null){ total+=v; found=true; }
  }
  return found?total:undefined;
}
function vahanMonthTotal(monthOrMonths){
  const months=Array.isArray(monthOrMonths)?monthOrMonths:[monthOrMonths];
  let total=0;
  for(const M of months){
    const monthData=VAHAN_RETAILS[M];
    if(!monthData) continue;
    total+=Object.values(monthData).reduce((s,v)=>s+v,0);
  }
  return total;
}

/* ── Formatters & badges ──────────────────────────────────────────── */
function Nf(n){return n==null||isNaN(n)?'—':Number(n).toLocaleString('en-IN');}
function Pf(n,d=1){return(n==null||isNaN(n))?'—':n.toFixed(d)+'%';}

function e2bBadge(pct){
  if(isNaN(pct)||pct===0) return ce('span',{className:'badge-gray'},'—');
  const cls=pct>=5?'badge-green':pct>=2?'badge-amber':'badge-red';
  return ce('span',{className:'badge '+cls},pct.toFixed(1)+'%');
}
function dupBadge(pct){
  if(isNaN(pct)||pct===0) return ce('span',{className:'badge-gray'},'0%');
  const cls=pct>=30?'badge-red':pct>=15?'badge-amber':'badge-green';
  return ce('span',{className:'badge '+cls},pct.toFixed(1)+'%');
}

const OverviewTab=React.memo(function OverviewTab({rows,mf,viewerMode}){
  /* One single pass over `rows` (no dimKey) gives the grand total + per-source breakdown
     used by the KPI strip and Source Summary table below. */
  const grouped=useMemo(()=>aggGrouped(rows,mf,null),[rows,mf]);
  const m=grouped.grand;
  const chartRef=useRef(); const chartInst=useRef();

  /* Month-wise trend data */
  const trendData=useMemo(()=>{
    const months=[...new Set(rows.map(r=>r.lead_month))].filter(m=>m&&m!=='-').sort((a,b)=>monthOrder(a)-monthOrder(b));
    return months.map(M=>{
      const a=aggRE(rows,M);
      return{month:M,uniqueLeads:a.uniqueLeads,bookings:a.bookings,e2bPct:a.e2bPct};
    });
  },[rows]);

  /* Source breakdown — [source, agg] pairs straight from the single-pass grouped totals,
     sorted by the same month-filtered Unique Leads value the table actually displays. */
  const srcBreak=useMemo(()=>
    Object.entries(grouped.grandSrc).sort((a,b)=>b[1].uniqueLeads-a[1].uniqueLeads)
  ,[grouped]);

  /* Insights — three single passes (by LT, by Primary Source, by State), each crossed with
     Source via aggGrouped's built-in per-(dim×source) breakdown. Previously this nested
     rows.filter() by source, then again by lt/primary_src/state, then ran aggRE on each
     resulting slice — O(rows × sources × dims), which with 30+ real states and hundreds of
     thousands of rows was the single biggest contributor to Overview's render time. */
  const insights=useMemo(()=>{
    const srcs=Object.keys(grouped.grandSrc).sort();
    const byLT=aggGrouped(rows,mf,r=>r.lt);
    const byPrim=aggGrouped(rows,mf,r=>r.primary_src);
    const byState=aggGrouped(rows,mf,r=>r.state);

    const bySrc={};
    for(const s of srcs){
      const ltM=Object.keys(byLT.dimAggs).filter(Boolean)
        .map(lt=>({lt,m:byLT.dimAggs[lt].src[s]||EMPTY_AGG}))
        .filter(x=>x.m.uniqueLeads>=5).sort((a,b)=>a.m.e2bPct-b.m.e2bPct);
      const primM=Object.keys(byPrim.dimAggs).filter(Boolean)
        .map(p=>({prim:p,m:byPrim.dimAggs[p].src[s]||EMPTY_AGG}))
        .filter(x=>x.m.uniqueLeads>=5).sort((a,b)=>a.m.e2bPct-b.m.e2bPct);
      bySrc[s]={
        total:grouped.grandSrc[s]||EMPTY_AGG,
        worstLT:ltM[0]||null,
        bestLT:ltM[ltM.length-1]||null,
        worst5:primM.slice(0,5),
        best5:[...primM].reverse().slice(0,5),
      };
    }
    const srcSorted=srcs.map(s=>({src:s,...bySrc[s]}))
      .filter(x=>x.total.uniqueLeads>=10)
      .sort((a,b)=>a.total.e2bPct-b.total.e2bPct);
    const dupSorted=[...srcSorted].sort((a,b)=>b.total.dupPct-a.total.dupPct);

    /* Per-source worst/best 5 states by E2B% */
    const statesBySrc={};
    for(const s of srcs){
      const sm=Object.keys(byState.dimAggs).filter(Boolean)
        .map(st=>({state:st,m:byState.dimAggs[st].src[s]||EMPTY_AGG}))
        .filter(x=>x.m.uniqueLeads>=200).sort((a,b)=>a.m.e2bPct-b.m.e2bPct);
      statesBySrc[s]={worst5:sm.slice(0,5),best5:[...sm].reverse().slice(0,5)};
    }

    return{srcs,bySrc,srcSorted,statesBySrc,
      worstSrc:srcSorted[0]||null,
      bestSrc:srcSorted[srcSorted.length-1]||null,
      highDupSrc:dupSorted[0]||null};
  },[rows,mf,grouped]);

  /* Trend chart */
  useEffect(()=>{
    const canvas=chartRef.current;
    if(!canvas||!window.Chart) return;
    if(chartInst.current) try{chartInst.current.destroy();}catch(e){}
    chartInst.current=new Chart(canvas,{
      type:'bar',
      data:{
        labels:trendData.map(d=>d.month),
        datasets:[
          {label:'Unique Leads',data:trendData.map(d=>d.uniqueLeads),backgroundColor:'#2D6A4F55',borderColor:'#2D6A4F',borderWidth:1.5,borderRadius:3,yAxisID:'y'},
          {label:'Bookings',data:trendData.map(d=>d.bookings),backgroundColor:'#C9A22755',borderColor:'#C9A227',borderWidth:1.5,borderRadius:3,yAxisID:'y'},
          {label:'E2B%',data:trendData.map(d=>parseFloat(d.e2bPct.toFixed(2))),type:'line',borderColor:'#1B4332',backgroundColor:'transparent',borderWidth:2,pointRadius:5,pointBackgroundColor:'#1B4332',yAxisID:'y2',tension:.3},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{position:'top',labels:{boxWidth:10,boxHeight:10,font:{size:10,family:'DM Mono,monospace'},color:'#475569'}},
          tooltip:{backgroundColor:'rgba(8,28,21,.92)',titleColor:'#f0f7f4',bodyColor:'#A8D5BA',padding:10,cornerRadius:8},

          y:{grid:{color:'rgba(100,116,139,.1)'},ticks:{color:'#475569',font:{size:10}},position:'left',title:{display:true,text:'Leads',color:'#94a3b8',font:{size:9}},beginAtZero:true},
          y2:{position:'right',ticks:{color:'#2D6A4F',font:{size:10},callback:v=>v+'%'},grid:{display:false},title:{display:true,text:'E2B%',color:'#2D6A4F',font:{size:9}},beginAtZero:true}
        }
      }
    });
    return()=>{try{if(chartInst.current)chartInst.current.destroy();}catch(e){}};
  },[trendData]);

  const KPIs=[
    {label:'Total Leads',    value:Nf(m.totalLeads),   sub:'Including duplicates',           color:'#2D6A4F'},
    {label:'Unique Leads',   value:Nf(m.uniqueLeads),  sub:'Duplicates: '+Nf(m.dupLeads),   color:'#1B4332'},

    {label:'E2B %',          value:m.e2bPct.toFixed(1)+'%',sub:'Bookings ÷ Unique Leads',   color:'#166534'},
  ];

  return ce('div',{className:'fade-up'},
    /* KPI strip */
    ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:10,marginBottom:20}},
      KPIs.map((k,i)=>ce('div',{key:i,className:'kpi'},
        ce('div',{style:{position:'absolute',top:0,left:0,right:0,height:3,background:k.color,borderRadius:'12px 12px 0 0'}}),
        ce('div',{className:'kpi-label'},k.label),
        ce('div',{className:'kpi-value',style:{fontSize:k.value.length>7?16:20,color:k.color}},k.value),
        ce('div',{className:'kpi-sub'},k.sub)
      ))
    ),

    /* Trend chart */
    ce('div',{className:'card',style:{padding:'16px 18px',marginBottom:14}},
      ce('div',{className:'section-title'},'Month-wise Trend — Unique Leads, Bookings & E2B%'),
      ce('div',{style:{height:240,position:'relative'}},ce('canvas',{ref:chartRef}))
    ),

    /* Source summary table */
    ce('div',{className:'card',style:{padding:'16px 18px',marginBottom:14}},
      ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}},
        ce('div',{className:'section-title',style:{marginBottom:0}},'Source Summary'),
        ce(ExportBtn,{onClick:()=>{
          const trend=[['Month','Unique Leads','Bookings','E2B%'],...trendData.map(d=>[d.month,d.uniqueLeads,d.bookings,+d.e2bPct.toFixed(2)])];
          const src=[['Source','Total Leads','Unique Leads','Bookings','E2B%','Dup Leads','Dup%'],...srcBreak.map(([s,a])=>[s,a.totalLeads,a.uniqueLeads,a.bookings,+a.e2bPct.toFixed(2),a.dupLeads,+a.dupPct.toFixed(2)]),['∑ Grand Total',m.totalLeads,m.uniqueLeads,m.bookings,+m.e2bPct.toFixed(2),m.dupLeads,+m.dupPct.toFixed(2)]];
          exportXlsx({'Monthly Trend':trend,'Source Breakdown':src},'RE_LDR_Overview');
        }})

      ce('div',{className:'scroll-x'},
        ce('table',null,
          ce('thead',null,
            ce('tr',null,
              ce('th',{className:'left',style:{minWidth:140}},'Source'),
              ce('th',null,'Total Leads'),

    light:'#F3F4F6',text:'#374151',badge:'#F3F4F6'

const SRC_GROUPS=[
  {name:'Paid',    members:['MS FB','Adwords'],  clr:{bar:'#8B5CF6',light:'#EDE9FE',text:'#4C1D95'}},
  {name:'Organic', members:['Organic','Non MS'], clr:{bar:'#10B981',light:'#D1FAE5',text:'#064E3B'}},
];

/* ── Per-source mini chart ────────────────────────────────────────── */
const SourceMiniChart=React.memo(function SourceMiniChart({src,srcRows,months,colorCfg}){
  const chartRef=useRef(); const chartInst=useRef();

  /* Per-month data for this source (oldest → newest for chart x-axis) — respects the active month filter */
  const chartMonths=useMemo(()=>[...months].sort((a,b)=>monthOrder(a)-monthOrder(b)),[months]);
  const perMonth=useMemo(()=>chartMonths.map(M=>{
    const a=aggRE(srcRows,M);
    return{month:M,uniqueLeads:a.uniqueLeads,e2bPct:a.e2bPct};
  }),[srcRows,chartMonths]);

  const totals=useMemo(()=>aggMulti(srcRows,chartMonths),[srcRows,chartMonths]);

  useEffect(()=>{
    const canvas=chartRef.current;
    if(!canvas||!window.Chart) return;
    if(chartInst.current) try{chartInst.current.destroy();}catch(e){}
    chartInst.current=new Chart(canvas,{
      type:'bar',
      data:{
        labels:perMonth.map(d=>d.month),
        datasets:[
          {label:'Leads',data:perMonth.map(d=>d.uniqueLeads),
            backgroundColor:colorCfg.bar+'55',borderColor:colorCfg.bar,
            borderWidth:1.5,borderRadius:3,yAxisID:'y'},
          {label:'E2B%',data:perMonth.map(d=>parseFloat(d.e2bPct.toFixed(2))),
            type:'line',borderColor:colorCfg.line,backgroundColor:'transparent',
            borderWidth:2,pointRadius:4,pointBackgroundColor:colorCfg.line,
            yAxisID:'y2',tension:.3},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{position:'top',labels:{boxWidth:8,boxHeight:8,font:{size:9},color:'#6b7280'}},
          tooltip:{backgroundColor:'rgba(8,28,21,.92)',titleColor:'#f0f7f4',bodyColor:'#A8D5BA',padding:8,cornerRadius:6},
          datalabels:{display:false}
        },
        scales:{
          x:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:9}}},
          y:{grid:{color:'rgba(100,116,139,.07)'},ticks:{color:'#9ca3af',font:{size:9}},beginAtZero:true},
          y2:{position:'right',ticks:{color:colorCfg.line,font:{size:9},callback:v=>v+'%'},
            grid:{display:false},beginAtZero:true}
        }
      }
    });
    return()=>{try{if(chartInst.current)chartInst.current.destroy();}catch(e){}};
  },[perMonth,colorCfg]);

  return ce('div',{style:{background:'#fff',border:'1px solid #E5E7EB',borderRadius:12,padding:'14px 16px'}},
    ce('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}},
      ce('span',{style:{fontSize:13,fontWeight:700,color:'#111827'}},src),
      ce('div',{style:{textAlign:'right'}},
        ce('div',{style:{fontSize:24,fontWeight:900,color:colorCfg.line,fontFamily:'DM Mono,monospace',lineHeight:1}},
          totals.e2bPct.toFixed(2)+'%'),
        ce('div',{style:{fontSize:9,color:'#9ca3af',marginTop:2,fontFamily:'DM Mono,monospace'}},
          Nf(totals.uniqueLeads)+' leads')
      )
    ),
    ce('div',{style:{height:165,position:'relative'}},ce('canvas',{ref:chartRef}))
  );
});

/* ── Compact Matrix Grid (Source / LT / Model / State tabs) ─────────── */
function l2rColor(pct){
  if(!pct||pct<=0) return '#F3F4F6';
  if(pct>=5) return '#B7DDBE';
  if(pct>=2) return '#EBC98A';
  return '#E3B0B0';
}

const CompactMonthGrid=React.memo(function CompactMonthGrid({M,rows,rowKey,dimLabel,badgeLabel,vahanMonths,precomputed,viewerMode}){
  const vMonths=useMemo(()=>vahanMonths&&vahanMonths.length?vahanMonths:[M],[vahanMonths,M]);
  const [expanded,setExpanded]=useState(new Set());
  const toggleGrp=name=>setExpanded(p=>{const n=new Set(p);n.has(name)?n.delete(name):n.add(name);return n;});

  const [sort,setSort]=useState({colKey:'total',metric:'leads',dir:'desc'});
  function toggleSort(colKey,metric){
    setSort(p=>p.colKey===colKey&&p.metric===metric
      ?{colKey,metric,dir:p.dir==='desc'?'asc':'desc'}
      :{colKey,metric,dir:'desc'});
  }
  function metricVal(agg,grandLeads,metric){
    if(!agg) return 0;
    switch(metric){
      case 'leads': return agg.uniqueLeads||0;
      case 'retail': return agg.bookings||0;
      case 'contrib': return grandLeads>0&&agg.uniqueLeads>0?(agg.uniqueLeads/grandLeads*100):0;
      case 'l2r': return agg.uniqueLeads>0?agg.e2bPct:0;
      case 'dup': return agg.dupLeads||0;
      case 'duppct': return agg.totalLeads>0?agg.dupPct:0;
      case 'bcontrib': return grand.bookings>0&&agg.bookings>0?(agg.bookings/grand.bookings*100):0;
      default: return 0;
    }
  }

  const PAID_MBRS=SRC_GROUPS[0].members;   // ['MS FB','Adwords']
  const ORG_MBRS=SRC_GROUPS[1].members;    // ['Organic','Non MS']
  const ALL_SRCS=[...PAID_MBRS,...ORG_MBRS];

  /* On the Source tab the rows ARE the sources already, so the Paid/Organic/per-source
     breakdowns are never rendered there (TOPGROUPS below collapses to just "Total"). */
  const isSourceGrid=rowKey==='source';

  /* Single pass over `rows` computes grand total, per-source, per-dim and per-(dim×source)
     stats together — see aggGrouped() for why this replaced one aggRE() call per
     (dim,source) combination (was O(rows × dims × sources), the dominant cost on real
     datasets with hundreds of thousands of rows and 30+ states). If the caller already
     has this month's data from a multi-month single pass (aggGroupedByMonth — used when
     rendering one grid per month so the full row set isn't re-scanned per month), it's
     passed in via `precomputed` instead of recomputing here. */
  const grouped=useMemo(()=>precomputed||aggGrouped(rows,M,r=>r[rowKey]||'Unknown'),[rows,M,rowKey,precomputed]);
  const grand=grouped.grand;
  const grandSrc=isSourceGrid?{}:grouped.grandSrc;
  const grandPaid=isSourceGrid?EMPTY_AGG:grouped.grandPaid;
  const grandOrg=isSourceGrid?EMPTY_AGG:grouped.grandOrg;
  const dimAggs=useMemo(()=>{
    if(!isSourceGrid) return grouped.dimAggs;
    const res={};
    for(const v of Object.keys(grouped.dimAggs)) res[v]={total:grouped.dimAggs[v].total,paid:EMPTY_AGG,org:EMPTY_AGG,src:{}};
    return res;
  },[grouped,isSourceGrid]);
  const TOPGROUPS=(isSourceGrid||viewerMode)?[
    {label:'Total',bg:'#58616A',name:null,children:null,aggKey:'total',grandLeads:grand.uniqueLeads},
  ]:[
    {label:'Total',           bg:'#58616A',name:null,             children:null,     aggKey:'total',grandLeads:grand.uniqueLeads},
    {label:'Paid',            bg:'#B46B42',name:'Paid',            children:PAID_MBRS,aggKey:'paid', grandLeads:grandPaid.uniqueLeads},
    {label:'Organic + Non MS',bg:'#5F8B6F',name:'Organic + Non MS',children:ORG_MBRS, aggKey:'org',  grandLeads:grandOrg.uniqueLeads},
  ];
  const SCOLS=[
    {label:'Unique Leads',m:'leads'},
    {label:'Lead Contrib%',m:'contrib'},
    {label:'Bookings',m:'retail'},
    {label:'Booking Contrib%',m:'bcontrib'},
    {label:'E2B',m:'l2r'},
    {label:'Duplicate Leads',m:'dup'},
    {label:'Duplicity%',m:'duppct'},
  ];
  /* State × Source tab: drop Duplicity/Duplicity%, add Booking Contrib% + Vahan industry columns */
  const isStateGrid=rowKey==='state';
  const SCOLS_STATE=[
    {label:'Unique Leads',m:'leads'},
    {label:'Lead Contrib%',m:'contrib'},
    {label:'Booking',m:'retail'},
    {label:'Booking Contrib%',m:'bcontrib'},
    {label:'E2B%',m:'l2r'},
  ];
  const SCOLS_TOTAL_STATE=[
    {label:'Unique Leads',m:'leads'},
    {label:'Lead Contrib%',m:'contrib'},
    {label:'Booking',m:'retail'},
    {label:'Booking Contrib%',m:'bcontrib'},
    {label:'E2B',m:'l2r'},
    {label:'Vahan Retails',m:'vahan'},
    {label:'State Contrib%',m:'vcontrib'},
    {label:'BD Retail Contrib%',m:'vshare'},
  ];
  const SCOLS_NONTOTAL=isStateGrid?SCOLS_STATE:SCOLS;
  const SCOLS_TOTAL=isStateGrid?SCOLS_TOTAL_STATE:SCOLS;

  /* flat column list — each top group contributes either 1 aggregate col or N child-source cols */
  const COLS=useMemo(()=>TOPGROUPS.flatMap(g=>{
    if(!g.children) return[{key:'total',aggKey:'total',grandLeads:g.grandLeads,scols:SCOLS_TOTAL}];
    if(!expanded.has(g.name)) return[{key:g.aggKey,aggKey:g.aggKey,grandLeads:g.grandLeads,scols:SCOLS_NONTOTAL}];
    return g.children.map(src=>({key:src,aggKey:'src',src,grandLeads:grandSrc[src].uniqueLeads,scols:SCOLS_NONTOTAL}));
  }),[expanded,grand,grandPaid,grandOrg,grandSrc,isStateGrid]);

  function aggForCol(v,col){
    const a=dimAggs[v];
    return col.aggKey==='src'?a.src[col.src]:a[col.aggKey];
  }

  const grandVahan=useMemo(()=>{
    if(!isStateGrid) return undefined;
    return Object.keys(dimAggs).reduce((s,v)=>s+(vahanRetailFor(v,vMonths)||0),0);
  },[isStateGrid,dimAggs,vMonths]);

  const vahanAllIndia=useMemo(()=>isStateGrid?vahanMonthTotal(vMonths):undefined,[isStateGrid,vMonths]);

  const dimVals=useMemo(()=>{
    const sortCol=COLS.find(c=>c.key===sort.colKey)||COLS[0];
    const vals=Object.keys(dimAggs).sort((a,b)=>{
      let av,bv;
      if(isStateGrid&&(sort.metric==='vahan'||sort.metric==='vshare'||sort.metric==='vcontrib')){
        const va=vahanRetailFor(a,vMonths)||0, vb=vahanRetailFor(b,vMonths)||0;
        const aggA=aggForCol(a,sortCol), aggB=aggForCol(b,sortCol);
        if(sort.metric==='vahan'){ av=va; bv=vb; }
        else if(sort.metric==='vshare'){ av=va>0?(aggA.bookings/va*100):0; bv=vb>0?(aggB.bookings/vb*100):0; }
        else { av=vahanAllIndia>0?(va/vahanAllIndia*100):0; bv=vahanAllIndia>0?(vb/vahanAllIndia*100):0; }
      } else {
        av=metricVal(aggForCol(a,sortCol),sortCol.grandLeads,sort.metric);
        bv=metricVal(aggForCol(b,sortCol),sortCol.grandLeads,sort.metric);
      }
      return sort.dir==='desc'?bv-av:av-bv;
    });
    return vals;
  },[dimAggs,COLS,sort,isStateGrid,vMonths,vahanAllIndia]);

  function mkCells(agg,grandLeads,kpfx,bg,scols,vahanRetail,vahanAll){
    const contrib=grandLeads>0&&agg.uniqueLeads>0?(agg.uniqueLeads/grandLeads*100):0;
    const bcontrib=grand.bookings>0&&agg.bookings>0?(agg.bookings/grand.bookings*100):null;
    const l2r=agg.uniqueLeads>0?agg.e2bPct:0;
    const l2rBg=agg.uniqueLeads>0?l2rColor(l2r):'#F3F4F6';
    const share=vahanRetail>0?(agg.bookings/vahanRetail*100):null;
    const vcontrib=vahanAll>0&&vahanRetail>0?(vahanRetail/vahanAll*100):null;
    const cs={padding:'5px 7px',textAlign:'right',fontSize:11,fontFamily:'DM Mono,monospace',
      color:'#222222',border:'1px solid #E5E7EB',verticalAlign:'middle',background:bg};
    return scols.map((s,i)=>{
      switch(s.m){
        case 'leads': return ce('td',{key:kpfx+'l',style:cs},agg.uniqueLeads?Nf(agg.uniqueLeads):'—');
        case 'retail': return ce('td',{key:kpfx+'r',style:cs},agg.bookings?Nf(agg.bookings):'—');
        case 'contrib': return ce('td',{key:kpfx+'c',style:{...cs,padding:'3px 7px',minWidth:76}},
          grandLeads>0&&agg.uniqueLeads>0
            ?ce('div',null,
              ce('div',{style:{fontSize:10,textAlign:'right',marginBottom:2}},contrib.toFixed(1)+'%'),
              ce('div',{style:{height:4,background:'#EFEFEF',borderRadius:2}},
                ce('div',{style:{height:'100%',width:Math.min(contrib,100)+'%',background:'#C8A96B',borderRadius:2}}))
            )
            :ce('span',{style:{color:'#9ca3af'}},'—'));
        case 'bcontrib': return ce('td',{key:kpfx+'bc',style:{...cs,padding:'3px 7px',minWidth:76}},
          bcontrib!=null
            ?ce('div',null,
              ce('div',{style:{fontSize:10,textAlign:'right',marginBottom:2}},bcontrib.toFixed(1)+'%'),
              ce('div',{style:{height:4,background:'#EFEFEF',borderRadius:2}},
                ce('div',{style:{height:'100%',width:Math.min(bcontrib,100)+'%',background:'#C8A96B',borderRadius:2}}))
            )

/* ══════════════════════════════════════════════════════════════════════════
   SOURCE ANALYSIS TAB

const SourceTab=React.memo(function SourceTab({rows,mf,viewerMode}){
  const sources=useMemo(()=>[...new Set(rows.map(r=>r.source))].filter(Boolean).sort(),[rows]);

  /* All months, oldest first for charts (handled inside SourceMiniChart) */
  const allMonths=useMemo(()=>
    [...new Set(rows.map(r=>r.lead_month))].filter(Boolean)
      .sort((a,b)=>monthOrder(b)-monthOrder(a))
  ,[rows]);

  /* Driven solely by the global Lead Month filter — no local month-pill row.
     A specific month shows just that month; "All" shows every month. Showing every month
     used to mean one full O(rows) aggRE pass per month — now it's one combined pass via
     aggGroupedByMonth (below), so there's no performance reason left to hide months. */
  const activeMonths=useMemo(()=>mf&&mf!=='All'?[mf]:allMonths,[mf,allMonths]);

  /* One single pass over `rows` producing every month's grid data at once. */
  const byMonth=useMemo(()=>aggGroupedByMonth(rows,r=>r.source||'Unknown'),[rows]);

  /* Pre-compute per-source rows (all months, used by mini charts) */
  const srcRowsMap=useMemo(()=>{
    const m={};
    for(const src of sources) m[src]=rows.filter(r=>r.source===src);
    return m;
  },[rows,sources]);

  /* Color map */
  const srcColors=useMemo(()=>{
    const m={};
    sources.forEach((s,i)=>m[s]=getSrcColor(s,i));
    return m;
  },[sources]);

  return ce('div',{className:'fade-up'},

    /* Section label */
    ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}},
      ce('div',{style:{fontSize:11,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.08em'}},'Source Trend'),
      ce(ExportBtn,{onClick:()=>{
        const sheets={};
        for(const M of activeMonths){
          const g=byMonth.get(M)||aggGrouped(rows,M,r=>r.source||'Unknown');
          sheets[M]=aggToAoa(g,'Source');
        }
        if(activeMonths.length>1){
          const g=aggGrouped(rows,'All',r=>r.source||'Unknown');
          sheets['All Months Summary']=aggToAoa(g,'Source');
        }
        exportXlsx(sheets,'RE_LDR_Source_Analysis');
      }})
    ),

    /* Mini charts grid — 2 columns */
    ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:24}},
      sources.map((src,i)=>ce(SourceMiniChart,{
        key:src,src,
        srcRows:srcRowsMap[src]||[],
        months:activeMonths,
        colorCfg:srcColors[src]||getSrcColor(src,i)
      }))
    ),

    /* Compact matrix grids — one per active month */
    activeMonths.map(M=>ce(CompactMonthGrid,{key:M,M,rows,rowKey:'source',dimLabel:'Source',precomputed:byMonth.get(M),viewerMode}))
  );
});

  /* Driven solely by the global Lead Month filter — no local month-pill row.
     A specific month shows just that month; "All" shows every month — affordable because
     byMonth (below) computes every month's grid data in one combined pass. */
  const activeMonths=useMemo(()=>mf&&mf!=='All'?[mf]:allMonths,[mf,allMonths]);
  /* One single pass over `rows` producing every month's grid data at once — see
     aggGroupedByMonth(). The "All Months Summary" grid below still uses the regular

     months together rather than breaking them apart. */
  const byMonth=useMemo(()=>aggGroupedByMonth(rows,r=>r[rowKey]||'Unknown'),[rows,rowKey]);

/* ── Model wise State × Source — replica of State × Source, one grid per Model instead of per Month
   Uses the global header filters only (Lead Month, City, etc. already applied via rows/mf) — no local filter row. ── */
/* ── Generic multi-select dropdown (checkbox panel) — empty selection means "All" ── */
const MultiSelect=React.memo(function MultiSelect({label,options,selected,onChange}){
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    function onDocClick(e){ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown',onDocClick);
    return ()=>document.removeEventListener('mousedown',onDocClick);
  },[]);
  function toggle(o){
    onChange(prev=>{
      const next=new Set(prev);
      next.has(o)?next.delete(o):next.add(o);
      return next;
    });
  }
  const summary=selected.size===0?'All':(selected.size===1?[...selected][0]:selected.size+' selected');
  return ce('div',{ref,style:{position:'relative',display:'inline-block'}},
    ce('button',{
      onClick:()=>setOpen(p=>!p),
      style:{padding:'4px 12px',fontSize:11,fontFamily:'inherit',fontWeight:600,border:'1px solid #A8D5BA',
        borderRadius:20,background:selected.size?'#1B4332':'#fff',color:selected.size?'#fff':'#0a1f14',
        cursor:'pointer',whiteSpace:'nowrap'}
    }, (label?label+': ':'')+summary+' ▾'),
    open&&ce('div',{style:{position:'absolute',top:'100%',left:0,marginTop:4,background:'#fff',
      border:'1px solid #A8D5BA',borderRadius:8,boxShadow:'0 8px 24px rgba(0,0,0,.15)',
      maxHeight:280,overflowY:'auto',minWidth:200,zIndex:50,padding:6}},
      ce('div',{style:{display:'flex',gap:10,padding:'2px 8px 8px',borderBottom:'1px solid #E5E7EB',marginBottom:4}},
        ce('span',{style:{fontSize:10,color:'#2D6A4F',cursor:'pointer',fontWeight:700},onClick:()=>onChange(new Set())},'Select All'),
        ce('span',{style:{fontSize:10,color:'#9ca3af',cursor:'pointer',fontWeight:700},onClick:()=>onChange(new Set(options))},'Clear All')
      ),
      options.map(o=>ce('label',{key:o,style:{display:'flex',alignItems:'center',gap:7,padding:'4px 8px',
        fontSize:11,cursor:'pointer',borderRadius:4,whiteSpace:'nowrap'}},
        ce('input',{type:'checkbox',checked:selected.size>0&&selected.has(o),onChange:()=>toggle(o)}),
        o
      ))
    )
  );
});

const GeoModelTab=React.memo(function GeoModelTab({rows,mf,viewerMode}){
  const allMonths=useMemo(()=>
    [...new Set(rows.map(r=>r.lead_month))].filter(Boolean).sort((a,b)=>monthOrder(b)-monthOrder(a))
  ,[rows]);

  const resolvedMonths=(!mf||mf==='All')?allMonths:[mf];

  const filteredRows=useMemo(()=>
    (!mf||mf==='All')?rows:rows.filter(r=>r.lead_month===mf)
  ,[rows,mf]);

  const modelGroups=useMemo(()=>{
    const m={};
    for(const r of filteredRows){ const v=r.model||'Unknown'; if(!m[v]) m[v]=[]; m[v].push(r); }
    return Object.keys(m)
      .sort((a,b)=>m[b].length-m[a].length)
      .map(model=>({model,rows:m[model]}));
  },[filteredRows]);

  return ce('div',{className:'fade-up'},
    ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,marginTop:8}},
      ce('div',{style:{fontSize:11,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.08em'}},'State × Source — by Model'),
      ce(ExportBtn,{onClick:()=>{

          sheets[model.slice(0,31)]=aggToAoa(g,'State');

        sheets['All Models']=aggToAoa(gAll,'State');

    ce('div',{style:{margin:'24px 0 16px',borderTop:'2px solid #D1D5DB'}}),
    ce('div',{style:{fontSize:11,fontWeight:700,color:'#6b7280',textTransform:'uppercase',

    ce(CompactMonthGrid,{
      M:'All',rows:filteredRows,rowKey:'state',dimLabel:'State',
      badgeLabel:'All Models',vahanMonths:resolvedMonths,viewerMode
    })
  );
});


/* ══════════════════════════════════════════════════════════════════════════
   UPLOAD SCREEN
══════════════════════════════════════════════════════════════════════════ */
function UploadScreen({onData,onSync,syncing,syncErr,sheetUrl,setSheetUrl,urlDraft,setUrlDraft,lastSynced}){
  const [drag,setDrag]=useState(false);
  const [prog,setProg]=useState(0);
  const [step,setStep]=useState('');
  const [err,setErr]=useState('');

  function process(file){
    if(!file||!file.name.match(/\.xlsx?$/i)){setErr('Please upload an .xlsx file');return;}
    if(!window.XLSX){setErr('XLSX library not loaded');return;}
    setErr('');setProg(10);setStep('Reading file…');
    const reader=new FileReader();
    reader.onerror=()=>{setErr('File read error');setProg(0);};
    reader.onload=e=>{
      try{
        setProg(30);setStep('Parsing Excel…');
        const wb=window.XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        setProg(55);setStep('Processing rows…');
        const raw=window.XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
        if(!raw.length){setErr('Sheet appears empty');setProg(0);return;}
        setTimeout(()=>{
          setProg(80);setStep('Aggregating data…');
          setTimeout(()=>{
            const parsed=parseRows(raw);
            if(!parsed.length){setErr('No valid rows found. Check the file format.');setProg(0);return;}
            setProg(100);setStep('Done!');
            setTimeout(()=>{
              onData(parsed);
              setTimeout(()=>{ try{localStorage.setItem('re_ldr_data',JSON.stringify(parsed.slice(0,50000)));}catch(e){} },0);
            },400);
          },50);
        },50);
      }catch(ex){setErr('Parse error: '+ex.message);setProg(0);}
    };
    reader.readAsArrayBuffer(file);
  }

  return ce('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}},

    syncing&&ce('div',{style:{position:'fixed',inset:0,background:'rgba(8,28,21,.45)',
      display:'flex',alignItems:'center',justifyContent:'center',zIndex:999}},
      ce('div',{style:{width:'30%',minWidth:280,maxWidth:420,background:'#fff',borderRadius:16,
        padding:'32px 28px',textAlign:'center',boxShadow:'0 12px 40px rgba(0,0,0,.25)'}},
        ce('div',{style:{fontSize:34,marginBottom:14,display:'inline-block',animation:'spin 1s linear infinite'}},'⟳'),
        ce('div',{style:{fontSize:14,fontWeight:700,color:'#1B4332',marginBottom:6}},'Syncing from Google Sheets…'),
        ce('div',{style:{fontSize:11,color:'#6b7280',marginBottom:16}},'Fetching and parsing your sheet data'),
        ce('div',{style:{height:5,background:'#f0f2f7',borderRadius:10,overflow:'hidden'}},
          ce('div',{className:'prog-fill',style:{height:'100%',width:'70%',borderRadius:10}})
        )
      )
    ),

    ce('div',{style:{maxWidth:560,width:'100%'}},
      ce('div',{style:{textAlign:'center',marginBottom:32}},
        ce('div',{style:{display:'inline-flex',alignItems:'center',gap:12,background:'#2D6A4F',padding:'12px 28px',borderRadius:16,marginBottom:16,boxShadow:'0 4px 20px rgba(45,106,79,.35)'}},
          ce('div',{style:{width:38,height:38,borderRadius:9,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:900,color:'#2D6A4F'}},'RE'),
          ce('div',{style:{textAlign:'left'}},
            ce('div',{style:{fontSize:15,fontWeight:800,color:'#fff',letterSpacing:'-.02em'}},'Royal Enfield'),
            ce('div',{style:{fontSize:10,color:'#D8EED8',letterSpacing:'.06em',fontWeight:600}},'LEAD DISPOSITION DASHBOARD  v1.0')
          )
        ),
        ce('div',{style:{fontSize:12,color:'#1B4332',fontWeight:500}},'Upload a BikeDekho LDR Excel file or sync from Google Sheets')
      ),

      ce('div',{
        className:'drop-zone'+(drag?' drag':''),
        style:{padding:'48px 24px',textAlign:'center',marginBottom:16},
        onDragOver:e=>{e.preventDefault();setDrag(true);},
        onDragLeave:()=>setDrag(false),
        onDrop:e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files[0]);},
        onClick:()=>document.getElementById('re-ldr-file').click()
      },
        ce('div',{style:{fontSize:36,marginBottom:12}},'📂'),
        ce('div',{style:{fontSize:14,fontWeight:600,color:'#111827',marginBottom:4}},'Click or drag & drop LDR file'),
        ce('div',{style:{fontSize:11,color:'#9ca3af'}},'.xlsx files only · BikeDekho Lead Disposition Report'),
        ce('input',{id:'re-ldr-file',type:'file',accept:'.xlsx,.xls',style:{display:'none'},onChange:e=>process(e.target.files[0])})
      ),

      prog>0&&ce('div',{style:{marginBottom:12}},
        ce('div',{style:{fontSize:11,color:'#374151',marginBottom:6,fontWeight:600}},step),
        ce('div',{style:{height:5,background:'#f0f2f7',borderRadius:10,overflow:'hidden'}},
          ce('div',{className:'prog-fill',style:{height:'100%',width:prog+'%',borderRadius:10}})
        )
      ),
      err&&ce('div',{style:{padding:'10px 14px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,fontSize:11,color:'#dc2626',fontWeight:500}},err),

      ce('div',{className:'card',style:{padding:'18px',marginTop:16,borderLeft:'4px solid #2D6A4F'}},
        ce('div',{style:{fontSize:11,fontWeight:700,color:'#1B4332',marginBottom:12,display:'flex',alignItems:'center',gap:8}},'📊 Or sync directly from Google Sheets'),
        ce('div',{style:{marginBottom:12}},
          ce('div',{style:{fontSize:10,fontWeight:700,color:'#1B4332',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}},'Google Sheets URL'),

          })

          disabled:syncing,
          style:{padding:'8px 24px',background:'#2D6A4F',border:'none',borderRadius:20,color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:6}
        },
          syncing?ce('span',{style:{display:'inline-block',animation:'spin .8s linear infinite'}},'⟳'):'📊',
          syncing?'Syncing…':'Sync from Google Sheets'
        ),
        syncErr&&ce('div',{style:{fontSize:11,color:'#dc2626',padding:'8px 12px',background:'#fef2f2',borderRadius:8,border:'1px solid #fecaca',marginTop:10,whiteSpace:'pre-wrap'}},'⚠ '+syncErr),
        lastSynced&&ce('div',{style:{fontSize:10,color:'#166534',marginTop:8}},'✓ Last synced: '+lastSynced.toLocaleString()),
        ce('div',{style:{fontSize:10,color:'#6b7280',marginTop:10,lineHeight:1.6}},
          '💡 Share first: Google Sheets → File → Share → Anyone with the link → ',
          ce('strong',null,'Viewer'),
          ' · No API key · No login required')
      ),

      ce('div',{className:'card',style:{padding:'14px 18px',marginTop:16}},
        ce('div',{style:{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}},'Expected columns in LDR file'),
        ce('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
          ['Lead Number','LT','Source','Primary Source','Duplicate Check','Lead Month','Booking Status','Booking Date','Booking Month'].map(c=>
            ce('span',{key:c,style:{fontSize:10,fontFamily:'DM Mono',background:'#f5f6fa',border:'1px solid #e4e6ef',borderRadius:5,padding:'2px 7px',color:'#6b7280'}},c)

/* ══════════════════════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════════════════════ */
const TABS=[
  {id:'overview',   label:'Overview'},
  {id:'source',     label:'Source Analysis'},
  {id:'ltxsrc',    label:'LT × Source'},
  {id:'modelxsrc', label:'Model × Source'},
  {id:'statexsrc', label:'Monthly State × Source'},
  {id:'geomodel',  label:'Model wise State × Source'},
];

function App({fbUser,role,presence,onSignOut,onAdminOpen}){
  const viewerMode=role==='viewer';
  const [rows,setRows]=useState(null);
  const [tab,setTab]=useState('overview');
  /* startTransition keeps the click feeling instant — the active-tab highlight updates
     right away while the new tab's grids render in the background (isPending drives a
     subtle loading cue instead of the UI appearing to freeze). */
  const [isPending,startTransition]=useTransition();
  /* Each filter is a Set of selected values — empty Set means "All" (no restriction). */
  const [filters,setFilters]=useState(()=>({month:new Set(),source:new Set(),primarySrc:new Set(),state:new Set(),city:new Set(),model:new Set()}));
  function setFilterKey(key,valueOrFn){
    startTransition(()=>setFilters(prev=>({...prev,[key]:typeof valueOrFn==='function'?valueOrFn(prev[key]):valueOrFn})));
  }
  const [syncing,setSyncing]=useState(false);
  const [syncErr,setSyncErr]=useState(null);
  const [lastSynced,setLastSynced]=useState(null);
  const [showSyncPanel,setShowSyncPanel]=useState(false);
  const [sheetUrl,setSheetUrl]=useState(()=>localStorage.getItem('re_ldr_sheet_url')||SHEETS_CONFIG.LDR_SHEET_URL||'');
  const [urlDraft,setUrlDraft]=useState('');

  const handleSync=useCallback(async(url)=>{
    const u=(url||sheetUrl||SHEETS_CONFIG.LDR_SHEET_URL||'').trim();
    if(!u){setShowSyncPanel(true);setSyncErr('Paste your Google Sheets URL and click Sync.');return;}
    setSyncing(true);setSyncErr(null);
    try{
      const csv=await fetchSheetCsv(u);
      const raw=parseCsvToRows(csv);
      if(!raw.length) throw new Error('No rows found in sheet.');
      const parsed=parseRows(raw);
      if(!parsed.length) throw new Error('Rows found but none matched expected column format.');
      setRows(parsed);
      setLastSynced(new Date());
      setShowSyncPanel(false);
      /* Cache to localStorage after the UI updates — JSON.stringify on tens of
         thousands of rows is blocking and shouldn't delay the paint. */
      setTimeout(()=>{ try{localStorage.setItem('re_ldr_data',JSON.stringify(parsed.slice(0,50000)));}catch(e){} },0);
    }catch(e){setSyncErr(e.message);setShowSyncPanel(true);}
    finally{setSyncing(false);}
  },[sheetUrl]);

  useEffect(()=>{
    const u=sheetUrl||SHEETS_CONFIG.LDR_SHEET_URL;
    if(SHEETS_CONFIG.AUTO_SYNC_ON_LOAD&&u&&u!=='INJECT_SHEET_URL_HERE') handleSync(u);
  },[]);// eslint-disable-line

  useEffect(()=>{
    try{
      const saved=localStorage.getItem('re_ldr_data');
      if(saved){const p=JSON.parse(saved);if(p&&p.length)setRows(p);}
    }catch(e){}
  },[]);

  const months=useMemo(()=>rows?[...new Set(rows.map(r=>r.lead_month))].filter(Boolean).sort((a,b)=>monthOrder(a)-monthOrder(b)):[], [rows]);
  const sources=useMemo(()=>rows?[...new Set(rows.map(r=>r.source))].filter(Boolean).sort():[],[rows]);
  const primSrcs=useMemo(()=>rows?[...new Set(rows.map(r=>r.primary_src))].filter(Boolean).sort():[],[rows]);
  const states=useMemo(()=>rows?[...new Set(rows.map(r=>r.state))].filter(Boolean).sort():[],[rows]);
  const cities=useMemo(()=>rows?[...new Set(rows.map(r=>r.city))].filter(Boolean).sort():[],[rows]);
  const models=useMemo(()=>rows?[...new Set(rows.map(r=>r.model))].filter(Boolean).sort():[],[rows]);

  /* Base rows: filtered by every multi-select filter, including month — an empty Set means
     no restriction from that filter. With month pre-filtered here, `mf` passed to each tab
     only needs to distinguish "exactly one month selected" (pass that month, so per-tab
     single-month grid logic keeps working) from "zero or multiple selected" (pass 'All' —
     aggRE/aggGrouped's 'All' branch already sums correctly across whatever months remain
     present in the pre-filtered rows). */
  const baseRows=useMemo(()=>{
    if(!rows) return [];
    return rows.filter(r=>
      (filters.month.size===0||filters.month.has(r.lead_month))&&
      (filters.source.size===0||filters.source.has(r.source))&&
      (filters.primarySrc.size===0||filters.primarySrc.has(r.primary_src))&&
      (filters.state.size===0||filters.state.has(r.state))&&
      (filters.city.size===0||filters.city.has(r.city))&&
      (filters.model.size===0||filters.model.has(r.model))
    );
  },[rows,filters.month,filters.source,filters.primarySrc,filters.state,filters.city,filters.model]);

  const mf=filters.month.size===1?[...filters.month][0]:'All';

  const totalM=useMemo(()=>aggRE(baseRows,mf),[baseRows,mf]);

  /* Only render the active tab. Every dimension's aggregation now runs through the
     single-pass aggGrouped() (see aggGrouped above), so even a fresh mount of the
     heaviest grid is a handful of milliseconds on real-world data sizes — there's no
     longer a reason to keep every previously-visited tab mounted (display:none) in the
     background, and doing so meant a filter change re-ran every visited tab's
     aggregations, not just the one on screen. */
  const activeTabEl=useMemo(()=>{
    const COMPONENTS={
      overview:  OverviewTab,
      source:    SourceTab,
      ltxsrc:    LTSourceTab,
      modelxsrc: ModelSourceTab,
      statexsrc: StateSourceTab,
      geomodel:  GeoModelTab,
    };
    return ce(COMPONENTS[tab],{key:tab,rows:baseRows,mf,viewerMode});
  },[tab,baseRows,mf,viewerMode]);

  if(!rows) return ce(UploadScreen,{onData:setRows,onSync:handleSync,syncing,syncErr,sheetUrl,setSheetUrl,urlDraft,setUrlDraft,lastSynced});

  return ce('div',{style:{minHeight:'100vh'}},
    /* Header */
    ce('div',{style:{background:'#2D6A4F',padding:'0 24px',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 16px rgba(45,106,79,.35)'}},
      ce('div',{style:{maxWidth:1600,margin:'0 auto',display:'flex',alignItems:'center',gap:16}},
        ce('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'10px 0',flexShrink:0}},
          ce('div',{style:{width:34,height:34,borderRadius:8,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:900,color:'#2D6A4F',boxShadow:'0 2px 8px rgba(0,0,0,.15)'}},'RE'),
          ce('div',null,
            ce('div',{style:{fontSize:13,fontWeight:800,color:'#fff',letterSpacing:'-.02em'}},'Royal Enfield · LDR'),
            ce('div',{style:{fontSize:9,color:'#D8EED8',letterSpacing:'.07em',fontWeight:600}},'LEAD DISPOSITION DASHBOARD v1.0 · BikeDekho')
          )
        ),
        ce('div',{style:{flex:1,display:'flex',gap:14,overflowX:'auto',padding:'8px 0',borderLeft:'1px solid rgba(255,255,255,.3)',paddingLeft:16,marginLeft:4}},
          [
            {l:'Total',  v:Nf(totalM.totalLeads)},
            {l:'Unique', v:Nf(totalM.uniqueLeads)},
            {l:'Dup%',   v:totalM.dupPct.toFixed(1)+'%'},
            {l:'Bookings',v:Nf(totalM.bookings)},
            {l:'E2B%',   v:totalM.e2bPct.toFixed(1)+'%'},
          ].map((k,i)=>ce('div',{key:i,style:{flexShrink:0,textAlign:'center',minWidth:56}},
            ce('div',{style:{fontSize:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#D8EED8'}},k.l),
            ce('div',{style:{fontSize:13,fontWeight:800,color:'#fff',fontFamily:'DM Mono,monospace',letterSpacing:'-.02em'}},k.v)
          ))
        ),
        ce('button',{onClick:()=>handleSync(),disabled:syncing,
          style:{flexShrink:0,padding:'6px 16px',background:syncing?'rgba(255,255,255,.7)':'#fff',border:'none',borderRadius:20,color:'#1B4332',fontSize:10,cursor:syncing?'default':'pointer',fontFamily:'inherit',fontWeight:700,boxShadow:'0 2px 8px rgba(0,0,0,.12)',display:'flex',alignItems:'center',gap:5}},
          syncing?ce('span',{style:{display:'inline-block',animation:'spin .8s linear infinite',fontSize:11}},'⟳'):'🔄',
          syncing?'Syncing…':'Sync Sheets'
        ),
        ce('button',{onClick:()=>{setUrlDraft(sheetUrl);setShowSyncPanel(p=>!p);},title:'Configure Google Sheets URL',
          style:{flexShrink:0,padding:'6px 10px',background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',borderRadius:20,color:'#fff',fontSize:11,cursor:'pointer',fontFamily:'inherit'}},'⚙'),
        ce('button',{
          onClick:()=>{if(confirm('Clear data and upload new file?')){localStorage.removeItem('re_ldr_data');setRows(null);}},
          style:{flexShrink:0,padding:'6px 16px',background:'transparent',border:'1px solid rgba(255,255,255,.3)',borderRadius:20,color:'#fff',fontSize:10,cursor:'pointer',fontFamily:'inherit',fontWeight:600}
        },'⬆ File'),
        ce('div',{style:{borderLeft:'1px solid rgba(255,255,255,.25)',paddingLeft:10,marginLeft:4,flexShrink:0}},
          ce(PresenceStrip,{presence,fbUser,role,onSignOut,onAdminOpen})
        )
      )
    ),

    /* Sync panel */
    showSyncPanel&&ce('div',{style:{background:'#F0F7F4',borderBottom:'2px solid #A8D5BA',padding:'12px 24px',position:'sticky',top:54,zIndex:98,boxShadow:'0 4px 12px rgba(45,106,79,.1)'}},
      ce('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
        ce('span',{style:{fontSize:10,fontWeight:700,color:'#1B4332',textTransform:'uppercase',letterSpacing:'.07em',whiteSpace:'nowrap'}},'📊 Google Sheets URL'),
        ce('input',{type:'text',value:urlDraft,onChange:e=>setUrlDraft(e.target.value),
          placeholder:'https://docs.google.com/spreadsheets/d/…',
          style:{flex:1,minWidth:320,padding:'6px 14px',border:'1px solid #A8D5BA',borderRadius:20,fontSize:11,fontFamily:'inherit',outline:'none',background:'#fff',color:'#0a1f14'}
        }),
        ce('button',{
          onClick:()=>{const u=urlDraft.trim();if(!u){setSyncErr('Please paste a Google Sheets URL.');return;}setSheetUrl(u);try{localStorage.setItem('re_ldr_sheet_url',u);}catch(e){}handleSync(u);},
          disabled:syncing,
          style:{padding:'6px 20px',background:'#2D6A4F',border:'none',borderRadius:20,color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}
        },syncing?'⟳ Syncing…':'🔄 Sync Now'),
        ce('button',{onClick:()=>{setShowSyncPanel(false);setSyncErr(null);},
          style:{padding:'6px 12px',background:'transparent',border:'1px solid #A8D5BA',borderRadius:20,color:'#1B4332',fontSize:11,cursor:'pointer',fontFamily:'inherit'}},'✕')
      ),
      syncErr&&ce('div',{style:{marginTop:8,padding:'6px 12px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,fontSize:11,color:'#dc2626',fontWeight:500,whiteSpace:'pre-wrap'}},'⚠ '+syncErr),
      lastSynced&&!syncErr&&ce('div',{style:{marginTop:6,fontSize:10,color:'#166534',fontFamily:'DM Mono'}},'✓ Last synced: '+lastSynced.toLocaleString()),
      ce('div',{style:{marginTop:6,fontSize:10,color:'#1B4332'}},'💡 Share first: Google Sheets → File → Share → Anyone with the link → ',ce('strong',null,'Viewer'),' · No API key needed')
    ),

    /* Sync status bar */
    !showSyncPanel&&(syncErr||lastSynced)&&ce('div',{
      style:{background:syncErr?'#fef2f2':'#f0fdf4',borderBottom:'1px solid '+(syncErr?'#fecaca':'#bbf7d0'),padding:'5px 24px',display:'flex',alignItems:'center',gap:8,position:'sticky',top:54,zIndex:98}},
      syncErr
        ?ce('span',{style:{fontSize:10,color:'#dc2626',flex:1}},'⚠ Sync error: '+syncErr+' — ',ce('span',{style:{cursor:'pointer',textDecoration:'underline'},onClick:()=>{setUrlDraft(sheetUrl);setShowSyncPanel(true);}},'configure URL'))
        :ce('span',{style:{fontSize:10,color:'#166534'}},'✓ Synced from Google Sheets · '+lastSynced.toLocaleString()+' · '+rows.length.toLocaleString()+' rows')
    ),

    /* Tab bar */
    ce('div',{style:{background:'#fff',borderBottom:'2px solid #D8EED8',position:'sticky',top:54,zIndex:99,boxShadow:'0 2px 8px rgba(45,106,79,.08)'}},
      ce('div',{style:{maxWidth:1600,margin:'0 auto',display:'flex',alignItems:'center',gap:0,padding:'0 24px',opacity:isPending?0.6:1,transition:'opacity .15s'}},
        TABS.map(t=>ce('button',{key:t.id,className:'tab-pill'+(tab===t.id?' active':''),onClick:()=>startTransition(()=>setTab(t.id))},t.label)),
        isPending&&ce('span',{style:{marginLeft:12,fontSize:12,color:'#6B7280'}},'Loading…')
      )
    ),

    /* Filter bar */
    ce('div',{style:{maxWidth:1600,margin:'0 auto',padding:'14px 24px 0',opacity:isPending?0.6:1,transition:'opacity .15s'}},
      ce('div',{className:'filter-bar'},
        ce('label',null,'Filters'),
        ...[
          {k:'month',     label:'Lead Month',     opts:months},
          {k:'source',    label:'Source',          opts:sources},
          {k:'primarySrc',label:'Primary Source',  opts:primSrcs},
          {k:'model',     label:'Model',           opts:models},
          {k:'state',     label:'State',           opts:states},
          {k:'city',      label:'City',            opts:cities},
        ].map(f=>ce('div',{key:f.k,style:{display:'flex',alignItems:'center',gap:5}},
          ce('span',{style:{fontSize:10,color:'#64748b',fontWeight:600}},f.label+':'),
          ce(MultiSelect,{options:f.opts,selected:filters[f.k],onChange:v=>setFilterKey(f.k,v)})
        )),
        Object.values(filters).some(s=>s.size>0)&&
          ce('button',{
            onClick:()=>startTransition(()=>setFilters({month:new Set(),source:new Set(),primarySrc:new Set(),state:new Set(),city:new Set(),model:new Set()})),
            style:{padding:'4px 12px',fontSize:10,background:'#D8EED8',border:'1px solid #A8D5BA',borderRadius:20,cursor:'pointer',fontFamily:'inherit',color:'#1B4332',fontWeight:600}
          },'✕ Clear Filters'),
        ce('span',{style:{marginLeft:'auto',fontSize:10,fontFamily:'DM Mono',color:'#94a3b8'}},
          Nf(totalM.uniqueLeads)+' unique leads shown')
      )
    ),

    /* Tab content — only the active tab is mounted. */
    ce('div',{style:{maxWidth:1600,margin:'0 auto',padding:'14px 24px 32px'}},
      activeTabEl
    )
  );
}

function ensureUserDoc(user){
  var ref=getFbDb().collection(USERS_COL).doc(user.uid);
  return ref.get().then(function(snap){
    if(!snap.exists){
      return ref.set({
        email:user.email,
        displayName:user.displayName||user.email,
        photoURL:user.photoURL||'',
        role:user.email===ADMIN_EMAIL?'admin':'pending',
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
    } else if(snap.data().email!==user.email){
      return ref.update({email:user.email,displayName:user.displayName||user.email,photoURL:user.photoURL||''});
    }
  });
}

function setupPresence(user){
  var presRef=getFbRTDB().ref(PRESENCE_PATH+'/'+user.uid);
  presRef.set({uid:user.uid,email:user.email,name:user.displayName||user.email,photo:user.photoURL||'',ts:firebase.database.ServerValue.TIMESTAMP});
  presRef.onDisconnect().remove();
  return presRef;
}
