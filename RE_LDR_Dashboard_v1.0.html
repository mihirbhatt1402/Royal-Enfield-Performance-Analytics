    )
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   PIVOT TAB
══════════════════════════════════════════════════════════════════════════ */
const PivotTab=React.memo(function PivotTab({rows,mf,viewerMode,bm='update'}){
  const ROW_DIMS=[
    {v:'model',l:'Model'},{v:'source',l:'Source'},{v:'primary_src',l:'Primary Source'},
    {v:'utm_campaign',l:'UTM Campaign'},{v:'state',l:'State'},{v:'lt',l:'LT'},{v:'city',l:'City'},
  ];
  const COL_OPTIONS=[
    {v:'lead_month',l:'Month'},{v:'source',l:'Source'},{v:'primary_src',l:'Primary Source'},
    {v:'utm_campaign',l:'UTM Campaign'},{v:'state',l:'State'},{v:'model',l:'Model'},
  ];
  const VAL_DEFS=[
    {k:'tl',l:'Total Leads'},{k:'ul',l:'Unique Leads'},{k:'bc',l:'Bookings'},{k:'e2b',l:'E2B%'},
  ];
  const [rowDims,setRowDims]=useState(['model']);
  const [colDims,setColDims]=useState(['lead_month','source']);
  const [showVals,setShowVals]=useState({tl:false,ul:true,bc:true,e2b:true});
  const [sortBy,setSortBy]=useState('ul');
  const [sortDir,setSortDir]=useState('desc');
  const [showN,setShowN]=useState('all');

  const activeVals=VAL_DEFS.filter(v=>showVals[v.k]);
  const nv=Math.max(activeVals.length,1);

  const pivotData=useMemo(()=>aggPivot(rows,rowDims,colDims,mf,bm),[rows,rowDims,colDims,mf,bm]);

  const sortedRows=useMemo(()=>{
    const s=[...pivotData.rows].sort((a,b)=>{const av=a.total[sortBy]??0,bv=b.total[sortBy]??0;return sortDir==='desc'?bv-av:av-bv;});
    return showN==='all'?s:s.slice(0,parseInt(showN));
  },[pivotData.rows,sortBy,sortDir,showN]);

  const {colStructure,colTotals,grand,isTwoLevel,isNested}=pivotData;
  const orderedKeys=colStructure.flatMap(g=>g.items.map(i=>i.key));

  const fmt=(val,k)=>{
    if(val==null||isNaN(val)||val===undefined) return '–';
    if(k==='e2b') return val.toFixed(1)+'%';
    return Math.round(val).toLocaleString();
  };
  const e2bBg=v=>!v?'transparent':v>=2?'#dcfce7':v>=1?'#fef9c3':'#fee2e2';

  const TH={background:'#1B4332',color:'#fff',padding:'6px 10px',fontSize:10,fontWeight:700,textAlign:'center',border:'1px solid #2D6A4F',whiteSpace:'nowrap',verticalAlign:'middle'};
  const TH2={background:'#2D6A4F',color:'#fff',padding:'5px 8px',fontSize:10,fontWeight:700,textAlign:'center',border:'1px solid #1B4332',whiteSpace:'nowrap',verticalAlign:'middle'};
  const TH3={background:'#40916C',color:'#fff',padding:'4px 6px',fontSize:9,fontWeight:700,textAlign:'center',border:'1px solid #2D6A4F',whiteSpace:'nowrap'};
  const THTOT={...TH,background:'#0f2418'};
  const TH2TOT={...TH2,background:'#0f2418'};
  const TH3TOT={...TH3,background:'#0f2418'};
  const TD={padding:'4px 8px',fontSize:11,border:'1px solid #e5e7eb',textAlign:'right',whiteSpace:'nowrap'};

  const rowHeaderLabel=rowDims.map(v=>ROW_DIMS.find(d=>d.v===v)?.l||v).join(' › ');
  const hRows=isTwoLevel?3:colDims.length?2:1;

  const Chip=({label,onRemove,canRemove=true})=>ce('span',{style:{
    display:'inline-flex',alignItems:'center',gap:4,padding:'2px 6px 2px 10px',
    background:'#1B4332',color:'#fff',borderRadius:12,fontSize:11,fontWeight:700,
  }},label,canRemove&&ce('button',{onClick:onRemove,style:{
    background:'none',border:'none',color:'rgba(255,255,255,.8)',cursor:'pointer',padding:'0 2px',fontSize:14,lineHeight:1
  }},'×'));

  const AddPill=({label,onClick})=>ce('button',{onClick,style:{
    padding:'2px 10px',fontSize:11,fontWeight:600,borderRadius:12,cursor:'pointer',fontFamily:'inherit',
    background:'transparent',color:'#374151',border:'1px solid #d1d5db',
  }},'+ '+label);

  function exportPivot(){
    if(!window.XLSX){alert('XLSX not loaded');return;}
    const aoa=[];
    const h1=[rowHeaderLabel],h2=[''],h3=[''];
    for(const g of colStructure){
      if(isTwoLevel){h1.push(g.label,...Array((g.items.length*activeVals.length)-1).fill(''));}
      else{h1.push(g.label,...Array(activeVals.length-1).fill(''));}
      for(const item of g.items){
        if(isTwoLevel){h2.push(item.label,...Array(activeVals.length-1).fill(''));}
        for(const v of activeVals) h3.push(v.l);
      }
    }
    for(const v of activeVals){h1.push('TOTAL',...Array(activeVals.length-1).fill(''));h2.push('');h3.push(v.l);}
    if(isTwoLevel){aoa.push(h1,h2,h3);}else if(colDims.length){aoa.push(h1,h3);}else{aoa.push(h1);}
    for(const row of sortedRows){
      const r=[row.rv];
      for(const ck of orderedKeys) for(const v of activeVals) r.push((row.cells[ck]||{})[v.k]??'');
      for(const v of activeVals) r.push(row.total[v.k]??'');
      aoa.push(r);
      if(isNested){
        for(const sub of row.subRows){
          const sr=['↳ '+sub.rv];
          for(const ck of orderedKeys) for(const v of activeVals) sr.push((sub.cells[ck]||{})[v.k]??'');
          for(const v of activeVals) sr.push(sub.total[v.k]??'');
          aoa.push(sr);
        }
      }
    }
    const gr=['Σ Grand Total'];
    for(const ck of orderedKeys) for(const v of activeVals) gr.push((colTotals[ck]||{})[v.k]??'');
    for(const v of activeVals) gr.push(grand[v.k]??'');
    aoa.push(gr);
    exportXlsx({'Pivot':aoa},'RE_Pivot');
  }

  const colUnselected=COL_OPTIONS.filter(d=>!colDims.includes(d.v));
  const rowUnselected=ROW_DIMS.filter(d=>!rowDims.includes(d.v));

  return ce('div',{className:'fade-up'},
    ce('div',{style:{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:8,padding:'10px 14px',marginBottom:16,display:'flex',flexWrap:'wrap',gap:10,alignItems:'flex-start'}},
      ce('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
        ce('span',{style:{fontSize:9,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.07em',minWidth:48}},'ROWS'),
        rowDims.map(v=>ce(Chip,{key:v,label:ROW_DIMS.find(d=>d.v===v)?.l||v,canRemove:rowDims.length>1,onRemove:()=>setRowDims(prev=>prev.filter(d=>d!==v))})),
        rowUnselected.map(d=>ce(AddPill,{key:d.v,label:d.l,onClick:()=>setRowDims(prev=>prev.length>=2?[...prev.slice(1),d.v]:[...prev,d.v])}))
      ),
      ce('div',{style:{width:1,background:'#d1d5db',alignSelf:'stretch'}}),
      ce('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
        ce('span',{style:{fontSize:9,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.07em',minWidth:52}},'COLUMNS'),
        colDims.map(v=>ce(Chip,{key:v,label:COL_OPTIONS.find(d=>d.v===v)?.l||v,onRemove:()=>setColDims(prev=>prev.filter(d=>d!==v))})),
        colUnselected.map(d=>ce(AddPill,{key:d.v,label:d.l,onClick:()=>setColDims(prev=>prev.length>=2?[...prev.slice(1),d.v]:[...prev,d.v])}))
      ),
      ce('div',{style:{width:1,background:'#d1d5db',alignSelf:'stretch'}}),
      ce('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
        ce('span',{style:{fontSize:9,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.07em',minWidth:48}},'VALUES'),
        VAL_DEFS.map(v=>ce('button',{key:v.k,onClick:()=>setShowVals(p=>({...p,[v.k]:!p[v.k]})),style:{
          padding:'3px 10px',fontSize:11,fontWeight:700,borderRadius:12,cursor:'pointer',fontFamily:'inherit',
          background:showVals[v.k]?'#1B4332':'transparent',color:showVals[v.k]?'#fff':'#374151',
          border:'1px solid '+(showVals[v.k]?'#1B4332':'#d1d5db'),
        }},v.l))
      ),
      ce('div',{style:{width:1,background:'#d1d5db',alignSelf:'stretch'}}),
      ce('div',{style:{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}},
        ce('span',{style:{fontSize:9,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.07em',minWidth:48}},'SORT BY'),
        ce('select',{value:sortBy,onChange:e=>setSortBy(e.target.value),style:{fontSize:11,padding:'3px 6px',borderRadius:6,border:'1px solid #d1d5db',fontFamily:'inherit'}},
          VAL_DEFS.map(v=>ce('option',{key:v.k,value:v.k},v.l))),
        ce('select',{value:sortDir,onChange:e=>setSortDir(e.target.value),style:{fontSize:11,padding:'3px 6px',borderRadius:6,border:'1px solid #d1d5db',fontFamily:'inherit'}},
          ce('option',{value:'desc'},'↓ High → Low'),ce('option',{value:'asc'},'↑ Low → High'))
      ),
      ce('div',{style:{width:1,background:'#d1d5db',alignSelf:'stretch'}}),
      ce('div',{style:{display:'flex',alignItems:'center',gap:6}},
        ce('span',{style:{fontSize:9,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.07em',minWidth:48}},'SHOW'),
        ce('select',{value:showN,onChange:e=>setShowN(e.target.value),style:{fontSize:11,padding:'3px 6px',borderRadius:6,border:'1px solid #d1d5db',fontFamily:'inherit'}},
          ce('option',{value:'all'},'All rows'),ce('option',{value:'5'},'Top 5'),ce('option',{value:'10'},'Top 10'),ce('option',{value:'20'},'Top 20'))
      ),
      ce('div',{style:{marginLeft:'auto'}},ce(ExportBtn,{onClick:exportPivot}))
    ),
    ce('div',{style:{overflowX:'auto',borderRadius:8,border:'1px solid #e2e8f0',boxShadow:'0 1px 3px rgba(0,0,0,.06)'}},
      ce('table',{style:{borderCollapse:'collapse',fontSize:11,minWidth:'100%'}},
        ce('thead',null,
          ce('tr',null,
            ce('th',{rowSpan:hRows,style:{...TH,textAlign:'left',minWidth:140,position:'sticky',left:0,zIndex:3}},rowHeaderLabel),
            colDims.length===0?null:
            isTwoLevel
              ?colStructure.map(g=>ce('th',{key:g.label,colSpan:g.items.length*nv,style:TH},g.label))
              :colStructure.map(g=>ce('th',{key:g.label,colSpan:nv,style:TH},g.label)),
            ce('th',{colSpan:nv,rowSpan:isTwoLevel?2:1,style:THTOT},'TOTAL')
          ),
          colDims.length>0&&ce('tr',null,
            isTwoLevel
              ?colStructure.flatMap(g=>g.items.map(item=>ce('th',{key:item.key,colSpan:nv,style:TH2},item.label)))
              :colStructure.flatMap(g=>activeVals.map((v,vi)=>ce('th',{key:g.label+vi,style:TH2},v.l))),
            !isTwoLevel&&activeVals.map((v,vi)=>ce('th',{key:'tv'+vi,style:TH2TOT},v.l))
          ),
          isTwoLevel&&ce('tr',null,
            colStructure.flatMap(g=>g.items.flatMap((item)=>activeVals.map((v,vi)=>ce('th',{key:item.key+vi,style:TH3},v.l)))),
            activeVals.map((v,vi)=>ce('th',{key:'tv3'+vi,style:TH3TOT},v.l))
          )
        ),
        ce('tbody',null,
          sortedRows.flatMap((row,ri)=>[
            ce('tr',{key:row.rv,style:{background:isNested?'#f0fdf4':ri%2?'#f9fafb':'#fff'}},
              ce('td',{style:{...TD,textAlign:'left',fontWeight:isNested?800:600,position:'sticky',left:0,zIndex:1,background:isNested?'#f0fdf4':ri%2?'#f9fafb':'#fff',borderRight:'2px solid #d1d5db'}},row.rv),
              orderedKeys.flatMap(ck=>
                activeVals.map((v,vi)=>{
                  const val=(row.cells[ck]||{})[v.k];
                  return ce('td',{key:ck+vi,style:{...TD,background:v.k==='e2b'?e2bBg(val):'transparent',fontWeight:isNested?700:400}},fmt(val,v.k));
                })
              ),
              activeVals.map((v,vi)=>{
                const val=row.total[v.k];
                return ce('td',{key:'t'+vi,style:{...TD,fontWeight:700,background:v.k==='e2b'?e2bBg(val):'#f0fdf4'}},fmt(val,v.k));
              })
            ),
            ...(isNested?row.subRows.map((sub,si)=>
              ce('tr',{key:row.rv+'_'+sub.rv,style:{background:si%2?'#f9fafb':'#fff'}},
                ce('td',{style:{...TD,textAlign:'left',fontWeight:500,paddingLeft:24,position:'sticky',left:0,zIndex:1,background:si%2?'#f9fafb':'#fff',borderRight:'2px solid #d1d5db',color:'#374151'}},'↳ '+sub.rv),
                orderedKeys.flatMap(ck=>
                  activeVals.map((v,vi)=>{
                    const val=(sub.cells[ck]||{})[v.k];
                    return ce('td',{key:ck+vi,style:{...TD,background:v.k==='e2b'?e2bBg(val):'transparent'}},fmt(val,v.k));
                  })
                ),
                activeVals.map((v,vi)=>{
                  const val=sub.total[v.k];
                  return ce('td',{key:'t'+vi,style:{...TD,fontWeight:600,background:v.k==='e2b'?e2bBg(val):'#f9fafb'}},fmt(val,v.k));
                })
              )
            ):[])
          ]),
          ce('tr',{style:{background:'#dcfce7'}},
            ce('td',{style:{...TD,textAlign:'left',fontWeight:800,position:'sticky',left:0,zIndex:1,background:'#dcfce7',borderRight:'2px solid #52916C'}},'Σ Grand Total'),
            orderedKeys.flatMap(ck=>
              activeVals.map((v,vi)=>{
                const val=(colTotals[ck]||{})[v.k];
                return ce('td',{key:ck+vi,style:{...TD,fontWeight:700,background:v.k==='e2b'?e2bBg(val):'#dcfce7'}},fmt(val,v.k));
              })
            ),
            activeVals.map((v,vi)=>{
              const val=grand[v.k];
              return ce('td',{key:'gt'+vi,style:{...TD,fontWeight:800,background:v.k==='e2b'?e2bBg(val):'#bbf7d0'}},fmt(val,v.k));
            })
          )
        )
      )
    )
  );
});

/* ══════════════════════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════════════════════ */
const TABS=[
  {id:'overview',   label:'Overview'},
  {id:'source',     label:'Source Analysis'},
  {id:'ltxsrc',    label:'LT × Source'},
  {id:'modelxsrc', label:'Model × Source'},
  {id:'statexsrc', label:'Monthly State × Source'},
  {id:'geomodel',  label:'Model wise State × Source'},
  {id:'pivot',     label:'Pivot'},
];

function App({fbUser,role,presence,onSignOut,onAdminOpen}){
  const viewerMode=role==='viewer';
  const VIEWER_HIDDEN_TABS=['source','ltxsrc'];
  const [rows,setRows]=useState(null);
  const [tab,setTab]=useState('overview');
  /* If role changes to viewer while on a restricted tab, fall back to overview */
  useEffect(()=>{ if(viewerMode&&VIEWER_HIDDEN_TABS.includes(tab)) setTab('overview'); },[viewerMode]);
  /* startTransition keeps the click feeling instant — the active-tab highlight updates
     right away while the new tab's grids render in the background (isPending drives a
     subtle loading cue instead of the UI appearing to freeze). */
  const [isPending,startTransition]=useTransition();
  /* Each filter is a Set of selected values — empty Set means "All" (no restriction). */
  const [filters,setFilters]=useState(()=>({month:new Set(),source:new Set(),primarySrc:new Set(),state:new Set(),city:new Set(),model:new Set(),campaign:new Set()}));
  const [bookingMode,setBookingMode]=useState('update');
  function setFilterKey(key,valueOrFn){
    startTransition(()=>setFilters(prev=>({...prev,[key]:typeof valueOrFn==='function'?valueOrFn(prev[key]):valueOrFn})));
  }
  const [syncing,setSyncing]=useState(false);
  const [syncErr,setSyncErr]=useState(null);
  const [lastSynced,setLastSynced]=useState(null);
  const [showSyncPanel,setShowSyncPanel]=useState(false);
  const [sheetUrl,setSheetUrl]=useState(()=>localStorage.getItem('re_ldr_sheet_url')||SHEETS_CONFIG.LDR_SHEET_URL||'');
  const [urlDraft,setUrlDraft]=useState('');

  const handleSync=useCallback(async(url)=>{
    const u=(url||sheetUrl||SHEETS_CONFIG.LDR_SHEET_URL||'').trim();
    if(!u){setShowSyncPanel(true);setSyncErr('Paste your Google Sheets URL and click Sync.');return;}
    setSyncing(true);setSyncErr(null);
    try{
      const csv=await fetchSheetCsv(u);
      const raw=parseCsvToRows(csv);
      if(!raw.length) throw new Error('No rows found in sheet.');
      const parsed=parseRows(raw);
      if(!parsed.length) throw new Error('Rows found but none matched expected column format.');
      setRows(parsed);
      setLastSynced(new Date());
      setShowSyncPanel(false);
      /* Cache to localStorage after the UI updates — JSON.stringify on tens of
         thousands of rows is blocking and shouldn't delay the paint. */
      setTimeout(()=>{ try{localStorage.setItem('re_ldr_data',JSON.stringify(parsed.slice(0,50000)));}catch(e){} },0);
    }catch(e){setSyncErr(e.message);setShowSyncPanel(true);}
    finally{setSyncing(false);}
  },[sheetUrl]);

  useEffect(()=>{
    const u=sheetUrl||SHEETS_CONFIG.LDR_SHEET_URL;
    if(SHEETS_CONFIG.AUTO_SYNC_ON_LOAD&&u&&u!=='INJECT_SHEET_URL_HERE') handleSync(u);
  },[]);// eslint-disable-line

  useEffect(()=>{
    try{
      const saved=localStorage.getItem('re_ldr_data');
      if(saved){const p=JSON.parse(saved);if(p&&p.length)setRows(p);}
    }catch(e){}
  },[]);

  const months=useMemo(()=>rows?[...new Set(rows.map(r=>r.lead_month))].filter(Boolean).sort((a,b)=>monthOrder(a)-monthOrder(b)):[], [rows]);
  const sources=useMemo(()=>rows?[...new Set(rows.map(r=>r.source))].filter(Boolean).sort():[],[rows]);
  const primSrcs=useMemo(()=>rows?[...new Set(rows.map(r=>r.primary_src))].filter(Boolean).sort():[],[rows]);
  const states=useMemo(()=>rows?[...new Set(rows.map(r=>r.state))].filter(Boolean).sort():[],[rows]);
  const cities=useMemo(()=>rows?[...new Set(rows.map(r=>r.city))].filter(Boolean).sort():[],[rows]);
  const models=useMemo(()=>rows?[...new Set(rows.map(r=>r.model))].filter(Boolean).sort():[],[rows]);
  const campaigns=useMemo(()=>rows?[...new Set(rows.map(r=>r.utm_campaign))].filter(v=>v&&v!=='Unknown').sort():[],[rows]);

  /* Base rows: filtered by source/state/city/model/primarySrc but NOT by month.
     Month filtering is intentionally excluded here — backward attribution requires
     rows from up to 2 months before the selected month (e.g. July bookings include
     leads from May and June). Pre-filtering by lead_month removes those earlier rows,
     causing booking counts to collapse when a specific month is selected.
     The `mf` parameter passed to each aggregation function handles month scoping. */
  const baseRows=useMemo(()=>{
    if(!rows) return [];
    return rows.filter(r=>
      (filters.source.size===0||filters.source.has(r.source))&&
      (filters.primarySrc.size===0||filters.primarySrc.has(r.primary_src))&&
      (filters.state.size===0||filters.state.has(r.state))&&
      (filters.city.size===0||filters.city.has(r.city))&&
      (filters.model.size===0||filters.model.has(r.model))&&
      (filters.campaign.size===0||filters.campaign.has(r.utm_campaign))
    );
  },[rows,filters.source,filters.primarySrc,filters.state,filters.city,filters.model,filters.campaign]);

  const mf=filters.month.size===1?[...filters.month][0]:'All';

  const totalM=useMemo(()=>aggRE(baseRows,mf,bookingMode),[baseRows,mf,bookingMode]);

  /* Only render the active tab. Every dimension's aggregation now runs through the
     single-pass aggGrouped() (see aggGrouped above), so even a fresh mount of the
     heaviest grid is a handful of milliseconds on real-world data sizes — there's no
     longer a reason to keep every previously-visited tab mounted (display:none) in the
     background, and doing so meant a filter change re-ran every visited tab's
     aggregations, not just the one on screen. */
  const activeTabEl=useMemo(()=>{
    const COMPONENTS={
      overview:  OverviewTab,
      source:    SourceTab,
      ltxsrc:    LTSourceTab,
      modelxsrc: ModelSourceTab,
      statexsrc: StateSourceTab,
      geomodel:  GeoModelTab,
      pivot:     PivotTab,
    };
    return ce(COMPONENTS[tab],{key:tab,rows:baseRows,mf,viewerMode,bm:bookingMode});
  },[tab,baseRows,mf,viewerMode,bookingMode]);

  if(!rows) return ce(UploadScreen,{onData:setRows,onSync:handleSync,syncing,syncErr,sheetUrl,setSheetUrl,urlDraft,setUrlDraft,lastSynced});

  return ce('div',{style:{minHeight:'100vh'}},
    /* Header */
    ce('div',{style:{background:'#2D6A4F',padding:'0 24px',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 16px rgba(45,106,79,.35)'}},
      ce('div',{style:{maxWidth:1600,margin:'0 auto',display:'flex',alignItems:'center',gap:16}},
        ce('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'10px 0',flexShrink:0}},
          ce('div',{style:{width:34,height:34,borderRadius:8,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:900,color:'#2D6A4F',boxShadow:'0 2px 8px rgba(0,0,0,.15)'}},'RE'),
          ce('div',null,
            ce('div',{style:{fontSize:13,fontWeight:800,color:'#fff',letterSpacing:'-.02em'}},'Royal Enfield · LDR'),
            ce('div',{style:{fontSize:9,color:'#D8EED8',letterSpacing:'.07em',fontWeight:600}},'LEAD DISPOSITION DASHBOARD v1.0 · BikeDekho')
          )
        ),
        ce('div',{style:{flex:1,display:'flex',gap:14,overflowX:'auto',padding:'8px 0',borderLeft:'1px solid rgba(255,255,255,.3)',paddingLeft:16,marginLeft:4}},
          [
            {l:'Total',  v:Nf(totalM.totalLeads)},
            {l:'Unique', v:Nf(totalM.uniqueLeads)},
            {l:'Dup%',   v:totalM.dupPct.toFixed(1)+'%'},
            {l:'Bookings',v:Nf(totalM.bookings)},
            {l:'E2B%',   v:totalM.e2bPct.toFixed(1)+'%'},
          ].map((k,i)=>ce('div',{key:i,style:{flexShrink:0,textAlign:'center',minWidth:56}},
            ce('div',{style:{fontSize:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#D8EED8'}},k.l),
            ce('div',{style:{fontSize:13,fontWeight:800,color:'#fff',fontFamily:'DM Mono,monospace',letterSpacing:'-.02em'}},k.v)
          ))
        ),
        ce('button',{onClick:()=>handleSync(),disabled:syncing,
          style:{flexShrink:0,padding:'6px 16px',background:syncing?'rgba(255,255,255,.7)':'#fff',border:'none',borderRadius:20,color:'#1B4332',fontSize:10,cursor:syncing?'default':'pointer',fontFamily:'inherit',fontWeight:700,boxShadow:'0 2px 8px rgba(0,0,0,.12)',display:'flex',alignItems:'center',gap:5}},
          syncing?ce('span',{style:{display:'inline-block',animation:'spin .8s linear infinite',fontSize:11}},'⟳'):'🔄',
          syncing?'Syncing…':'Sync Sheets'
        ),
        ce('button',{onClick:()=>{setUrlDraft(sheetUrl);setShowSyncPanel(p=>!p);},title:'Configure Google Sheets URL',
          style:{flexShrink:0,padding:'6px 10px',background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',borderRadius:20,color:'#fff',fontSize:11,cursor:'pointer',fontFamily:'inherit'}},'⚙'),
        ce('button',{
          onClick:()=>{if(confirm('Clear data and upload new file?')){localStorage.removeItem('re_ldr_data');setRows(null);}},
          style:{flexShrink:0,padding:'6px 16px',background:'transparent',border:'1px solid rgba(255,255,255,.3)',borderRadius:20,color:'#fff',fontSize:10,cursor:'pointer',fontFamily:'inherit',fontWeight:600}
        },'⬆ File'),
        ce('div',{style:{borderLeft:'1px solid rgba(255,255,255,.25)',paddingLeft:10,marginLeft:4,flexShrink:0}},
          ce(PresenceStrip,{presence,fbUser,role,onSignOut,onAdminOpen})
        )
      )
    ),

    /* Sync panel */
    showSyncPanel&&ce('div',{style:{background:'#F0F7F4',borderBottom:'2px solid #A8D5BA',padding:'12px 24px',position:'sticky',top:54,zIndex:98,boxShadow:'0 4px 12px rgba(45,106,79,.1)'}},
      ce('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
        ce('span',{style:{fontSize:10,fontWeight:700,color:'#1B4332',textTransform:'uppercase',letterSpacing:'.07em',whiteSpace:'nowrap'}},'📊 Google Sheets URL'),
        ce('input',{type:'text',value:urlDraft,onChange:e=>setUrlDraft(e.target.value),
          placeholder:'https://docs.google.com/spreadsheets/d/…',
          style:{flex:1,minWidth:320,padding:'6px 14px',border:'1px solid #A8D5BA',borderRadius:20,fontSize:11,fontFamily:'inherit',outline:'none',background:'#fff',color:'#0a1f14'}
        }),
        ce('button',{
          onClick:()=>{const u=urlDraft.trim();if(!u){setSyncErr('Please paste a Google Sheets URL.');return;}setSheetUrl(u);try{localStorage.setItem('re_ldr_sheet_url',u);}catch(e){}handleSync(u);},
          disabled:syncing,
          style:{padding:'6px 20px',background:'#2D6A4F',border:'none',borderRadius:20,color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}
        },syncing?'⟳ Syncing…':'🔄 Sync Now'),
        ce('button',{onClick:()=>{setShowSyncPanel(false);setSyncErr(null);},

      ),
      syncErr&&ce('div',{style:{marginTop:8,padding:'6px 12px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,fontSize:11,color:'#dc2626',fontWeight:500,whiteSpace:'pre-wrap'}},'⚠ '+syncErr),

      ce('div',{style:{marginTop:6,fontSize:10,color:'#1B4332'}},'💡 Share first: Google Sheets → File → Share → Anyone with the link → ',ce('strong',null,'Viewer'),' · No API key needed')
    ),

    /* Sync status bar */
    !showSyncPanel&&(syncErr||lastSynced)&&ce('div',{
      style:{background:syncErr?'#fef2f2':'#f0fdf4',borderBottom:'1px solid '+(syncErr?'#fecaca':'#bbf7d0'),padding:'5px 24px',display:'flex',alignItems:'center',gap:8,position:'sticky',top:54,zIndex:98}},
      syncErr
        ?ce('span',{style:{fontSize:10,color:'#dc2626',flex:1}},'⚠ Sync error: '+syncErr+' — ',ce('span',{style:{cursor:'pointer',textDecoration:'underline'},onClick:()=>{setUrlDraft(sheetUrl);setShowSyncPanel(true);}},'configure URL'))
        :ce('span',{style:{fontSize:10,color:'#166534'}},'✓ Synced from Google Sheets · '+lastSynced.toLocaleString()+' · '+rows.length.toLocaleString()+' rows')
    ),

    /* Tab bar */
    ce('div',{style:{background:'#fff',borderBottom:'2px solid #D8EED8',position:'sticky',top:54,zIndex:99,boxShadow:'0 2px 8px rgba(45,106,79,.08)'}},
      ce('div',{style:{maxWidth:1600,margin:'0 auto',display:'flex',alignItems:'center',gap:0,padding:'0 24px',opacity:isPending?0.6:1,transition:'opacity .15s'}},
        TABS.filter(t=>!(viewerMode&&['source','ltxsrc'].includes(t.id)))
          .map(t=>ce('button',{key:t.id,className:'tab-pill'+(tab===t.id?' active':''),onClick:()=>startTransition(()=>setTab(t.id))},t.label)),
        isPending&&ce('span',{style:{marginLeft:12,fontSize:12,color:'#6B7280'}},'Loading…')
      )
    ),

    /* Filter bar */
    ce('div',{style:{maxWidth:1600,margin:'0 auto',padding:'14px 24px 0',opacity:isPending?0.6:1,transition:'opacity .15s'}},
      ce('div',{className:'filter-bar'},
        ce('label',null,'Filters'),
        ...[
          {k:'month',     label:'Lead Month',     opts:months},
          {k:'source',    label:'Source',          opts:sources,  viewerHide:true},
          {k:'primarySrc',label:'Primary Source',  opts:primSrcs},

          {k:'model',     label:'Model',           opts:models},
          {k:'state',     label:'State',           opts:states},
          {k:'city',      label:'City',            opts:cities},
        ].filter(f=>!(viewerMode&&f.viewerHide))
        .map(f=>ce('div',{key:f.k,style:{display:'flex',alignItems:'center',gap:5}},
          ce('span',{style:{fontSize:10,color:'#64748b',fontWeight:600}},f.label+':'),

        Object.values(filters).some(s=>s.size>0)&&
          ce('button',{
            onClick:()=>startTransition(()=>setFilters({month:new Set(),source:new Set(),primarySrc:new Set(),state:new Set(),city:new Set(),model:new Set(),campaign:new Set()})),
            style:{padding:'4px 12px',fontSize:10,background:'#D8EED8',border:'1px solid #A8D5BA',borderRadius:20,cursor:'pointer',fontFamily:'inherit',color:'#1B4332',fontWeight:600}

        ce('div',{style:{display:'flex',alignItems:'center',gap:4,marginLeft:8,flexShrink:0}},
          ce('span',{style:{fontSize:10,color:'#64748b',fontWeight:600,whiteSpace:'nowrap'}},'Booking Method:'),
          ce('div',{style:{display:'flex',borderRadius:20,overflow:'hidden',border:'1px solid #A8D5BA',fontSize:10,fontWeight:700}},
            ce('button',{
              onClick:()=>setBookingMode('update'),
              style:{padding:'4px 10px',background:bookingMode==='update'?'#2D6A4F':'#fff',color:bookingMode==='update'?'#fff':'#1B4332',border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,whiteSpace:'nowrap'}
            },'On Update'),
            ce('button',{
              onClick:()=>setBookingMode('create'),
              style:{padding:'4px 10px',background:bookingMode==='create'?'#2D6A4F':'#fff',color:bookingMode==='create'?'#fff':'#1B4332',border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:700,borderLeft:'1px solid #A8D5BA',whiteSpace:'nowrap'}
            },'On Create')
          )
        ),
        ce('span',{style:{marginLeft:'auto',fontSize:10,fontFamily:'DM Mono',color:'#94a3b8'}},
          Nf(totalM.uniqueLeads)+' unique leads shown')
      )
    ),

    /* Tab content — only the active tab is mounted. */
    ce('div',{style:{maxWidth:1600,margin:'0 auto',padding:'14px 24px 32px'}},
      activeTabEl
    )
  );
}

function ensureUserDoc(user){
  var ref=getFbDb().collection(USERS_COL).doc(user.uid);
  return ref.get().then(function(snap){
    if(!snap.exists){
      return ref.set({
        email:user.email,
        displayName:user.displayName||user.email,
        photoURL:user.photoURL||'',
        role:user.email===ADMIN_EMAIL?'admin':'pending',
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
    } else if(snap.data().email!==user.email){
      return ref.update({email:user.email,displayName:user.displayName||user.email,photoURL:user.photoURL||''});
    }
  });
}

function setupPresence(user){
  var presRef=getFbRTDB().ref(PRESENCE_PATH+'/'+user.uid);
  presRef.set({uid:user.uid,email:user.email,name:user.displayName||user.email,photo:user.photoURL||'',ts:firebase.database.ServerValue.TIMESTAMP});
  presRef.onDisconnect().remove();
  return presRef;
}

/* ── Presence strip (who's live) ─────────────────────────────────── */
function PresenceStrip({presence,fbUser,role,onSignOut,onAdminOpen}){
  var pArr=Object.values(presence||{});
  var others=pArr.filter(function(p){return p.uid!==fbUser.uid;});
  var selfPres=pArr.find(function(p){return p.uid===fbUser.uid;})||{name:fbUser.displayName,photo:fbUser.photoURL,email:fbUser.email,uid:fbUser.uid};
  var COLORS=['#2563eb','#16a34a','#d97706','#7c3aed','#db2777','#0891b2','#ea580c','#0d9488'];
  function colorFor(uid){return COLORS[((uid||'').charCodeAt(0)+((uid||'').charCodeAt(1)||0))%COLORS.length]||COLORS[0];}
  function initials(n){return((n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2)||'?').toUpperCase();}
  function Av(p,highlight){
    return ce('div',{key:p.uid,className:'avatar',style:{background:colorFor(p.uid),border:highlight?'2px solid #A8D5BA':'2px solid rgba(255,255,255,.4)'},title:p.name||p.email},
      ce('div',{className:'avatar-tip'},p.name||p.email),
      p.photo?ce('img',{src:p.photo,style:{width:'100%',height:'100%',borderRadius:'50%',objectFit:'cover'},alt:''}):initials(p.name||p.email)
    );
  }
  return ce('div',{className:'presence-strip'},
    others.length>0&&ce('div',{style:{display:'flex',alignItems:'center',gap:2,marginRight:4}},
      ce('span',{style:{fontSize:8,color:'rgba(255,255,255,.6)',textTransform:'uppercase',letterSpacing:'.07em',marginRight:4}},'Live:'),
      others.slice(0,6).map(function(p){return Av(p,false);}),
      others.length>6&&ce('div',{className:'avatar',style:{background:'rgba(255,255,255,.25)',fontSize:9,color:'#fff'}},'+' +(others.length-6))
    ),
    Av(selfPres,true),
    (role==='admin'||role==='full')&&ce('span',{className:'viewer-badge',style:{background:'rgba(255,255,255,.15)',color:'#D8EED8',borderRadius:20,padding:'2px 8px',fontSize:9,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',marginLeft:4}},role==='admin'?'Admin':'Full'),
    role==='viewer'&&ce('span',{className:'viewer-badge',style:{marginLeft:4}},'Viewer'),
    (role==='admin')&&ce('button',{
      style:{marginLeft:6,padding:'4px 10px',borderRadius:6,border:'1px solid rgba(255,255,255,.3)',background:'rgba(255,255,255,.12)',fontSize:11,cursor:'pointer',color:'#fff',fontWeight:600,fontFamily:'inherit',whiteSpace:'nowrap'},
      onClick:onAdminOpen
    },'⚙ Admin'),
    ce('button',{
      style:{marginLeft:4,padding:'4px 10px',borderRadius:6,border:'1px solid rgba(255,255,255,.3)',background:'rgba(255,255,255,.1)',fontSize:11,cursor:'pointer',color:'rgba(255,255,255,.85)',fontFamily:'inherit',whiteSpace:'nowrap'},
      onClick:onSignOut
    },'Sign Out')
  );
}

/* ── Admin panel — role management ─────────────────────────────── */
function AdminPanel({onClose}){
  var[users,setUsers]=useState([]);
  var[saving,setSaving]=useState(null);
  var[panelErr,setPanelErr]=useState('');
  useEffect(function(){
    var unsub=getFbDb().collection(USERS_COL).orderBy('createdAt','asc').onSnapshot(
      function(snap){setUsers(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}));},
      function(e){setPanelErr(e.message);}
    );
    return unsub;
  },[]);
  function changeRole(uid,newRole){
    setSaving(uid);
    getFbDb().collection(USERS_COL).doc(uid).update({role:newRole})
      .then(function(){setSaving(null);})
      .catch(function(e){setPanelErr(e.message);setSaving(null);});
  }
  var roleColor={admin:'#92400e',full:'#15803d',viewer:'#1d4ed8',pending:'#6b7280'};
  var roleBg={admin:'#fef3c7',full:'#dcfce7',viewer:'#dbeafe',pending:'#f3f4f6'};
  return ce('div',{className:'admin-panel-overlay',onClick:function(e){if(e.target===e.currentTarget)onClose();}},
    ce('div',{className:'admin-card'},
      ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}},
        ce('span',{style:{fontSize:15,fontWeight:700,color:'#111827'}},'👥 User Access Management'),
        ce('button',{style:{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#9ca3af',lineHeight:1},onClick:onClose},'×')
      ),
      ce('p',{style:{fontSize:11,color:'#6b7280',margin:'0 0 14px',lineHeight:1.7}},
        ce('strong',null,'pending'),' — awaiting access  ·  ',
        ce('strong',null,'viewer'),' — totals only (no source breakdown)  ·  ',
        ce('strong',null,'full'),' — all columns  ·  ',
        ce('strong',null,'admin'),' — full + manage users'
      ),
      panelErr&&ce('div',{style:{background:'#fef2f2',color:'#dc2626',padding:'8px 12px',borderRadius:8,fontSize:12,marginBottom:12}},panelErr),
      ce('div',{style:{overflowX:'auto'}},
        ce('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12,minWidth:480}},
          ce('thead',null,ce('tr',{style:{background:'#f0f7f4'}},
            ['Email','Name','Role','Change To'].map(function(h,i){
              return ce('th',{key:i,style:{padding:'8px 10px',textAlign:'left',fontWeight:700,color:'#1B4332',fontSize:11,borderBottom:'2px solid #A8D5BA'}},h);
            })
          )),
          ce('tbody',null,users.map(function(u){
            return ce('tr',{key:u.id,style:{borderBottom:'1px solid #F0F7F4'}},
              ce('td',{style:{padding:'7px 10px',color:'#6b7280',fontSize:11,maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},u.email),
              ce('td',{style:{padding:'7px 10px',color:'#374151',fontSize:11,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},u.displayName||'—'),
              ce('td',{style:{padding:'7px 10px'}},
                ce('span',{style:{padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:700,background:roleBg[u.role]||roleBg.pending,color:roleColor[u.role]||roleColor.pending}},u.role||'pending')
              ),
              ce('td',{style:{padding:'7px 10px'}},
                u.email===ADMIN_EMAIL
                  ?ce('span',{style:{fontSize:11,color:'#9ca3af'}},'—')
                  :saving===u.id
                    ?ce('span',{style:{fontSize:11,color:'#9ca3af'}},'Saving…')
                    :ce('select',{
                        value:u.role||'pending',
                        onChange:function(e){changeRole(u.id,e.target.value);},
                        style:{fontSize:11,padding:'3px 8px',borderRadius:6,border:'1px solid #d1d5db',cursor:'pointer',background:'#fff',fontFamily:'inherit'}
                      },
                      ['pending','viewer','full','admin'].map(function(r){
                        return ce('option',{key:r,value:r},r.charAt(0).toUpperCase()+r.slice(1));
                      })
                    )
              )
            );
          }))
        )
      )
    )
  );
}

/* ── AuthGate — wraps App, handles login / role / presence ──────── */
function AuthGate(){
  var[authState,setAuthState]=useState('loading');
  var[fbUser,setFbUser]=useState(null);
  var[role,setRole]=useState(null);
  var[presence,setPresence]=useState({});
  var[authErr,setAuthErr]=useState('');
  var[authLoading,setAuthLoading]=useState(false);
  var[showAdmin,setShowAdmin]=useState(false);
  var cleanups=React.useRef([]);

  useEffect(function(){
    var auth=getFbAuth();
    var unsubAuth=auth.onAuthStateChanged(function(user){
      cleanups.current.forEach(function(f){try{f();}catch(e){}});
      cleanups.current=[];
      if(!user){setAuthState('unauth');setFbUser(null);setRole(null);setPresence({});return;}
      if(!user.email||!ALLOWED_DOMAINS.some(d=>user.email.endsWith(d))){
        setAuthErr('Only @girnarsoft.com or @girnarcare.com accounts are allowed.');
        auth.signOut();return;
      }
      setFbUser(user);
      ensureUserDoc(user).catch(function(e){console.error('[Auth] ensureUserDoc:',e.message);});
      var presRef=setupPresence(user);
      cleanups.current.push(function(){try{presRef.remove();}catch(e){}});
      var unsubRole=getFbDb().collection(USERS_COL).doc(user.uid).onSnapshot(
        function(snap){
          var r=(snap.data()||{}).role||'pending';
          setRole(r);
          setAuthState(r==='pending'?'pending':'authed');
        },
        function(e){console.error('[Auth] role watch:',e.message);}
      );
      cleanups.current.push(unsubRole);
      var presListenRef=getFbRTDB().ref(PRESENCE_PATH);
      presListenRef.on('value',function(snap){setPresence(snap.val()||{});});
      cleanups.current.push(function(){presListenRef.off();});
    });
    return function(){unsubAuth();cleanups.current.forEach(function(f){try{f();}catch(e){}});};
  },[]);

  function handleLogin(){
    setAuthLoading(true);setAuthErr('');
    var provider=new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({prompt:'select_account'});
    getFbAuth().signInWithPopup(provider)
      .catch(function(e){if(e.code!=='auth/popup-closed-by-user')setAuthErr(e.message);})
      .then(function(){setAuthLoading(false);},function(){setAuthLoading(false);});
  }

  function handleSignOut(){
    cleanups.current.forEach(function(f){try{f();}catch(e){}});
    getFbAuth().signOut();
  }

  if(authState==='loading')return ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#6b7280',fontSize:13,fontFamily:'DM Mono,monospace'}},'Authenticating…');
  if(authState==='unauth')return ce(LoginPage,{onLogin:handleLogin,loading:authLoading,error:authErr});
  if(authState==='pending')return ce(PendingPage,{user:fbUser,onSignOut:handleSignOut});

  return ce(React.Fragment,null,
    showAdmin&&ce(AdminPanel,{onClose:function(){setShowAdmin(false);}}),
    ce(App,{fbUser:fbUser,role:role,presence:presence,onSignOut:handleSignOut,onAdminOpen:function(){setShowAdmin(true);}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(ce(AuthGate,null));
</script>
</body>
