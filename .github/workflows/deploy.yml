name: Deploy Royal Enfield LDR Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Google Sheets URL
        env:
          RE_SHEET_URL: ${{ secrets.RE_SHEET_URL }}
        run: |
          python3 - <<'EOF'
          import os
          import json
          url = os.environ['RE_SHEET_URL'].strip().strip("'\"")
          with open('RE_LDR_Dashboard_v1.0.html', 'r', encoding='utf-8') as f:
              content = f.read()
          content = content.replace('"INJECT_SHEET_URL_HERE"', json.dumps(url))
          with open('RE_LDR_Dashboard_v1.0.html', 'w', encoding='utf-8') as f:
              f.write(content)
          print('Injected URL:', url[:40], '...')
          EOF

      - name: Prepare site
        run: |
          mkdir -p _site
          cp RE_LDR_Dashboard_v1.0.html _site/index.html
          cp _site/index.html _site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
