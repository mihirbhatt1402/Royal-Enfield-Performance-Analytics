      ce('span',{style:{fontSize:10,color:'#C2410C'}},'Latest month first · '+months.length+' months')
    ),

    months.map(mo=>renderLTTable('LT × Source — '+mo, normRows.filter(r=>r.month===mo), mo))
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   STATE × SOURCE TAB  (same format as LT × Source)
══════════════════════════════════════════════════════════════════════════ */
function StateSourceTab({rows}){
  const normRows=useMemo(()=>rows,[rows]);
  const sources=useMemo(()=>[...new Set(normRows.map(r=>r.source))].filter(Boolean).sort(),[normRows]);
  const states =useMemo(()=>[...new Set(normRows.map(r=>r.state))].filter(Boolean),[normRows]);

  /* ── Sort controls ───────────────────────────────────────────────────────── */
  const [sortSrc,  setSortSrc ]=useState('__total__');
  const [sortCol,  setSortCol ]=useState('total');
  const [sortDir,  setSortDir ]=useState('desc');

  /* ── State → City drill-down ─────────────────────────────────────────────── */
  const [expandedStates, setExpandedStates]=useState({});
  const toggleState=st=>setExpandedStates(prev=>({...prev,[st]:!prev[st]}));

  const COL_OPTIONS=[
    {val:'total',    label:'Total Leads'},
    {val:'interested',label:'Interested'},
    {val:'convPct',  label:'L2E %'},
    {val:'connPct',  label:'Conn %'},
    {val:'l2eOnConn',label:'L2E on Connected'},
    {val:'openPct',  label:'Open %'},
    {val:'dupPct',   label:'Dup %'},
  ];

  const getMetric=(m,col)=>{
    switch(col){
      case'total':    return m.total;
      case'interested':return m.interested;
      case'convPct':  return m.convPct;
      case'connPct':  return m.connPct;
      case'l2eOnConn':return m.l2eOnConn;
      case'openPct':  return m.openPct;
      case'dupPct':   return m.dupPct;
      default:        return m.total;
    }
  };

  /* Generic state-sorter — used for overall table and reused per-month */
  const sortStatesIn=useCallback((tblRows,stateList)=>{
    return [...stateList].sort((a,b)=>{
      const stA=tblRows.filter(r=>r.state===a);
      const stB=tblRows.filter(r=>r.state===b);
      const mA=sortSrc==='__total__'?agg(stA):agg(stA.filter(r=>r.source===sortSrc));
      const mB=sortSrc==='__total__'?agg(stB):agg(stB.filter(r=>r.source===sortSrc));
      const vA=getMetric(mA,sortCol);
      const vB=getMetric(mB,sortCol);
      return sortDir==='desc'?vB-vA:vA-vB;
    });
  },[sortSrc,sortCol,sortDir]);

  const sortedStates=useMemo(()=>sortStatesIn(normRows,states),[normRows,states,sortStatesIn]);
  const grandM   =useMemo(()=>agg(normRows),[normRows]);
  const srcTotals=useMemo(()=>{const t={};for(const s of sources)t[s]=agg(normRows.filter(r=>r.source===s));return t;},[normRows,sources]);

  /* ── Month-wise breakdown — latest month first ─────────────────────────── */
  const months=useMemo(()=>
    [...new Set(normRows.map(r=>r.month))].filter(Boolean)
      .sort((a,b)=>monthSortKey(b)-monthSortKey(a))
  ,[normRows]);

  const CELL_BG={'__total__':'#FFF7ED','Adwords':'#EFF6FF','Organic':'#F0FDF4','Non MS':'#FAF5FF'};
  const getCellBg=src=>CELL_BG[src]||'#FFF8F1';
  const TD={padding:'4px 6px',border:'1px solid #FFEDD5',fontSize:10,textAlign:'center',fontFamily:'DM Mono,monospace',verticalAlign:'middle'};
  const TDL={...TD,textAlign:'left',fontFamily:'inherit',fontWeight:600,color:'#431407',background:'#fff',position:'sticky',left:0,zIndex:1,borderRight:'2px solid #FED7AA'};
  const TDT={...TD,background:'#7C2D12',color:'#fff7ed',fontWeight:700};
  const TDTl={...TDT,textAlign:'left',fontFamily:'inherit',color:'#fed7aa',borderRight:'2px solid #92400E'};

  function mk(m,pfx,dark=false,cellBg='#fff'){
    const bg  = dark?'#7C2D12':cellBg;
    const tc  = dark?'#fff7ed':'#111827';
    const dim = dark?'#fed7aa88':'#6b7280';
    const b   = {...TD,background:bg};
    return[
      ce('td',{key:pfx+'t',style:{...b,color:tc,fontWeight:700,borderLeft:'2px solid rgba(0,0,0,.06)'}},m.total?Nf(m.total):'—'),
      ce('td',{key:pfx+'i',style:{...b,color:tc,fontWeight:m.interested?600:400}},m.interested?Nf(m.interested):'—'),
      ce('td',{key:pfx+'l',style:{...b,color:m.total>0?tc:dim}},m.total>0?m.convPct.toFixed(1)+'%':'—'),
      ce('td',{key:pfx+'cp',style:{...b,color:m.total>0?tc:dim}},m.total>0?m.connPct.toFixed(1)+'%':'—'),
      ce('td',{key:pfx+'lc',style:{...b,color:m.connected>0?tc:dim}},m.connected>0?m.l2eOnConn.toFixed(1)+'%':'—'),
      ce('td',{key:pfx+'op',style:{...b,color:m.total>0?tc:dim}},m.total>0?m.openPct.toFixed(1)+'%':'—'),
      ce('td',{key:pfx+'dp',style:{...b,color:m.total>0?tc:dim}},m.total>0?m.dupPct.toFixed(1)+'%':'—'),
    ];
  }

  const SUB=[{l:'Total',t:'Total Leads'},{l:'Int',t:'Interested'},{l:'L2E%',t:'Interested ÷ Total'},
    {l:'Conn%',t:'Connectivity%'},{l:'L2E↑Conn',t:'Interested ÷ Connected'},{l:'Open%',t:'Open ÷ Total'},{l:'Dup%',t:'Duplicity%'}];
  const SUB_C=['#fed7aa','#86efac','#6ee7b7','#67e8f9','#a5f3fc','#c4b5fd','#fbbf24'];
  const SRC_BG={'__total__':'#7C2D12','Adwords':'#1E40AF','Organic':'#166534','Non MS':'#5B21B6'};
  const SRC_BG_DEF='#374151';
  const NCOLS=7;
  const totalCols=1+(1+sources.length)*NCOLS;
  const TH={padding:'6px 4px',fontWeight:700,fontSize:9,textTransform:'uppercase',letterSpacing:'.05em',color:'#fff',background:'#7C2D12',textAlign:'center',border:'1px solid rgba(255,255,255,.12)',whiteSpace:'nowrap',position:'sticky',top:0,zIndex:2};
  const THS={...TH,background:'#92400E',fontSize:8,color:'#fed7aa',position:'sticky',top:30,zIndex:1,padding:'4px 4px'};

  const ddStyle={padding:'4px 10px',fontSize:10,fontFamily:'inherit',fontWeight:600,
    border:'1px solid #FED7AA',borderRadius:8,background:'#fff',color:'#7C2D12',cursor:'pointer',outline:'none'};

  /* Reusable cross-tab table renderer — used for overall + each month */
  function renderStateTable(title, tblRows, key){
    const stStates=[...new Set(tblRows.map(r=>r.state))].filter(Boolean);
    const stSorted=sortStatesIn(tblRows,stStates);
    const stGM=agg(tblRows);
    const stST={}; for(const s of sources) stST[s]=agg(tblRows.filter(r=>r.source===s));
    return ce('div',{key:key,style:{marginBottom:18}},
      ce('div',{style:{marginBottom:8,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
        ce('span',{style:{fontSize:11,fontWeight:700,color:'#7C2D12'}},title),
        ce('span',{style:{fontSize:10,color:'#C2410C'}},stSorted.length+' States')
      ),
      ce('div',{className:'card',style:{padding:0,overflow:'hidden'}},
        ce('table',{style:{width:'100%',borderCollapse:'collapse',tableLayout:'fixed'}},
          ce('thead',null,
            ce('tr',null,
              ce('th',{rowSpan:2,style:{...TH,width:'7%',textAlign:'left',position:'sticky',left:0,zIndex:4,background:'#7C2D12'}},'State'),
              ce('th',{colSpan:NCOLS,style:{...TH,background:SRC_BG['__total__'],borderLeft:'2px solid rgba(255,255,255,.3)',borderRight:'2px solid rgba(255,255,255,.3)'}},'∑ Total'),
              sources.map(s=>ce('th',{key:s,colSpan:NCOLS,style:{...TH,background:SRC_BG[s]||SRC_BG_DEF,borderLeft:'2px solid rgba(255,255,255,.25)',borderRight:'2px solid rgba(255,255,255,.25)'}},s))
            ),
            ce('tr',null,
              SUB.map((s,i)=>ce('th',{key:'t'+i,title:s.t,style:{...THS,color:SUB_C[i]}},s.l)),
              sources.flatMap(src=>SUB.map((s,i)=>ce('th',{key:src+i,title:s.t,style:{...THS,color:SUB_C[i]}},s.l)))
            )
          ),
          ce('tbody',null,
            stSorted.flatMap((st,ri)=>{
              const stRows=tblRows.filter(r=>r.state===st);
              const isOpen=!!expandedStates[st];
              const cities=[...new Set(stRows.map(r=>r.city))].filter(Boolean);
              const cityRows=cities.map(ct=>({ct,rows:stRows.filter(r=>r.city===ct)}))
                .sort((a,b)=>b.rows.length-a.rows.length);

              const stateRow=ce('tr',{key:st,style:{cursor:cities.length>0?'pointer':'default'},
                onClick:()=>cities.length>0&&toggleState(st)},
                ce('td',{style:{...TDL,fontSize:10,padding:'3px 6px',color:'#C2410C',
                  background:ri%2===0?'#fff':'#FFF7ED',userSelect:'none'}},
                  (cities.length>0?(isOpen?'▾ ':'▸ '):'　 ')+st+
                  (cities.length>0?' ('+cities.length+')':'')
                ),
                mk(agg(stRows),st+'_T_',false,getCellBg('__total__')),
                sources.map(src=>mk(agg(stRows.filter(r=>r.source===src)),st+'_'+src+'_',false,getCellBg(src)))
              );

              if(!isOpen||cities.length===0) return [stateRow];

              const cityRowEls=cityRows.map(({ct,rows:ctRows})=>
                ce('tr',{key:st+'__'+ct,style:{background:'#FFFBF5'}},
                  ce('td',{style:{...TDL,fontSize:9.5,padding:'2px 6px 2px 20px',
                    color:'#92400E',fontWeight:500,background:'#FFFBF5'}},'└ '+ct),
                  mk(agg(ctRows),st+'_'+ct+'_T_',false,'#FFFBF5'),
                  sources.map(src=>mk(agg(ctRows.filter(r=>r.source===src)),st+'_'+ct+'_'+src+'_',false,'#FFFBF5'))
                )
              );
              return [stateRow,...cityRowEls];
            }),
            ce('tr',{key:'div'},ce('td',{colSpan:totalCols,style:{padding:0,background:'#92400E',height:2}})),
            ce('tr',{className:'total-row grand-total-row'},
              ce('td',{className:'label',style:{...TDTl,fontSize:10,padding:'4px 6px',
                position:'sticky',left:0,zIndex:6}},'∑ Grand Total'),
              mk(stGM,'GT_',true,getCellBg('__total__')),
              sources.map(src=>mk(stST[src]||agg([]),'GT_'+src+'_',true,getCellBg(src)))
            )
          )
        )
      )
    );
  }

  return ce('div',{className:'fade-up'},
    ce('div',{style:{marginBottom:10,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
      ce('span',{style:{fontSize:11,fontWeight:700,color:'#7C2D12'}},'State × Source — Disposition Cross-tab'),
      ce('span',{style:{fontSize:10,color:'#C2410C'}},'∑ Total first · #N/A → Organic · Click a state to drill into cities · Grand Total at bottom'),
      ce('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}),
      ce('span',{style:{fontSize:9,color:'#92400E',fontWeight:600}},'Sort by:'),
      /* Dropdown 1 — Source */
      ce('select',{value:sortSrc,onChange:e=>setSortSrc(e.target.value),style:ddStyle},
        ce('option',{value:'__total__'},'∑ Total'),
        sources.map(s=>ce('option',{key:s,value:s},s))
      ),
      /* Dropdown 2 — Column */
      ce('select',{value:sortCol,onChange:e=>setSortCol(e.target.value),style:ddStyle},
        COL_OPTIONS.map(o=>ce('option',{key:o.val,value:o.val},o.label))
      ),
      /* Dropdown 3 — Direction */
      ce('select',{value:sortDir,onChange:e=>setSortDir(e.target.value),style:ddStyle},
        ce('option',{value:'desc'},'▼ High → Low'),
        ce('option',{value:'asc'}, '▲ Low → High')
      )
    ),

    renderStateTable('State × Source — All Months', normRows, 'overall'),

    months.length>0&&ce('div',{style:{margin:'6px 0 10px',display:'flex',alignItems:'center',gap:8}},
      ce('span',{style:{fontSize:11,fontWeight:700,color:'#7C2D12'}},'📅  Month-wise Breakdown'),
      ce('span',{style:{fontSize:10,color:'#C2410C'}},'Latest month first · '+months.length+' months')
    ),

    months.map(mo=>renderStateTable('State × Source — '+mo, normRows.filter(r=>r.month===mo), mo))
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   ATTEMPT ANALYSIS TAB
══════════════════════════════════════════════════════════════════════════ */
function AttemptBlock({rows,title}){
  const [openView, setOpenView]=useState('source'); /* 'source' | 'state' */
  const [openSort, setOpenSort]=useState({col:'total',dir:'desc'});
  const handleOpenSort=col=>setOpenSort(prev=>({col,dir:prev.col===col&&prev.dir==='desc'?'asc':'desc'}));

  /* ── Call Centre Coverage KPIs ─────────────────────────────────────────── */
  const cc=useMemo(()=>{
    const total=rows.length||1;
    const neverDialed=rows.filter(r=>r.status==='Yet to Dialed').length;
    const dialed=total-neverDialed;
    const totalAtts=rows.reduce((s,r)=>s+(r.attempts||0),0);
    const avgAtt=totalAtts/(total);
    const connected=rows.filter(r=>r.isConnected).length;
    const connPct=connected/total*100;
    const exhausted=rows.filter(r=>(r.attempts||0)>=7).length;
    const noResp=rows.filter(r=>r.status==='No Response').length;
    const langBar=rows.filter(r=>r.status==='Language Barrier').length;
    const followUp=rows.filter(r=>r.status==='Follow Up').length;
    return{total,neverDialed,dialed,avgAtt,connected,connPct,exhausted,noResp,langBar,followUp};
  },[rows]);

  /* ── Per-Attempt Call Centre Funnel ────────────────────────────────────── */
  const attFunnel=useMemo(()=>{
    /* Attribute each lead to its final attempts bucket using group (matches all other tabs) */
    const intByAttN=new Array(7).fill(0);
    const niByAttN=new Array(7).fill(0);
    for(const r of rows){
      const idx=Math.min(Math.max((r.attempts||1),1),7)-1;
      if(r.group==='interested'||r.group==='retailed') intByAttN[idx]++;
      else if(r.group==='ni') niByAttN[idx]++;
    }
    const totalInterested=rows.filter(r=>r.group==='interested'||r.group==='retailed').length;
    return Array.from({length:7},(_,i)=>{
      const attN=i+1;
      /* Leads that received at least N calls — proper declining funnel */
      const atLeastN=rows.filter(r=>(r.attempts||0)>=attN);
      /* Connected at attempt N = leads with ≥N attempts whose status at att N is not No Response / empty */
      const connAtN=atLeastN.filter(r=>{
        const s=r.attStatuses[i];
        return s&&s!==''&&s!=='No Response'&&s!=='Yet to Dialed';
      });
      /* Exactly N calls made */
      const exactlyN=rows.filter(r=>(r.attempts||0)===attN);
      /* Open leads whose total attempts = N — CC stopped here unresolved */
      const openAtN=exactlyN.filter(r=>r.group==='open').length;
      const nAtLeast=atLeastN.length||1;
      const nExact=exactlyN.length||1;
      return{
        att:attN,
        reached:atLeastN.length,
        connected:connAtN.length,
        connPct:connAtN.length/nAtLeast*100,
        interested:intByAttN[i],
        intPct:intByAttN[i]/(totalInterested||1)*100, /* % of total interested */
        ni:niByAttN[i],
        stuck:openAtN,
        stuckPct:openAtN/nExact*100,
        totalInterested,
      };
    });
  },[rows]);

  /* ── Source-wise coverage ───────────────────────────────────────────────── */
  const srcCoverage=useMemo(()=>{
    const map={};
    for(const r of rows){
      const k=r.source||'Organic';
      if(!map[k]) map[k]={src:k,total:0,dialed:0,neverDialed:0,connected:0,totalAtts:0,open:0,ni:0,interested:0};
      map[k].total++;
      if(r.status==='Yet to Dialed') map[k].neverDialed++;
      else map[k].dialed++;
      if(r.isConnected) map[k].connected++;
      map[k].totalAtts+=(r.attempts||0);
      if(r.group==='open') map[k].open++;
      if(r.group==='ni') map[k].ni++;
      if(r.group==='interested') map[k].interested++;
    }
    return Object.values(map).sort((a,b)=>b.total-a.total).map(x=>({
      ...x,
      dialedPct:x.dialed/x.total*100,
      connPct:x.connected/x.total*100,
      avgAtt:x.totalAtts/x.total,
      openPct:x.open/x.total*100,
    }));
  },[rows]);

  /* ── Open Leads Queue ───────────────────────────────────────────────────── */
  const openRows=useMemo(()=>rows.filter(r=>r.group==='open'),[rows]);
  const openBySource=useMemo(()=>{
    const map={};
    for(const r of openRows){
      const k=r.source||'Organic';
      if(!map[k]) map[k]={key:k,total:0,noResp:0,langBar:0,yetDial:0,totalAtts:0};
      map[k].total++;
      map[k].totalAtts+=(r.attempts||0);
      if(r.status==='No Response') map[k].noResp++;
      else if(r.status==='Language Barrier') map[k].langBar++;
      else if(r.status==='Yet to Dialed') map[k].yetDial++;
    }
    return Object.values(map).sort((a,b)=>b.total-a.total);
  },[openRows]);
  const openByState=useMemo(()=>{
    const map={};
    for(const r of openRows){
      const k=r.state||'Unknown';
      if(!map[k]) map[k]={key:k,total:0,noResp:0,langBar:0,yetDial:0,totalAtts:0};
      map[k].total++;
      map[k].totalAtts+=(r.attempts||0);
      if(r.status==='No Response') map[k].noResp++;
      else if(r.status==='Language Barrier') map[k].langBar++;
      else if(r.status==='Yet to Dialed') map[k].yetDial++;
    }
    return Object.values(map).sort((a,b)=>b.total-a.total);
  },[openRows]);

  /* ── Closed Leads Queue ─────────────────────────────────────────────────── */
  const [closedView, setClosedView]=useState('source');
  const [closedSort, setClosedSort]=useState({col:'total',dir:'desc'});
  const handleClosedSort=col=>setClosedSort(prev=>({col,dir:prev.col===col&&prev.dir==='desc'?'asc':'desc'}));
  const closedRows=useMemo(()=>rows.filter(r=>r.group==='interested'||r.group==='retailed'||r.group==='ni'),[rows]);
  const closedBySource=useMemo(()=>{
    const map={};
    for(const r of closedRows){
      const k=r.source||'Organic';
      if(!map[k]) map[k]={key:k,total:0,interested:0,retailed:0,ni:0,totalAtts:0};
      map[k].total++;
      map[k].totalAtts+=(r.attempts||0);
      if(r.group==='interested') map[k].interested++;
      else if(r.group==='retailed') map[k].retailed++;
      else if(r.group==='ni') map[k].ni++;
    }
    return Object.values(map).sort((a,b)=>b.total-a.total);
  },[closedRows]);
  const closedByState=useMemo(()=>{
    const map={};
    for(const r of closedRows){
      const k=r.state||'Unknown';
      if(!map[k]) map[k]={key:k,total:0,interested:0,retailed:0,ni:0,totalAtts:0};
      map[k].total++;
      map[k].totalAtts+=(r.attempts||0);
      if(r.group==='interested') map[k].interested++;
      else if(r.group==='retailed') map[k].retailed++;
      else if(r.group==='ni') map[k].ni++;
    }
    return Object.values(map).sort((a,b)=>b.total-a.total);
  },[closedRows]);

  /* ── Helpers ────────────────────────────────────────────────────────────── */
  const pill=(val,bg,fg='#fff')=>ce('span',{style:{display:'inline-block',padding:'2px 8px',
    borderRadius:10,fontSize:10,fontWeight:700,fontFamily:'DM Mono,monospace',
    background:bg,color:fg,minWidth:44,textAlign:'center'}},val);

  const KPICard=({label,value,sub,accent})=>ce('div',{className:'kpi'},
    ce('div',{className:'kpi-label'},label),
    ce('div',{className:'kpi-value',style:{color:accent||'#1c0a00',fontSize:20}},value),
    sub&&ce('div',{className:'kpi-sub'},sub)
  );

  return ce('div',{className:'fade-up'},

    /* ── Section header ───────────────────────────────────────────────────── */
    ce('div',{style:{marginBottom:12,padding:'10px 16px',background:'#7C2D12',borderRadius:10,
      display:'flex',alignItems:'center',gap:8}},
      ce('span',{style:{fontSize:12,fontWeight:700,color:'#fed7aa',letterSpacing:'.04em'}},
        '📞  Call Centre Performance — '+(title||'All Months')),
      ce('span',{style:{fontSize:10,color:'#fdba74',marginLeft:'auto'}},'Gap = leads where calling was stopped prematurely')
    ),

    /* ── Coverage KPIs ─────────────────────────────────────────────────────── */
    ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10,marginBottom:14}},
      ce(KPICard,{label:'Total Leads Assigned',value:Nf(cc.total),sub:'100% of pipeline'}),
      ce(KPICard,{label:'Never Dialed 🚨',value:Nf(cc.neverDialed),
        sub:(cc.neverDialed/cc.total*100).toFixed(1)+'% of total',accent:'#dc2626'}),
      ce(KPICard,{label:'Leads Dialed',value:Nf(cc.dialed),
        sub:(cc.dialed/cc.total*100).toFixed(1)+'% coverage',accent:'#16a34a'}),
      ce(KPICard,{label:'Avg Attempts / Lead',value:cc.avgAtt.toFixed(2),
        sub:'Target: ≥ 4 attempts',accent:cc.avgAtt<3?'#dc2626':'#16a34a'}),
      ce(KPICard,{label:'Connected Leads',value:Nf(cc.connected),
        sub:cc.connPct.toFixed(1)+'% connectivity',accent:'#2563eb'}),
      ce(KPICard,{label:'Exhausted (7 Att)',value:Nf(cc.exhausted),
        sub:(cc.exhausted/cc.total*100).toFixed(1)+'% fully worked',accent:'#7c3aed'}),
    ),

    /* ── Per-Attempt Dialing Funnel ─────────────────────────────────────── */
    ce('div',{className:'card',style:{padding:0,overflow:'hidden',marginBottom:14}},
      ce('div',{style:{padding:'12px 18px',borderBottom:'1px solid #FFEDD5',background:'#FFF7ED',
        display:'flex',alignItems:'center',gap:8}},
        ce('span',{style:{fontSize:11,fontWeight:700,color:'#7C2D12'}},'📋  Attempt-by-Attempt Call Centre Funnel'),
        ce('span',{style:{fontSize:9,color:'#92400E',marginLeft:4}},'Gap = leads whose total call attempts = N and are still Open/Unresolved — CC stopped here')
      ),
      ce('table',{style:{tableLayout:'fixed',width:'100%'}},
        ce('thead',null,
          ce('tr',null,
            ce('th',{className:'left',style:{width:'11%'}},'Attempt'),
            ce('th',{style:{width:'12%',background:'#374151'}},'Leads at Att N'),
            ce('th',{style:{width:'12%',background:'#1e40af'}},'Connected'),
            ce('th',{style:{width:'9%',background:'#1e40af'}},'Conn %'),
            ce('th',{style:{width:'11%',background:'#14532d'}},'Interested'),
            ce('th',{style:{width:'9%',background:'#14532d'}},'L2E %'),
            ce('th',{style:{width:'9%',background:'#7f1d1d'}},'Not Int'),
            ce('th',{style:{width:'13%',background:'#92400E'}},'⚠ Open @ Att N'),
            ce('th',{style:{width:'9%',background:'#92400E'}},'Open %'),
          )
        ),
        ce('tbody',null,
          attFunnel.map((row,i)=>{
            const gapHigh=row.stuckPct>20;
            const gapMed=row.stuckPct>10&&row.stuckPct<=20;
            const gapBg=gapHigh?'#fff1f2':gapMed?'#fffbeb':'#fff';
            return ce('tr',{key:i,style:{background:i%2===0?'#fff':'#FFF7ED'}},
              ce('td',{className:'label',style:{textAlign:'center'}},
                ce('span',{style:{fontFamily:'DM Mono',fontWeight:700,color:'#2563eb'}},'Attempt '+row.att)
              ),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:'#1c0a00'}},
                row.reached>0?Nf(row.reached):'—'),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:'#1d4ed8'}},
                row.connected>0?Nf(row.connected):'—'),
              ce('td',{style:{textAlign:'center'}},
                row.reached>0?pill(row.connPct.toFixed(1)+'%',row.connPct>=50?'#1d4ed8':'#64748b'):'—'),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:'#16a34a'}},
                row.interested>0?Nf(row.interested):'—'),
              ce('td',{style:{textAlign:'center'}},
                row.interested>0?pill(row.intPct.toFixed(1)+'%','#15803d'):'—'),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:'#dc2626'}},
                row.ni>0?Nf(row.ni):'—'),
              ce('td',{style:{textAlign:'center',fontWeight:700,
                color:gapHigh?'#b91c1c':gapMed?'#b45309':'#374151',background:gapBg}},
                row.stuck>0?Nf(row.stuck):'—'),
              ce('td',{style:{textAlign:'center',background:gapBg}},
                row.stuck>0?pill(row.stuckPct.toFixed(1)+'%',
                  gapHigh?'#dc2626':gapMed?'#d97706':'#6b7280'):'—'),
            );
          }),
          (()=>{
            const totInt=attFunnel[0]?.totalInterested||rows.filter(r=>r.group==='interested'||r.group==='retailed').length;
            const totNI=rows.filter(r=>r.group==='ni').length;
            return ce('tr',{className:'total-row'},
              ce('td',{className:'label',style:{background:'#7C2D12',color:'#fed7aa',textAlign:'center',fontWeight:700}},'∑ Total'),
              ce('td',{style:{textAlign:'center',color:'#fef3c7',fontWeight:700}},Nf(rows.length)),
              ce('td',{style:{textAlign:'center',color:'#93c5fd',fontWeight:700}},Nf(cc.connected)),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},cc.connPct.toFixed(1)+'%'),
              ce('td',{style:{textAlign:'center',color:'#86efac',fontWeight:700}},Nf(totInt)),
              ce('td',{style:{textAlign:'center',color:'#fed7aa',fontWeight:700}},(totInt/(rows.length||1)*100).toFixed(1)+'%'),
              ce('td',{style:{textAlign:'center',color:'#fca5a5',fontWeight:700}},Nf(totNI)),
              ce('td',{style:{textAlign:'center',color:'#fcd34d',fontWeight:700}},
                Nf(cc.followUp+cc.noResp+cc.langBar+cc.neverDialed)),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},
                ((cc.followUp+cc.noResp+cc.langBar+cc.neverDialed)/rows.length*100).toFixed(1)+'%'),
            );
          })()
        )
      )
    ),

    /* ── Source-wise Coverage ───────────────────────────────────────────── */
    ce('div',{className:'card',style:{padding:0,overflow:'hidden',marginBottom:14}},
      ce('div',{style:{padding:'12px 18px',borderBottom:'1px solid #FFEDD5',background:'#FFF7ED'}},
        ce('span',{style:{fontSize:11,fontWeight:700,color:'#7C2D12'}},'📊  Call Centre Coverage — By Source')
      ),
      ce('table',{style:{tableLayout:'fixed',width:'100%'}},
        ce('thead',null,
          ce('tr',null,
            ce('th',{className:'left',style:{width:'12%'}},'Source'),
            ce('th',{style:{width:'10%'}},'Total'),
            ce('th',{style:{width:'12%',background:'#7f1d1d'}},'Never Dialed 🚨'),
            ce('th',{style:{width:'10%',background:'#7f1d1d'}},'Undialed %'),
            ce('th',{style:{width:'10%',background:'#14532d'}},'Dialed'),
            ce('th',{style:{width:'10%',background:'#14532d'}},'Coverage %'),
            ce('th',{style:{width:'10%',background:'#1e40af'}},'Conn %'),
            ce('th',{style:{width:'12%',background:'#374151'}},'Avg Attempts'),
            ce('th',{style:{width:'10%',background:'#92400E'}},'Open %'),
          )
        ),
        ce('tbody',null,
          srcCoverage.map((row,i)=>ce('tr',{key:i,style:{background:i%2===0?'#fff':'#FFF7ED'}},
            ce('td',{className:'label'},row.src),
            ce('td',{style:{textAlign:'center',fontWeight:700}},Nf(row.total)),
            ce('td',{style:{textAlign:'center',fontWeight:700,
              color:row.neverDialed>0?'#dc2626':'#16a34a'}},
              row.neverDialed>0?Nf(row.neverDialed):'—'),
            ce('td',{style:{textAlign:'center'}},
              row.neverDialed>0
                ?pill(row.neverDialed/row.total*100>10?
                  (row.neverDialed/row.total*100).toFixed(1)+'% 🔴':
                  (row.neverDialed/row.total*100).toFixed(1)+'%',
                  row.neverDialed/row.total*100>10?'#dc2626':'#6b7280')
                :pill('0%','#16a34a')),
            ce('td',{style:{textAlign:'center',fontWeight:700,color:'#16a34a'}},Nf(row.dialed)),
            ce('td',{style:{textAlign:'center'}},
              pill(row.dialedPct.toFixed(1)+'%',row.dialedPct>=90?'#15803d':row.dialedPct>=70?'#d97706':'#dc2626')),
            ce('td',{style:{textAlign:'center'}},
              pill(row.connPct.toFixed(1)+'%',row.connPct>=50?'#1d4ed8':'#64748b')),
            ce('td',{style:{textAlign:'center'}},
              pill(row.avgAtt.toFixed(2),row.avgAtt>=4?'#15803d':row.avgAtt>=2?'#d97706':'#dc2626')),
            ce('td',{style:{textAlign:'center'}},
              pill(row.openPct.toFixed(1)+'%',row.openPct>20?'#dc2626':row.openPct>10?'#d97706':'#6b7280')),
          )),
          (()=>{
            const tTotal=srcCoverage.reduce((s,r)=>s+r.total,0)||1;
            const tND=srcCoverage.reduce((s,r)=>s+r.neverDialed,0);
            const tDialed=srcCoverage.reduce((s,r)=>s+r.dialed,0);
            const tConn=srcCoverage.reduce((s,r)=>s+r.connected,0);
            const tAtts=srcCoverage.reduce((s,r)=>s+r.totalAtts,0);
            const tOpen=srcCoverage.reduce((s,r)=>s+r.open,0);
            return ce('tr',{className:'total-row'},
              ce('td',{className:'label',style:{background:'#7C2D12',color:'#fed7aa',fontWeight:700}},'∑ Total'),
              ce('td',{style:{textAlign:'center',color:'#fef3c7',fontWeight:700}},Nf(tTotal)),
              ce('td',{style:{textAlign:'center',color:tND>0?'#fca5a5':'#86efac',fontWeight:700}},tND>0?Nf(tND):'—'),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},(tND/tTotal*100).toFixed(1)+'%'),
              ce('td',{style:{textAlign:'center',color:'#86efac',fontWeight:700}},Nf(tDialed)),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},(tDialed/tTotal*100).toFixed(1)+'%'),
              ce('td',{style:{textAlign:'center',color:'#93c5fd'}},(tConn/tTotal*100).toFixed(1)+'%'),
              ce('td',{style:{textAlign:'center',color:'#fcd34d'}},(tAtts/tTotal).toFixed(2)),
              ce('td',{style:{textAlign:'center',color:'#fcd34d'}},(tOpen/tTotal*100).toFixed(1)+'%'),
            );
          })()
        )
      )
    ),

    /* ── Closed Actions Table ───────────────────────────────────────────── */
    ce('div',{className:'card',style:{padding:0,overflow:'hidden',marginBottom:14}},
      ce('div',{style:{padding:'12px 18px',borderBottom:'1px solid #FFEDD5',background:'#FFF7ED',
        display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}},
        ce('div',null,
          ce('span',{style:{fontSize:11,fontWeight:700,color:'#7C2D12'}},'✅  Closed Actions — Resolved Leads ('+Nf(closedRows.length)+')'),
          ce('div',{style:{fontSize:9,color:'#92400E',marginTop:2}},
            'Interested = expressed interest | Retailed = already bought | Not Interested = rejected — Avg Attempts = calls needed to close'
          )
        ),
        ce('div',{style:{display:'flex',gap:4}},
          ['source','state'].map(v=>ce('button',{key:v,
            onClick:()=>setClosedView(v),
            style:{padding:'4px 14px',fontSize:10,border:'1px solid '+(closedView===v?'#F97316':'#FED7AA'),
              borderRadius:20,cursor:'pointer',background:closedView===v?'#F97316':'#fff',
              color:closedView===v?'#fff':'#7C2D12',fontFamily:'inherit',fontWeight:closedView===v?700:400}},
            v.charAt(0).toUpperCase()+v.slice(1)
          ))
        )
      ),
      ce('table',{style:{tableLayout:'fixed',width:'100%'}},
        ce('thead',null,
          ce('tr',null,
            ce('th',{className:'left',style:{width:'18%',cursor:'default'}},closedView==='source'?'Source':'State'),
            ...[
              {col:'total',label:'Total Closed',bg:'#7C2D12',w:'10%'},
              {col:'interested',label:'Interested',bg:'#14532d',w:'12%'},
              {col:'intPct',label:'Int %',bg:'#14532d',w:'9%'},
              {col:'retailed',label:'Retailed',bg:'#166534',w:'10%'},
              {col:'retPct',label:'Ret %',bg:'#166534',w:'9%'},
              {col:'ni',label:'Not Int',bg:'#7f1d1d',w:'10%'},
              {col:'niPct',label:'NI %',bg:'#7f1d1d',w:'9%'},
              {col:'avgAtt',label:'Avg Attempts',bg:'#1e40af',w:'13%'},
              {col:'closedPct',label:'Closed %',bg:'#374151',w:'10%'},
            ].map(({col,label,bg,w})=>
              ce('th',{key:col,onClick:()=>handleClosedSort(col),
                style:{width:w,background:closedSort.col===col?'#F97316':bg,
                  cursor:'pointer',userSelect:'none',transition:'background .15s'}},
                label+(closedSort.col===col?(closedSort.dir==='desc'?' ▼':' ▲'):'')
              )
            )
          )
        ),
        ce('tbody',null,
          (()=>{
            const base=closedView==='source'?closedBySource:closedByState;
            const colVal=row=>{
              switch(closedSort.col){
                case'total':return row.total;
                case'interested':return row.interested;
                case'intPct':return row.total>0?row.interested/row.total:0;
                case'retailed':return row.retailed;
                case'retPct':return row.total>0?row.retailed/row.total:0;
                case'ni':return row.ni;
                case'niPct':return row.total>0?row.ni/row.total:0;
                case'avgAtt':return row.total>0?row.totalAtts/row.total:0;
                case'closedPct':return rows.length>0?row.total/rows.length:0;
                default:return row.total;
              }
            };
            const sorted=[...base].sort((a,b)=>closedSort.dir==='desc'?colVal(b)-colVal(a):colVal(a)-colVal(b));
            return sorted.map((row,i)=>{
            const closedPct=rows.length>0?(row.total/rows.length*100):0;
            const intPct=row.total>0?(row.interested/row.total*100):0;
            const retPct=row.total>0?(row.retailed/row.total*100):0;
            const niPct=row.total>0?(row.ni/row.total*100):0;
            const avgAtt=row.total>0?(row.totalAtts/row.total):0;
            return ce('tr',{key:i,style:{background:i%2===0?'#fff':'#FFF7ED'}},
              ce('td',{className:'label'},row.key),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:'#16a34a'}},Nf(row.total)),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:'#15803d'}},row.interested>0?Nf(row.interested):'—'),
              ce('td',{style:{textAlign:'center'}},
                row.interested>0?pill(intPct.toFixed(1)+'%','#15803d'):'—'),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:'#166534'}},row.retailed>0?Nf(row.retailed):'—'),
              ce('td',{style:{textAlign:'center'}},
                row.retailed>0?pill(retPct.toFixed(1)+'%','#166534'):'—'),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:'#dc2626'}},row.ni>0?Nf(row.ni):'—'),
              ce('td',{style:{textAlign:'center'}},
                row.ni>0?pill(niPct.toFixed(1)+'%','#991b1b'):'—'),
              ce('td',{style:{textAlign:'center'}},
                pill(avgAtt.toFixed(2),avgAtt>=4?'#15803d':avgAtt>=2?'#d97706':'#dc2626')),
              ce('td',{style:{textAlign:'center'}},
                pill(closedPct.toFixed(1)+'%',closedPct>=20?'#15803d':closedPct>=10?'#d97706':'#6b7280')),
            );
          });
          })(),
          (()=>{
            const data=closedView==='source'?closedBySource:closedByState;
            const tTotal=data.reduce((s,r)=>s+r.total,0);
            const tInt=data.reduce((s,r)=>s+r.interested,0);
            const tRet=data.reduce((s,r)=>s+r.retailed,0);
            const tNI=data.reduce((s,r)=>s+r.ni,0);
            const tAtts=data.reduce((s,r)=>s+r.totalAtts,0);
            const tClosedPct=rows.length>0?(tTotal/rows.length*100):0;
            const tAvg=tTotal>0?(tAtts/tTotal):0;
            return ce('tr',{className:'total-row'},
              ce('td',{className:'label',style:{background:'#7C2D12',color:'#fed7aa',fontWeight:700}},'∑ Total'),
              ce('td',{style:{textAlign:'center',color:'#86efac',fontWeight:700}},Nf(tTotal)),
              ce('td',{style:{textAlign:'center',color:'#86efac',fontWeight:700}},Nf(tInt)),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},(tTotal>0?(tInt/tTotal*100):0).toFixed(1)+'%'),
              ce('td',{style:{textAlign:'center',color:'#86efac',fontWeight:700}},tRet>0?Nf(tRet):'—'),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},(tTotal>0?(tRet/tTotal*100):0).toFixed(1)+'%'),
              ce('td',{style:{textAlign:'center',color:'#fca5a5',fontWeight:700}},Nf(tNI)),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},(tTotal>0?(tNI/tTotal*100):0).toFixed(1)+'%'),
              ce('td',{style:{textAlign:'center',color:'#fcd34d',fontWeight:700}},tAvg.toFixed(2)),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},tClosedPct.toFixed(1)+'%'),
            );
          })()
        )
      )
    ),

    /* ── Open Leads / Pending Action Queue ─────────────────────────────── */
    ce('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      ce('div',{style:{padding:'12px 18px',borderBottom:'1px solid #FFEDD5',background:'#FFF7ED',
        display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}},
        ce('div',null,
          ce('span',{style:{fontSize:11,fontWeight:700,color:'#7C2D12'}},'🗂  Pending Action Queue — Open Leads ('+Nf(openRows.length)+')'),
          ce('div',{style:{fontSize:9,color:'#92400E',marginTop:2}},
            'Never Dialed = CC did not attempt | No Response = CC attempted but no pickup | Follow Up / Lang Barrier = spoke but unresolved'
          )
        ),
        ce('div',{style:{display:'flex',gap:4}},
          ['source','state'].map(v=>ce('button',{key:v,
            onClick:()=>setOpenView(v),
            style:{padding:'4px 14px',fontSize:10,border:'1px solid '+(openView===v?'#F97316':'#FED7AA'),
              borderRadius:20,cursor:'pointer',background:openView===v?'#F97316':'#fff',
              color:openView===v?'#fff':'#7C2D12',fontFamily:'inherit',fontWeight:openView===v?700:400}},
            v.charAt(0).toUpperCase()+v.slice(1)
          ))
        )
      ),
      ce('table',{style:{tableLayout:'fixed',width:'100%'}},
        ce('thead',null,
          ce('tr',null,
            ce('th',{className:'left',style:{width:'18%',cursor:'default'}},openView==='source'?'Source':'State'),
            ...[
              {col:'total',label:'Total Open',bg:'#7C2D12',w:'10%'},
              {col:'yetDial',label:'Never Dialed',bg:'#7f1d1d',w:'12%'},
              {col:'ndPct',label:'ND %',bg:'#7f1d1d',w:'10%'},
              {col:'noResp',label:'No Response',bg:'#374151',w:'12%'},
              {col:'nrPct',label:'NR %',bg:'#374151',w:'10%'},
              {col:'avgAtt',label:'Avg Attempts',bg:'#1e40af',w:'12%'},
              {col:'langBar',label:'Lang Barrier',bg:'#92400E',w:'12%'},
              {col:'openPct',label:'Open %',bg:'#4b5563',w:'10%'},
            ].map(({col,label,bg,w})=>
              ce('th',{key:col,onClick:()=>handleOpenSort(col),
                style:{width:w,background:openSort.col===col?'#F97316':bg,
                  cursor:'pointer',userSelect:'none',transition:'background .15s'}},
                label+(openSort.col===col?(openSort.dir==='desc'?' ▼':' ▲'):'')
              )
            )
          )
        ),
        ce('tbody',null,
          (()=>{
            const base=openView==='source'?openBySource:openByState;
            const colVal=row=>{
              switch(openSort.col){
                case'total':return row.total;
                case'yetDial':return row.yetDial;
                case'ndPct':return row.total>0?row.yetDial/row.total:0;
                case'noResp':return row.noResp;
                case'nrPct':return row.total>0?row.noResp/row.total:0;
                case'avgAtt':return row.total>0?row.totalAtts/row.total:0;
                case'langBar':return row.langBar;
                case'openPct':return rows.length>0?row.total/rows.length:0;
                default:return row.total;
              }
            };
            const sorted=[...base].sort((a,b)=>openSort.dir==='desc'?colVal(b)-colVal(a):colVal(a)-colVal(b));
            return sorted.map((row,i)=>{
            const pct=rows.length>0?(row.total/rows.length*100):0;
            const ndPct=row.total>0?(row.yetDial/row.total*100):0;
            const nrPct=row.total>0?(row.noResp/row.total*100):0;
            return ce('tr',{key:i,style:{background:i%2===0?'#fff':'#FFF7ED'}},
              ce('td',{className:'label'},row.key),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:'#7c3aed'}},Nf(row.total)),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:row.yetDial>0?'#dc2626':'#9ca3af'}},
                row.yetDial>0?Nf(row.yetDial):'—'),
              ce('td',{style:{textAlign:'center'}},
                row.yetDial>0?pill(ndPct.toFixed(1)+'%',ndPct>15?'#dc2626':'#d97706'):'—'),
              ce('td',{style:{textAlign:'center',fontWeight:700,color:'#374151'}},
                row.noResp>0?Nf(row.noResp):'—'),
              ce('td',{style:{textAlign:'center'}},
                row.noResp>0?pill(nrPct.toFixed(1)+'%','#475569'):'—'),
              ce('td',{style:{textAlign:'center'}},
                pill((row.totalAtts/row.total).toFixed(2),
                  (row.totalAtts/row.total)>=4?'#15803d':(row.totalAtts/row.total)>=2?'#d97706':'#dc2626')),
              ce('td',{style:{textAlign:'center',color:'#d97706',fontWeight:600}},
                row.langBar>0?Nf(row.langBar):'—'),
              ce('td',{style:{textAlign:'center'}},
                pill(pct.toFixed(1)+'%',pct>20?'#dc2626':pct>10?'#d97706':'#6b7280')),
            );
          });
          })(),
          (()=>{
            const data=openView==='source'?openBySource:openByState;
            const tTotal=data.reduce((s,r)=>s+r.total,0);
            const tND=data.reduce((s,r)=>s+r.yetDial,0);
            const tNR=data.reduce((s,r)=>s+r.noResp,0);
            const tLB=data.reduce((s,r)=>s+r.langBar,0);
            const tAtts=data.reduce((s,r)=>s+r.totalAtts,0);
            const tNDPct=tTotal>0?(tND/tTotal*100):0;
            const tNRPct=tTotal>0?(tNR/tTotal*100):0;
            const tAvgAtt=tTotal>0?(tAtts/tTotal):0;
            const tOpenPct=rows.length>0?(tTotal/rows.length*100):0;
            return ce('tr',{className:'total-row'},
              ce('td',{className:'label',style:{background:'#7C2D12',color:'#fed7aa',fontWeight:700}},'∑ Total'),
              ce('td',{style:{textAlign:'center',color:'#fef3c7',fontWeight:700}},Nf(tTotal)),
              ce('td',{style:{textAlign:'center',color:tND>0?'#fca5a5':'#86efac',fontWeight:700}},tND>0?Nf(tND):'—'),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},tNDPct.toFixed(1)+'%'),
              ce('td',{style:{textAlign:'center',color:'#d1d5db',fontWeight:700}},tNR>0?Nf(tNR):'—'),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},tNRPct.toFixed(1)+'%'),
              ce('td',{style:{textAlign:'center',color:'#fcd34d',fontWeight:700}},tAvgAtt.toFixed(2)),
              ce('td',{style:{textAlign:'center',color:'#fb923c',fontWeight:700}},tLB>0?Nf(tLB):'—'),
              ce('td',{style:{textAlign:'center',color:'#fed7aa'}},tOpenPct.toFixed(1)+'%'),
            );
          })()
        )
      )
    )
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   ATTEMPT ANALYSIS TAB — wrapper: All-Months block + one block per month
══════════════════════════════════════════════════════════════════════════ */
function AttemptTab({rows}){
  const months=useMemo(()=>
    [...new Set(rows.map(r=>r.month))].filter(Boolean)
      .sort((a,b)=>monthSortKey(b)-monthSortKey(a))
  ,[rows]);

  return ce('div',{className:'fade-up'},
    ce(AttemptBlock,{rows,title:'All Months'}),

    months.length>0&&ce('div',{style:{margin:'18px 0 10px',display:'flex',alignItems:'center',gap:8}},
      ce('span',{style:{fontSize:11,fontWeight:700,color:'#7C2D12'}},'📅  Month-wise Breakdown'),
      ce('span',{style:{fontSize:10,color:'#C2410C'}},'Latest month first · '+months.length+' months')
    ),

    months.map(mo=>ce('div',{key:mo,style:{marginTop:14}},
      ce(AttemptBlock,{rows:rows.filter(r=>r.month===mo),title:mo})
    ))
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   UPLOAD SCREEN
══════════════════════════════════════════════════════════════════════════ */
function UploadScreen({onData,onSync,syncing,syncErr,sheetUrl,setSheetUrl,urlDraft,setUrlDraft,lastSynced}){
  const [drag,setDrag]=useState(false);
  const [prog,setProg]=useState(0);
  const [step,setStep]=useState('');
  const [err,setErr]=useState('');

  function process(file){
    if(!file||!file.name.match(/\.xlsx?$/i)){setErr('Please upload an .xlsx file');return;}
    if(!window.XLSX){setErr('XLSX library not loaded — check internet connection');return;}
    setErr('');setProg(10);setStep('Reading file…');
    const reader=new FileReader();
    reader.onerror=()=>{setErr('File read error');setProg(0);};
    reader.onload=e=>{
      try{
        setProg(30);setStep('Parsing Excel…');
        const wb=window.XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        setProg(55);setStep('Processing rows…');
        const raw=window.XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
        if(!raw.length){setErr('Sheet appears empty');setProg(0);return;}
        setTimeout(()=>{
          setProg(80);setStep('Aggregating data…');
          setTimeout(()=>{
            const parsed=markMonthDuplicates(parseRows(raw));
            if(!parsed.length){setErr('No valid rows found. Check the file format.');setProg(0);return;}
            setProg(100);setStep('Done!');
            try{localStorage.setItem('hd_ldr_data',JSON.stringify(parsed.slice(0,20000)));}catch(e){}
            setTimeout(()=>onData(parsed),400);
          },50);
        },50);
      }catch(ex){setErr('Parse error: '+ex.message);setProg(0);}
    };
    reader.readAsArrayBuffer(file);
  }

  return ce('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}},
    ce('div',{style:{maxWidth:560,width:'100%'}},
      /* Logo strip */
      ce('div',{style:{textAlign:'center',marginBottom:32}},
        ce('div',{style:{display:'inline-flex',alignItems:'center',gap:12,
          background:'#F97316',padding:'12px 28px',borderRadius:16,marginBottom:16,
          boxShadow:'0 4px 20px rgba(249,115,22,.35)'}},
          ce('div',{style:{width:38,height:38,borderRadius:9,background:'#fff',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:22,fontWeight:900,color:'#F97316'}},'H'),
          ce('div',{style:{textAlign:'left'}},
            ce('div',{style:{fontSize:15,fontWeight:800,color:'#fff',letterSpacing:'-.02em'}},'H-D X440'),
            ce('div',{style:{fontSize:10,color:'#ffedd5',letterSpacing:'.06em',fontWeight:600}},
              'LEAD DISPOSITION DASHBOARD  v1.0')
          )
        ),
        ce('div',{style:{fontSize:12,color:'#92400E',fontWeight:500}},
          'Upload a BikeDekho LDR Excel file to begin')
      ),

      /* Drop zone */
      ce('div',{
        className:'drop-zone'+(drag?' drag':''),
        style:{padding:'48px 24px',textAlign:'center',marginBottom:16},
        onDragOver:e=>{e.preventDefault();setDrag(true);},
        onDragLeave:()=>setDrag(false),
        onDrop:e=>{e.preventDefault();setDrag(false);process(e.dataTransfer.files[0]);},
        onClick:()=>document.getElementById('ldr-file').click()
      },
        ce('div',{style:{fontSize:36,marginBottom:12}},'📂'),
        ce('div',{style:{fontSize:14,fontWeight:600,color:'#111827',marginBottom:4}},'Click or drag & drop LDR file'),
        ce('div',{style:{fontSize:11,color:'#9ca3af'}},'.xlsx files only · BikeDekho Lead Disposition Report'),
        ce('input',{id:'ldr-file',type:'file',accept:'.xlsx,.xls',style:{display:'none'},
          onChange:e=>process(e.target.files[0])})
      ),

      /* Progress */
      prog>0&&ce('div',{style:{marginBottom:12}},
        ce('div',{style:{fontSize:11,color:'#374151',marginBottom:6,fontWeight:600}},step),
        ce('div',{style:{height:5,background:'#f0f2f7',borderRadius:10,overflow:'hidden'}},
          ce('div',{className:'prog-fill',style:{height:'100%',width:prog+'%',borderRadius:10}})
        )
      ),
      err&&ce('div',{style:{padding:'10px 14px',background:'#fef2f2',border:'1px solid #fecaca',
        borderRadius:8,fontSize:11,color:'#dc2626',fontWeight:500}},err),

      /* ── OR: Sync from Google Sheets ── */
      ce('div',{className:'card',style:{padding:'18px',marginTop:16,borderLeft:'4px solid #F97316'}},
        ce('div',{style:{fontSize:11,fontWeight:700,color:'#7C2D12',marginBottom:12,
          display:'flex',alignItems:'center',gap:8}},
          '📊 Or sync directly from Google Sheets'),
        ce('div',{style:{marginBottom:12}},
          ce('div',{style:{fontSize:10,fontWeight:700,color:'#7C2D12',
            textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}},'Google Sheets URL'),
          ce('input',{type:'text',value:urlDraft||'',
            onChange:e=>setUrlDraft&&setUrlDraft(e.target.value),
            placeholder:'https://docs.google.com/spreadsheets/d/…',
            style:{width:'100%',padding:'7px 14px',border:'1px solid #FED7AA',borderRadius:10,
              fontSize:11,fontFamily:'inherit',outline:'none',background:'#fff',color:'#431407'}
          })
        ),
        ce('button',{
          onClick:()=>{
            const u=(urlDraft||'').trim();
            if(!u) return;
            if(setSheetUrl) setSheetUrl(u);
            try{localStorage.setItem('hd_ldr_sheet_url',u);}catch(e){}
            if(onSync) onSync(u);
          },
          disabled:syncing,
          style:{padding:'8px 24px',background:'#F97316',border:'none',borderRadius:20,
            color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
            display:'flex',alignItems:'center',gap:6}
        },
          syncing?ce('span',{style:{display:'inline-block',animation:'spin .8s linear infinite'}},'⟳'):'📊',
          syncing?'Syncing…':'Sync from Google Sheets'
        ),
        syncErr&&ce('div',{style:{fontSize:11,color:'#dc2626',padding:'8px 12px',
          background:'#fef2f2',borderRadius:8,border:'1px solid #fecaca',marginTop:10,
          whiteSpace:'pre-wrap'}},
          '⚠ '+syncErr),
        lastSynced&&ce('div',{style:{fontSize:10,color:'#166534',marginTop:8}},
          '✓ Last synced: '+lastSynced.toLocaleString()),
        ce('div',{style:{fontSize:10,color:'#6b7280',marginTop:10,lineHeight:1.6}},
          '💡 Share first: Google Sheets → File → Share → Anyone with the link → ',
          ce('strong',null,'Viewer'),
          ' · No API key · No login required · Works from any browser')
      ),

      /* Required columns info */
      ce('div',{className:'card',style:{padding:'14px 18px',marginTop:16}},
        ce('div',{style:{fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',
          letterSpacing:'.08em',marginBottom:8}},'Expected columns in LDR file'),
        ce('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
          ['Month','LT','Source','City','State','Status 1–7','Status','Status Attempts',
           'Connected','Duplicate/Unique'].map(c=>
            ce('span',{key:c,style:{fontSize:10,fontFamily:'DM Mono',background:'#f5f6fa',
              border:'1px solid #e4e6ef',borderRadius:5,padding:'2px 7px',color:'#6b7280'}},c)
          )
        )
      )
    )
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════════════════════ */
const TABS=[
  {id:'overview', label:'Overview'},
  {id:'source',   label:'Source Analysis'},
  {id:'ltxsrc',   label:'LT × Source'},
  {id:'statexsrc',label:'State × Source'},
  {id:'attempts', label:'Attempt Analysis'},
];

function App(){
  const [rows,setRows]=useState(null);
  const [tab,setTab]=useState('overview');
  const [filters,setFilters]=useState({month:'All',source:'All',state:'All'});

  /* ── Google Sheets sync state ──────────────────────────────────── */
  const [syncing,setSyncing]=useState(false);
  const [syncErr,setSyncErr]=useState(null);
  const [lastSynced,setLastSynced]=useState(null);
  const [showSyncPanel,setShowSyncPanel]=useState(false);
  const [sheetUrl,setSheetUrl]=useState(()=>
    localStorage.getItem('hd_ldr_sheet_url')||SHEETS_CONFIG.LDR_SHEET_URL||''
  );
  const [urlDraft,setUrlDraft]=useState('');

  const handleSync=useCallback(async(url)=>{
    const u=(url||sheetUrl||SHEETS_CONFIG.LDR_SHEET_URL||'').trim();
    if(!u){setShowSyncPanel(true);setSyncErr('Paste your Google Sheets URL above and click Sync.');return;}
    setSyncing(true);setSyncErr(null);
    try{
      const csv=await fetchSheetCsv(u);
      const raw=parseCsvToRows(csv);
      if(!raw.length) throw new Error('No rows found in sheet — check the sheet has data rows.');
      const parsed=markMonthDuplicates(parseRows(raw));
      if(!parsed.length) throw new Error('Rows found but none matched expected LDR column format — check column headers.');
      try{localStorage.setItem('hd_ldr_data',JSON.stringify(parsed.slice(0,20000)));}catch(e){}
      const norm=parsed.map(r=>{const ns=normSrc(r.source);return ns===r.source?r:{...r,source:ns};});
      setRows(norm);
      setLastSynced(new Date());
      setShowSyncPanel(false);
    }catch(e){
      setSyncErr(e.message);
    }finally{setSyncing(false);}
  },[sheetUrl]);

  /* Auto-sync on first load if URL configured */
  useEffect(()=>{
    const u=sheetUrl||SHEETS_CONFIG.LDR_SHEET_URL;
    if(SHEETS_CONFIG.AUTO_SYNC_ON_LOAD&&u) handleSync(u);
  },[]); // eslint-disable-line

  /* Timed auto-refresh */
  useEffect(()=>{
    const ms=SHEETS_CONFIG.AUTO_SYNC_INTERVAL_MS;
    if(!ms||ms<60000) return;
    const id=setInterval(()=>handleSync(),ms);
    return()=>clearInterval(id);
  },[handleSync]);

  /* Restore from localStorage — normalize source on load in case data predates normalization */
  function normSrc(s){
    const t=(s||'').trim();
    return(!t||t==='#N/A'||t.toLowerCase()==='unknown'||t.toLowerCase()==='na'||t==='-')?'Organic':t;
  }
  useEffect(()=>{
    try{
      const saved=localStorage.getItem('hd_ldr_data');
      if(saved){
        const p=JSON.parse(saved);
        if(p&&p.length){
          /* Discard stale cache: no mobile field, OR all mobiles empty
             (saved before column detection was fixed). Force re-upload. */
          const hasMobile=p.some(r=>r.mobile&&r.mobile.length>=8);
          if(!hasMobile){
            localStorage.removeItem('hd_ldr_data');
            return;
          }
          const norm=p.map(r=>{const ns=normSrc(r.source);return ns===r.source?r:{...r,source:ns};});
          markMonthDuplicates(norm);
          setRows(norm);
          try{localStorage.setItem('hd_ldr_data',JSON.stringify(norm));}catch(e){}
        }
      }
    }catch(e){}
  },[]);

  const months=useMemo(()=>rows?[...new Set(rows.map(r=>r.month))].filter(Boolean).sort():[],[rows]);
  const sources=useMemo(()=>rows?[...new Set(rows.map(r=>r.source))].filter(Boolean).sort():[],[rows]);
  const states=useMemo(()=>rows?[...new Set(rows.map(r=>r.state))].filter(Boolean).sort():[],[rows]);

  const filtered=useMemo(()=>{
    if(!rows) return [];
    return rows.filter(r=>
      (filters.month==='All'||r.month===filters.month)&&
      (filters.source==='All'||r.source===filters.source)&&
      (filters.state==='All'||r.state===filters.state)
    );
  },[rows,filters]);

  if(!rows) return ce(UploadScreen,{onData:setRows,
    onSync:handleSync, syncing, syncErr,
    sheetUrl, setSheetUrl, urlDraft, setUrlDraft, lastSynced});

  const totalM=agg(filtered);

  return ce('div',{style:{minHeight:'100vh'}},
    /* Header — BikeDekho orange */
    ce('div',{style:{background:'#F97316',padding:'0 24px',position:'sticky',top:0,zIndex:100,
      boxShadow:'0 2px 16px rgba(249,115,22,.35)'}},
      ce('div',{style:{maxWidth:1600,margin:'0 auto',display:'flex',alignItems:'center',gap:16}},
        /* Logo */
        ce('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'10px 0',flexShrink:0}},
          ce('div',{style:{width:34,height:34,borderRadius:8,background:'#fff',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:17,fontWeight:900,color:'#F97316',boxShadow:'0 2px 8px rgba(0,0,0,.15)'}},'H'),
          ce('div',null,
            ce('div',{style:{fontSize:13,fontWeight:800,color:'#fff',letterSpacing:'-.02em'}},'H-D X440 · LDR'),
            ce('div',{style:{fontSize:9,color:'#ffedd5',letterSpacing:'.07em',fontWeight:600}},
              'LEAD DISPOSITION DASHBOARD v1.0 · BikeDekho')
          )
        ),
        /* KPI mini-strip */
        ce('div',{style:{flex:1,display:'flex',gap:14,overflowX:'auto',padding:'8px 0',
          borderLeft:'1px solid rgba(255,255,255,.3)',paddingLeft:16,marginLeft:4}},
          [
            {l:'Total',    v:Nf(totalM.total)},
            {l:'Unique',   v:Nf(totalM.unique)},
            {l:'Dup%',     v:totalM.dupPct.toFixed(1)+'%'},
            {l:'Conn%',    v:totalM.connPct.toFixed(1)+'%'},
            {l:'Interested',v:Nf(totalM.interested)},
            {l:'Open',     v:Nf(totalM.open)},
            {l:'Open%',    v:totalM.openPct.toFixed(1)+'%'},
            {l:'L2E%',     v:totalM.convPct.toFixed(1)+'%'},
          ].map((k,i)=>ce('div',{key:i,style:{flexShrink:0,textAlign:'center',minWidth:56}},
            ce('div',{style:{fontSize:8,fontWeight:700,textTransform:'uppercase',
              letterSpacing:'.08em',color:'#ffedd5'}},k.l),
            ce('div',{style:{fontSize:13,fontWeight:800,color:'#fff',
              fontFamily:'DM Mono,monospace',letterSpacing:'-.02em'}},k.v)
          ))
        ),
        /* Sync from Sheets button */
        ce('button',{
          onClick:()=>handleSync(),
          disabled:syncing,
          style:{flexShrink:0,padding:'6px 16px',
            background:syncing?'rgba(255,255,255,.7)':'#fff',border:'none',
            borderRadius:20,color:'#C2410C',fontSize:10,cursor:syncing?'default':'pointer',
            fontFamily:'inherit',fontWeight:700,boxShadow:'0 2px 8px rgba(0,0,0,.12)',
            display:'flex',alignItems:'center',gap:5}
        },
          syncing
            ?ce('span',{style:{display:'inline-block',animation:'spin .8s linear infinite',
                fontSize:11}},'⟳')
            :'🔄',
          syncing?'Syncing…':'Sync Sheets'
        ),
        /* Configure URL */
        ce('button',{
          onClick:()=>{setUrlDraft(sheetUrl);setShowSyncPanel(p=>!p);},
          title:'Configure Google Sheets URL',
          style:{flexShrink:0,padding:'6px 10px',background:'rgba(255,255,255,.15)',
            border:'1px solid rgba(255,255,255,.3)',borderRadius:20,color:'#fff',
            fontSize:11,cursor:'pointer',fontFamily:'inherit'}
        },'⚙'),
        /* Upload new */
        ce('button',{
          onClick:()=>{if(confirm('Clear data and upload new file?')){localStorage.removeItem('hd_ldr_data');setRows(null);}},
          style:{flexShrink:0,padding:'6px 16px',background:'transparent',border:'1px solid rgba(255,255,255,.3)',
            borderRadius:20,color:'#fff',fontSize:10,cursor:'pointer',
            fontFamily:'inherit',fontWeight:600}
        },'⬆ File')
      )
    ),

    /* Google Sheets sync config panel */
    showSyncPanel&&ce('div',{style:{background:'#fff7ed',borderBottom:'2px solid #FED7AA',
      padding:'12px 24px',position:'sticky',top:54,zIndex:98,
      boxShadow:'0 4px 12px rgba(249,115,22,.1)'}},
      ce('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
        ce('span',{style:{fontSize:10,fontWeight:700,color:'#7C2D12',
          textTransform:'uppercase',letterSpacing:'.07em',whiteSpace:'nowrap'}},
          '📊 Google Sheets URL'),
        ce('input',{type:'text',value:urlDraft,onChange:e=>setUrlDraft(e.target.value),
          placeholder:'https://docs.google.com/spreadsheets/d/…',
          style:{flex:1,minWidth:320,padding:'6px 14px',border:'1px solid #FED7AA',
            borderRadius:20,fontSize:11,fontFamily:'inherit',outline:'none',
            background:'#fff',color:'#431407'}
        }),
        ce('button',{
          onClick:()=>{
            const u=urlDraft.trim();
            if(!u){setSyncErr('Please paste a Google Sheets URL.');return;}
            setSheetUrl(u);
            try{localStorage.setItem('hd_ldr_sheet_url',u);}catch(e){}
            handleSync(u);
          },
          disabled:syncing,
          style:{padding:'6px 20px',background:'#F97316',border:'none',borderRadius:20,
            color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}
        },syncing?'⟳ Syncing…':'🔄 Sync Now'),
        ce('button',{onClick:()=>{setShowSyncPanel(false);setSyncErr(null);},
          style:{padding:'6px 12px',background:'transparent',border:'1px solid #FED7AA',
            borderRadius:20,color:'#92400E',fontSize:11,cursor:'pointer',fontFamily:'inherit'}
        },'✕')
      ),
      syncErr&&ce('div',{style:{marginTop:8,padding:'6px 12px',background:'#fef2f2',
        border:'1px solid #fecaca',borderRadius:8,fontSize:11,color:'#dc2626',
        fontWeight:500,whiteSpace:'pre-wrap'}},
        '⚠ '+syncErr),
      lastSynced&&!syncErr&&ce('div',{style:{marginTop:6,fontSize:10,color:'#166534',fontFamily:'DM Mono'}},
        '✓ Last synced: '+lastSynced.toLocaleString()),
      ce('div',{style:{marginTop:6,fontSize:10,color:'#92400E'}},
        '💡 Share first: Google Sheets → File → Share → Anyone with the link → ',
        ce('strong',null,'Viewer'),' · No API key needed')
    ),
    /* Sync status bar */
    !showSyncPanel&&(syncErr||lastSynced)&&ce('div',{
      style:{background:syncErr?'#fef2f2':'#f0fdf4',
        borderBottom:'1px solid '+(syncErr?'#fecaca':'#bbf7d0'),
        padding:'5px 24px',display:'flex',alignItems:'center',gap:8,
        position:'sticky',top:54,zIndex:98}},
      syncErr
        ?ce('span',{style:{fontSize:10,color:'#dc2626',flex:1}},
            '⚠ Sync error: '+syncErr+' — ',
            ce('span',{style:{cursor:'pointer',textDecoration:'underline'},
              onClick:()=>{setUrlDraft(sheetUrl);setShowSyncPanel(true);}},
              'configure URL'))
        :ce('span',{style:{fontSize:10,color:'#166534'}},
            '✓ Synced from Google Sheets · '+lastSynced.toLocaleString()+
            ' · '+rows.length.toLocaleString()+' rows')
    ),

    /* Tab bar — white with orange underline */
    ce('div',{style:{background:'#fff',borderBottom:'2px solid #FFEDD5',
      position:'sticky',top:54,zIndex:99,boxShadow:'0 2px 8px rgba(249,115,22,.08)'}},
      ce('div',{style:{maxWidth:1600,margin:'0 auto',display:'flex',alignItems:'center',gap:0,padding:'0 24px'}},
        TABS.map(t=>ce('button',{key:t.id,className:'tab-pill'+(tab===t.id?' active':''),
          onClick:()=>setTab(t.id)},t.label))
      )
    ),

    /* Filter bar */
    ce('div',{style:{maxWidth:1600,margin:'0 auto',padding:'14px 24px 0'}},
      ce('div',{className:'filter-bar'},
        ce('label',null,'Filters'),
        ...[
          {k:'month',label:'Month',opts:['All',...months]},
          {k:'source',label:'Source',opts:['All',...sources]},
          {k:'state', label:'State', opts:['All',...states]},
        ].map(f=>ce('div',{key:f.k,style:{display:'flex',alignItems:'center',gap:5}},
          ce('span',{style:{fontSize:10,color:'#64748b',fontWeight:600}},f.label+':'),
          ce('select',{value:filters[f.k],onChange:e=>setFilters(p=>({...p,[f.k]:e.target.value}))},
            f.opts.map(o=>ce('option',{key:o,value:o},o))
          )
        )),
        (filters.month!=='All'||filters.source!=='All'||filters.state!=='All')&&
          ce('button',{
            onClick:()=>setFilters({month:'All',source:'All',state:'All'}),
            style:{padding:'4px 12px',fontSize:10,background:'#FFEDD5',border:'1px solid #FED7AA',
              borderRadius:20,cursor:'pointer',fontFamily:'inherit',color:'#C2410C',fontWeight:600}
          },'✕ Clear Filters'),
        ce('span',{style:{marginLeft:'auto',fontSize:10,fontFamily:'DM Mono',color:'#94a3b8'}},
          Nf(filtered.length)+' rows shown')
      )
    ),

    /* Tab content */
    ce('div',{style:{maxWidth:1600,margin:'0 auto',padding:'14px 24px 32px'}},
      tab==='overview'  && ce(OverviewTab,  {rows:filtered}),
      tab==='source'    && ce(SourceTab,    {rows:filtered}),
      tab==='ltxsrc'    && ce(LTSourceTab,{rows:filtered}),
      tab==='statexsrc' && ce(StateSourceTab,{rows:filtered}),
      tab==='attempts'  && ce(AttemptTab,   {rows:filtered}),
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(ce(App,null));
</script>
</body>
