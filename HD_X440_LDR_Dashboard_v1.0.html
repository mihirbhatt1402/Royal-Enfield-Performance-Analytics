<style>
*{box-sizing:border-box;margin:0;padding:0}

/* Heatmap helpers — apply via inline style background using these as reference */
.hm-cell{border-radius:4px;padding:2px 6px;display:inline-block;min-width:38px;text-align:center}
/* Progress / contribution bar */
.contrib-bar{position:relative;height:6px;border-radius:3px;background:var(--orange-100);
  overflow:hidden;width:100%;margin-top:3px}

/* Badges */

/* Progress */

  display:flex;align-items:center;gap:8px}

/* Cross-tab pastel cell groups */

<body>
<div id="root"></div>
<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════
   GOOGLE SHEETS SYNC CONFIG — H-D X440 LDR Dashboard
   ───────────────────────────────────────────────────────────────────
   Dashboard is hosted on GitHub Pages.
   LDR data syncs from Google Sheets — no API key needed.

   Setup:
   1. Import BikeDekho LDR Excel → Google Sheets
      (Google Sheets → File → Import → Upload)
   2. Share: File → Share → Anyone with the link → Viewer
   3. Paste the sheet URL below OR in the dashboard Sync panel
   ═══════════════════════════════════════════════════════════════════ */
const SHEETS_CONFIG = Object.freeze({
  LDR_SHEET_URL:         'https://docs.google.com/spreadsheets/d/1l2ApJonWSC6yK1GNwX0X8ZaygdhxQjdBGTF7cmHDfd4/edit?gid=0#gid=0',
  AUTO_SYNC_ON_LOAD:     true,  /* auto-fetch every time page opens  */
  AUTO_SYNC_INTERVAL_MS: 0,     /* 0=off; 300000=every 5 min         */
});

/* ── Google Sheets sync engine ───────────────────────────────────── */
/* Converts any Sheets browser URL → gviz/tq CSV export endpoint.
   CORS-friendly, no API key, works from GitHub Pages.               */
function sheetUrlToCsvUrl(url){
  const u=(url||'').trim();
  if(!u) throw new Error('Sheet URL is empty — paste it in the Sync panel.');
  const idM=u.match(/\/spreadsheets\/d\/([a-zA-Z0-9_\-]+)/);
  if(!idM) throw new Error('Not a valid Google Sheets URL.\nExpected: https://docs.google.com/spreadsheets/d/…');
  const id=idM[1];
  const gidM=u.match(/[#&?]gid=(\d+)/);
  const gid=gidM?gidM[1]:'0';
  return 'https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:csv&gid='+gid;
}

async function fetchSheetCsv(url){
  const csvUrl=sheetUrlToCsvUrl(url);
  let res;
  try{ res=await fetch(csvUrl,{cache:'no-store'}); }
  catch(e){ throw new Error('Network error — check internet connection. ('+e.message+')'); }
  if(!res.ok){
    if(res.status===401||res.status===403)
      throw new Error('Access denied.\nShare the sheet: File → Share → Anyone with the link → Viewer');
    if(res.status===404)
      throw new Error('Sheet not found. Double-check the URL.');
    throw new Error('Google Sheets fetch failed: HTTP '+res.status);
  }
  const text=await res.text();
  if(!text||text.trim().length<5)
    throw new Error('Sheet returned no data. Make sure it has rows and is publicly shared.');
  if(text.trim().startsWith('<'))
    throw new Error('Sheet returned HTML instead of CSV.\nShare it as "Anyone with the link → Viewer".');
  return text;
}

function parseCsvToRows(csvText){
  if(!window.XLSX) throw new Error('XLSX library not loaded — check internet connection.');
  const wb=window.XLSX.read(csvText,{type:'string',raw:false});
  const ws=wb.Sheets[wb.SheetNames[0]];
  return window.XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
}

const ce = React.createElement;
const {useState, useEffect, useMemo, useRef, useCallback} = React;

/* ── Status grouping ─────────────────────────────────────────────────────── */
const OPEN_SET   = new Set(['Follow Up','Yet to Dialed','No Response','Language Barrier']);
const NI_SET     = new Set(['Not Interested','Discard','Call Back-Discard']);
const INT_SET    = new Set(['Interested']);
const RETAIL_SET = new Set(['Already Bought X440']);

function getGroup(status){
  const s = String(status||'').trim();
  if(INT_SET.has(s))    return 'interested';
  if(RETAIL_SET.has(s)) return 'retailed';
  if(OPEN_SET.has(s))   return 'open';
  if(NI_SET.has(s))     return 'ni';
  return 'other';
}

/* ── Number formatter ───────────────────────────────────────────────────── */
function Nf(n){ return n==null||isNaN(n)?'—':Number(n).toLocaleString('en-IN'); }
function Pf(n,d=1){ return (n==null||isNaN(n))?'—':n.toFixed(d)+'%'; }

/* ── Parse raw XLSX rows into structured records ────────────────────────── */
/* ── Auto-detect mobile column by value pattern ───────────────────────────
   Scans up to 50 rows across all columns; picks the column where the most
   values are valid 10-digit Indian mobile numbers (start with 6-9).       */
function detectMobileCol(raw){
  if(!raw||!raw.length) return null;
  const sample=raw.slice(0,Math.min(50,raw.length));
  const allKeys=Object.keys(raw[0]);
  const scores={};
  const isMob=v=>{const d=String(v||'').replace(/\D/g,'').slice(-10);return d.length===10&&/^[6-9]/.test(d);};
  for(const k of allKeys){
    scores[k]=sample.filter(r=>isMob(r[k])).length;
  }
  const best=allKeys.reduce((a,b)=>scores[b]>scores[a]?b:a,allKeys[0]);
  return scores[best]>=3?best:null;  /* require at least 3 hits to be confident */
}

function parseRows(raw){
  const mobileColKey=detectMobileCol(raw);
  return raw.map(function(r){
    /* Flexible column key finder — exact match first, then substring fallback */
    const rKeys=Object.keys(r);
    function get(keys){
      for(const k of (Array.isArray(keys)?keys:[keys])){
        const kl=k.toLowerCase().replace(/\s+/g,' ').trim();
        for(const rk of rKeys){
          if(rk.toLowerCase().replace(/\s+/g,' ').trim()===kl) return String(r[rk]||'').trim();
        }
      }
      return '';
    }
    const month  = get('Month');
    const lt     = get('LT');
    const rawSrc = get('Source');
    const _rs = rawSrc.trim();
    const source = (!_rs||_rs==='#N/A'||_rs.toLowerCase()==='unknown'||_rs.toLowerCase()==='na'||_rs==='-')?'Organic':_rs;
    const city   = get('City');
    const state  = get('State');
    const status = get(['Status','Final Status']);
    const attRaw = get(['Dialler Attempts','Status Attempts','Status  Attempts']);
    const conn   = get('Connected');
    const dup    = get(['Duplicate/Unique','Duplicate']);
    const attempts = parseInt(attRaw)||0;
    const isConnected = (()=>{const c=(conn||'').toLowerCase().trim();return c==='yes'||c==='connected';})();
    const isDuplicate = (dup||'').toLowerCase()==='duplicate';

    /* Per-attempt statuses */
    const attStatuses=[];
    for(let i=1;i<=7;i++){
      const v = get('Status '+i);
      attStatuses.push(v);
    }

    const mobile = (mobileColKey?String(r[mobileColKey]||''):'')
      .replace(/\D/g,'').slice(-10);

    return {month,lt:lt||'Unknown',source:source||'Organic',city,state:state||'Unknown',
      status,group:getGroup(status),attempts,isConnected,isDuplicate,attStatuses,
      mobile,isMonthDup:false};
  }).filter(r=>r.month&&r.status);
}

/* ── Mark intra-month mobile duplicates ─────────────────────────────────── */
/* For each month, the FIRST occurrence of a mobile = unique; every subsequent
   occurrence of the same 10-digit number in that month gets isMonthDup=true.
   Rows with no parseable mobile (< 8 digits) are left as isMonthDup=false.  */
function markMonthDuplicates(rows){
  const byMonth={};
  for(const r of rows){
    if(!byMonth[r.month]) byMonth[r.month]=[];
    byMonth[r.month].push(r);
  }
  for(const mo of Object.keys(byMonth)){
    const seen=new Set();
    for(const r of byMonth[mo]){
      const mob=(r.mobile||'');
      if(mob.length>=8){
        r.isMonthDup=seen.has(mob);
        seen.add(mob);
      } else {
        r.isMonthDup=false;
      }
    }
  }
  return rows;
}

/* ── Aggregate rows into a metrics object ────────────────────────────────── */
function agg(rows){
  let total=0,unique=0,dup=0,monthDup=0,connected=0,interested=0,retailed=0,open=0,ni=0,other=0,
      attSum=0,attCnt=0;
  for(const r of rows){
    total++;
    if(r.isMonthDup) dup++; else unique++;
    monthDup=dup;
    if(r.isConnected) connected++;
    if(r.group==='interested') interested++;
    else if(r.group==='retailed') retailed++;
    else if(r.group==='open') open++;
    else if(r.group==='ni') ni++;
    else other++;
    if(r.attempts>0){attSum+=r.attempts;attCnt++;}
  }
  const dupPct       = total>0?(dup/total*100):0;
  const monthDupPct  = total>0?(monthDup/total*100):0;
  const connPct      = total>0?(connected/total*100):0;
  const convPct      = total>0?((interested+retailed)/total*100):0;
  const openPct      = total>0?(open/total*100):0;
  const l2eOnConn    = connected>0?(interested/connected*100):0;
  const avgAtt       = attCnt>0?(attSum/attCnt):0;
  return{total,unique,dup,dupPct,monthDup,monthDupPct,connected,connPct,interested,retailed,open,openPct,ni,other,convPct,l2eOnConn,avgAtt};
}

/* ── Attempt funnel: which attempt → Interested / NI ────────────────────── */
function calcAttemptFunnel(rows){
  const intByAtt  = Array(7).fill(0);
  const niByAtt   = Array(7).fill(0);
  for(const r of rows){
    let intDone=false, niDone=false;
    for(let i=0;i<7;i++){
      const s = r.attStatuses[i];
      if(!intDone && INT_SET.has(s)){ intByAtt[i]++; intDone=true; }
      if(!niDone && NI_SET.has(s)){ niByAtt[i]++;  niDone=true; }
    }
  }
  return{intByAtt,niByAtt};
}

/* ── Cross-tab builder ───────────────────────────────────────────────────── */
function crossTab(rows, rowKey, colKey){
  const rowKeys=[], colKeys=[], rowSet=new Set(), colSet=new Set();
  const cells={}; /* rowK → colK → [rows] */
  for(const r of rows){
    const rk = r[rowKey]||'Unknown';
    const ck = r[colKey]||'Unknown';
    rowSet.add(rk); colSet.add(ck);
    if(!cells[rk]) cells[rk]={};
    if(!cells[rk][ck]) cells[rk][ck]=[];
    cells[rk][ck].push(r);
  }
  rowSet.forEach(k=>rowKeys.push(k));
  colSet.forEach(k=>colKeys.push(k));
  rowKeys.sort(); colKeys.sort();
  return{rowKeys,colKeys,cells};
}

/* ── Color helpers ───────────────────────────────────────────────────────── */
function convBadge(pct){
  if(isNaN(pct)||pct===0) return ce('span',{className:'badge-gray'},'—');
  const cls = pct>=10?'badge-green':pct>=5?'badge-amber':'badge-red';
  return ce('span',{className:'badge '+cls},pct.toFixed(1)+'%');
}
function dupBadge(pct){
  if(isNaN(pct)||pct===0) return ce('span',{className:'badge-gray'},'0%');
  const cls = pct>=30?'badge-red':pct>=15?'badge-amber':'badge-green';
  return ce('span',{className:'badge '+cls},pct.toFixed(1)+'%');
}
function connBadge(pct){
  if(isNaN(pct)||pct===0) return ce('span',{className:'badge-gray'},'—');
  const cls = pct>=60?'badge-green':pct>=40?'badge-amber':'badge-red';
  return ce('span',{className:'badge '+cls},pct.toFixed(1)+'%');
}

/* ══════════════════════════════════════════════════════════════════════════
   OVERVIEW TAB
══════════════════════════════════════════════════════════════════════════ */
function OverviewTab({rows}){
  const m = useMemo(()=>agg(rows),[rows]);
  const {intByAtt,niByAtt} = useMemo(()=>calcAttemptFunnel(rows),[rows]);
  const chartRef = useRef();
  const chartInst = useRef();

  /* Source breakdown for mini chart */
  const srcBreak = useMemo(()=>{
    const map={};
    for(const r of rows){
      const s=r.source||'Organic';
      if(!map[s]) map[s]={total:0,interested:0};
      map[s].total++;
      if(r.group==='interested') map[s].interested++;
    }
    return Object.entries(map).sort((a,b)=>b[1].total-a[1].total);
  },[rows]);

  /* ── Insights computation ──────────────────────────────────────────────── */
  const insights=useMemo(()=>{
    const nR=rows; /* normalised at parse time */
    const srcs=[...new Set(nR.map(r=>r.source))].filter(Boolean).sort();

    const bySource={};
    for(const s of srcs){
      const sRows=nR.filter(r=>r.source===s);
      /* LT breakdown */
      const lts=[...new Set(sRows.map(r=>r.lt))].filter(Boolean);
      const ltM=lts.map(lt=>({lt,m:agg(sRows.filter(r=>r.lt===lt))}))
        .filter(x=>x.m.total>=5).sort((a,b)=>a.m.convPct-b.m.convPct);
      /* State breakdown */
      const sts=[...new Set(sRows.map(r=>r.state))].filter(Boolean);
      const stM=sts.map(st=>({state:st,m:agg(sRows.filter(r=>r.state===st))}))
        .filter(x=>x.m.total>=5).sort((a,b)=>a.m.convPct-b.m.convPct);
      bySource[s]={
        total:agg(sRows),
        worstLT:ltM[0]||null,
        bestLT:ltM[ltM.length-1]||null,
        worst5:stM.slice(0,5),
        best5:[...stM].reverse().slice(0,5),
      };
    }
    const srcSorted=srcs.map(s=>({src:s,...bySource[s]}))
      .filter(x=>x.total.total>=10)
      .sort((a,b)=>a.total.convPct-b.total.convPct);
    const dupSorted=[...srcSorted].sort((a,b)=>b.total.dupPct-a.total.dupPct);
    return{srcs,bySource,srcSorted,
      worstSrc:srcSorted[0]||null,
      bestSrc:srcSorted[srcSorted.length-1]||null,
      highDupSrc:dupSorted[0]||null};
  },[rows]);

  /* Attempt funnel chart */
  useEffect(()=>{
    const canvas = chartRef.current;
    if(!canvas||!window.Chart) return;
    if(chartInst.current) try{chartInst.current.destroy();}catch(e){}
    const labels = ['Att 1','Att 2','Att 3','Att 4','Att 5','Att 6','Att 7'];
    chartInst.current = new Chart(canvas,{
      type:'bar',
      data:{
        labels,
        datasets:[
          {label:'Interested',data:intByAtt,backgroundColor:'#16a34a88',borderColor:'#16a34a',borderWidth:1.5,borderRadius:3},
          {label:'Not Interested',data:niByAtt,backgroundColor:'#dc262655',borderColor:'#dc2626',borderWidth:1.5,borderRadius:3},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{position:'top',labels:{boxWidth:10,boxHeight:10,font:{size:10,family:'DM Mono, monospace'},color:'#475569'}},
          tooltip:{backgroundColor:'rgba(15,23,42,.92)',titleColor:'#f1f5f9',bodyColor:'#cbd5e1',padding:10,cornerRadius:8},
          datalabels:{display:false}
        },
        scales:{
          x:{grid:{color:'rgba(100,116,139,.1)'},ticks:{color:'#475569',font:{size:10}}},
          y:{grid:{color:'rgba(100,116,139,.1)'},ticks:{color:'#475569',font:{size:10}},beginAtZero:true}
        }
      }
    });
    return ()=>{try{if(chartInst.current)chartInst.current.destroy();}catch(e){}};
  },[intByAtt,niByAtt]);

  const months=[...new Set(rows.map(r=>r.month))].filter(Boolean).sort();

  /* Month-wise mobile duplicate breakdown */
  const mobileDupByMonth = useMemo(()=>{
    const moList=[...new Set(rows.map(r=>r.month))].filter(Boolean)
      .sort((a,b)=>monthSortKey(b)-monthSortKey(a));
    return moList.map(mo=>{
      const moRows=rows.filter(r=>r.month===mo);
      const total=moRows.length;
      const dups=moRows.filter(r=>r.isMonthDup).length;
      const uniq=total-dups;
      const pct=total>0?(dups/total*100):0;
      /* unique mobiles that appear 2+ times */
      const mobCount={};
      for(const r of moRows){
        const mob=r.mobile||'';
        if(mob.length>=8) mobCount[mob]=(mobCount[mob]||0)+1;
      }
      const dupMobiles=Object.values(mobCount).filter(c=>c>1).length;
      return{mo,total,dups,uniq,pct,dupMobiles};
    });
  },[rows]);

  const KPIs=[
    {label:'Total Leads',    value:Nf(m.total),     sub:months.join(' · '),                     color:'#F97316'},
    {label:'Unique Leads',   value:Nf(m.unique),    sub:'Duplicates: '+Nf(m.dup),              color:'#2563eb'},
    {label:'Duplicity %',    value:m.dupPct.toFixed(1)+'%', sub:'of total leads',              color:'#d97706'},
    {label:'Mobile Dups',    value:Nf(m.monthDup),  sub:'Dup%: '+m.monthDupPct.toFixed(1)+'% (same mob+month)', color:'#be185d'},
    {label:'Connected',      value:Nf(m.connected), sub:'Conn Rate: '+m.connPct.toFixed(1)+'%', color:'#0891b2'},
    {label:'Interested',     value:Nf(m.interested),sub:'Retailed: '+Nf(m.retailed),           color:'#16a34a'},
    {label:'Open',           value:Nf(m.open),      sub:'Open%: '+m.openPct.toFixed(1)+'%',     color:'#7c3aed'},
    {label:'Not Interested', value:Nf(m.ni),        sub:'Discard + NI + CB-Discard',            color:'#dc2626'},
    {label:'L2E % (Interest%)', value:m.convPct.toFixed(1)+'%', sub:'Interested ÷ Total Leads',  color:'#15803d'},
    {label:'Avg Attempts',   value:m.avgAtt.toFixed(2), sub:'per lead',                        color:'#374151'},
  ];

  return ce('div',{className:'fade-up'},
    /* KPI strip */
    ce('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:10,marginBottom:20}},
      KPIs.map((k,i)=>ce('div',{key:i,className:'kpi'},
        ce('div',{style:{position:'absolute',top:0,left:0,right:0,height:3,background:k.color,borderRadius:'12px 12px 0 0'}}),
        ce('div',{className:'kpi-label'},k.label),
        ce('div',{className:'kpi-value',style:{fontSize:k.value.length>7?16:20,color:k.color}},k.value),
        ce('div',{className:'kpi-sub'},k.sub)
      ))
    ),

    /* Status distribution + Attempt funnel */
    ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1.6fr',gap:14,marginBottom:14}},
      /* Status bar */
      ce('div',{className:'card',style:{padding:'16px 18px'}},
        ce('div',{className:'section-title'},'Status Distribution'),
        [
          {label:'Interested',  val:m.interested, color:'#16a34a', bg:'#f0fdf4'},
          {label:'Retailed',    val:m.retailed,   color:'#0891b2', bg:'#ecfeff'},
          {label:'Open',        val:m.open,        color:'#7c3aed', bg:'#faf5ff'},
          {label:'Not Interest',val:m.ni,          color:'#dc2626', bg:'#fef2f2'},
          {label:'Other',       val:m.other,       color:'#94a3b8', bg:'#FFF7ED'},
        ].map((s,i)=>{
          const pct = m.total>0?(s.val/m.total*100):0;
          return ce('div',{key:i,style:{marginBottom:10}},
            ce('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:3}},
              ce('span',{style:{fontSize:11,fontWeight:600,color:s.color}},s.label),
              ce('span',{style:{fontSize:11,fontFamily:'DM Mono',color:'#374151'}},
                Nf(s.val)+' ('+pct.toFixed(1)+'%)')
            ),
            ce('div',{style:{height:6,background:'#f1f5f9',borderRadius:6,overflow:'hidden'}},
              ce('div',{style:{height:'100%',width:pct+'%',background:s.color,borderRadius:6,transition:'width .4s ease'}})
            )
          );
        })
      ),
      /* Attempt funnel chart */
      ce('div',{className:'card',style:{padding:'16px 18px'}},
        ce('div',{className:'section-title'},'Status Change by Attempt #'),
        ce('div',{style:{height:220,position:'relative'}},
          ce('canvas',{ref:chartRef})
        )
      )
    ),

    /* Source quick summary */
    ce('div',{className:'card',style:{padding:'16px 18px'}},
      ce('div',{className:'section-title'},'Source Summary'),
      ce('div',{className:'scroll-x'},
        ce('table',null,
          ce('thead',null,
            ce('tr',null,
              ce('th',{className:'left',style:{minWidth:140}},'Source'),
              ce('th',null,'Total'),
              ce('th',{style:{background:'#14532d'}},'Interested'),
              ce('th',{style:{background:'#14532d'}},'L2E%'),
              ce('th',null,'Connected'),
              ce('th',null,'Connectivity%'),
              ce('th',{style:{background:'#064e3b'}},'L2E% on Connected'),
              ce('th',{style:{background:'#4c1d95'}},'Open%'),
              ce('th',{style:{background:'#7c2d12'}},'Duplicity%'),
              ce('th',null,'Attempts')
            )
          ),
          ce('tbody',null,
            srcBreak.map(([src,_],i)=>{
              const r=rows.filter(x=>x.source===src);
              const m2=agg(r);
              return ce('tr',{key:i},
                ce('td',{className:'label'},src),
                ce('td',null,Nf(m2.total)),
                ce('td',{style:{color:'#16a34a',fontWeight:700}},Nf(m2.interested)),
                ce('td',null,convBadge(m2.convPct)),
                ce('td',null,Nf(m2.connected)),
                ce('td',null,connBadge(m2.connPct)),
                ce('td',null,convBadge(m2.l2eOnConn)),
                ce('td',null,ce('span',{className:'badge badge-'+(m2.openPct>=20?'red':m2.openPct>=10?'amber':'green')},m2.openPct.toFixed(1)+'%')),
                ce('td',null,dupBadge(m2.dupPct)),
                ce('td',null,m2.avgAtt>0?m2.avgAtt.toFixed(2):'—')
              );
            }),
            /* Grand Total */
            ce('tr',{className:'total-row'},
              ce('td',{className:'label',style:{background:'#7C2D12',color:'#fed7aa'}},'∑ Grand Total'),
              ce('td',null,Nf(m.total)),
              ce('td',{style:{color:'#86efac',fontWeight:700}},Nf(m.interested)),
              ce('td',null,ce('span',{style:{color:'#86efac',fontWeight:700}},m.convPct.toFixed(1)+'%')),
              ce('td',null,Nf(m.connected)),
              ce('td',null,ce('span',{style:{color:'#67e8f9',fontWeight:700}},m.connPct.toFixed(1)+'%')),
              ce('td',null,ce('span',{style:{color:'#6ee7b7',fontWeight:700}},m.l2eOnConn.toFixed(1)+'%')),
              ce('td',null,ce('span',{style:{color:'#c4b5fd',fontWeight:700}},m.openPct.toFixed(1)+'%')),
              ce('td',null,ce('span',{style:{color:'#fbbf24',fontWeight:700}},m.dupPct.toFixed(1)+'%')),
              ce('td',null,ce('span',{style:{color:'#e2e8f0'}},m.avgAtt.toFixed(2)))
            )
          )
        )

    /* ── Mobile Duplicate Analysis ───────────────────────────────────── */
    ce('div',{className:'card',style:{padding:'16px 18px',marginTop:14}},
      ce('div',{className:'section-title'},'📱 Mobile Duplicate Analysis — Same Number in Same Month'),
      ce('div',{style:{fontSize:10,color:'#92400E',marginBottom:10}},

      ce('div',{className:'scroll-x'},
        ce('table',null,
          ce('thead',null,
            ce('tr',null,

              ce('th',null,'Unique'),
              ce('th',{style:{background:'#9d174d'}},'Mobile Dups'),
              ce('th',{style:{background:'#9d174d'}},'Dup %'),
              ce('th',null,'Dup Mobiles'),
              ce('th',null,'Avg Dups / Mobile')

          ce('tbody',null,
            mobileDupByMonth.map((row,i)=>

                ce('td',{className:'label'},row.mo),
                ce('td',null,Nf(row.total)),
                ce('td',{style:{color:'#16a34a',fontWeight:600}},Nf(row.uniq)),
                ce('td',{style:{color:'#be185d',fontWeight:700}},Nf(row.dups)),
                ce('td',null,dupBadge(row.pct)),
                ce('td',null,Nf(row.dupMobiles)),
                ce('td',null,row.dupMobiles>0?(row.dups/row.dupMobiles).toFixed(1):'—')
              )
            ),
            /* Grand Total */
            (()=>{
              const totDups=mobileDupByMonth.reduce((s,r)=>s+r.dups,0);
              const totTotal=mobileDupByMonth.reduce((s,r)=>s+r.total,0);
              const totMobs=mobileDupByMonth.reduce((s,r)=>s+r.dupMobiles,0);
              const totPct=totTotal>0?(totDups/totTotal*100):0;
              return ce('tr',{className:'total-row grand-total-row'},
                ce('td',{className:'label',style:{position:'sticky',left:0,zIndex:6}},'∑ Grand Total'),
                ce('td',null,Nf(totTotal)),
                ce('td',null,Nf(totTotal-totDups)),
                ce('td',null,Nf(totDups)),
                ce('td',null,totPct.toFixed(1)+'%'),
                ce('td',null,Nf(totMobs)),
                ce('td',null,totMobs>0?(totDups/totMobs).toFixed(1):'—')
              );
            })()
          )
        )
      )
    ),

    /* ── Insights Section ─────────────────────────────────────────────── */
    ce('div',{style:{marginTop:16}},

      /* Section header */
      ce('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:12}},
        ce('div',{style:{width:4,height:18,background:'#F97316',borderRadius:2}}),
        ce('span',{style:{fontSize:13,fontWeight:800,color:'#7C2D12',letterSpacing:'-.02em'}},
          '💡 Performance Insights'),
        ce('span',{style:{fontSize:10,color:'#C2410C',background:'#FFEDD5',
          padding:'2px 10px',borderRadius:20,fontWeight:600}},
          'Based on L2E% · Min 5 leads threshold · #N/A merged into Organic')
      ),

      /* ── Row 1: Worst Source | Best Source | Highest Duplicity ─────── */
      ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}},

        /* Worst Source */
        ce('div',{className:'card',style:{padding:'14px 18px',borderLeft:'4px solid #dc2626',background:'#fff'}},
          ce('div',{style:{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',
            color:'#dc2626',marginBottom:8,display:'flex',alignItems:'center',gap:5}},
            '❶  Worst Performing Source'),
          insights.worstSrc
            ?ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}},
                ce('div',null,
                  ce('div',{style:{fontSize:20,fontWeight:800,color:'#111827',letterSpacing:'-.02em'}},
                    insights.worstSrc.src),
                  ce('div',{style:{fontSize:11,color:'#6b7280',marginTop:2}},
                    Nf(insights.worstSrc.total.total)+' leads · Interested: '+Nf(insights.worstSrc.total.interested))
                ),
                ce('div',{style:{textAlign:'right'}},
                  ce('div',{style:{fontSize:28,fontWeight:900,color:'#dc2626',fontFamily:'DM Mono'}},
                    insights.worstSrc.total.convPct.toFixed(1)+'%'),
                  ce('div',{style:{fontSize:9,color:'#dc2626',fontWeight:700,letterSpacing:'.05em'}},
                    'L2E%')
                )
              )
            :ce('span',{style:{color:'#9ca3af',fontSize:11}},'Insufficient data')
        ),

        /* Best Source */
        ce('div',{className:'card',style:{padding:'14px 18px',borderLeft:'4px solid #16a34a',background:'#fff'}},
          ce('div',{style:{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',
            color:'#16a34a',marginBottom:8,display:'flex',alignItems:'center',gap:5}},
            '⑤  Top Performing Source'),
          insights.bestSrc
            ?ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}},
                ce('div',null,
                  ce('div',{style:{fontSize:20,fontWeight:800,color:'#111827',letterSpacing:'-.02em'}},
                    insights.bestSrc.src),
                  ce('div',{style:{fontSize:11,color:'#6b7280',marginTop:2}},
                    Nf(insights.bestSrc.total.total)+' leads · Interested: '+Nf(insights.bestSrc.total.interested))
                ),
                ce('div',{style:{textAlign:'right'}},
                  ce('div',{style:{fontSize:28,fontWeight:900,color:'#16a34a',fontFamily:'DM Mono'}},
                    insights.bestSrc.total.convPct.toFixed(1)+'%'),
                  ce('div',{style:{fontSize:9,color:'#16a34a',fontWeight:700,letterSpacing:'.05em'}},
                    'L2E%')
                )
              )
            :ce('span',{style:{color:'#9ca3af',fontSize:11}},'Insufficient data')
        ),

        /* Highest Duplicity Source */
        ce('div',{className:'card',style:{padding:'14px 18px',borderLeft:'4px solid #d97706',background:'#fff'}},
          ce('div',{style:{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',
            color:'#d97706',marginBottom:8,display:'flex',alignItems:'center',gap:5}},
            '⚠  Highest Source Duplicity'),
          insights.highDupSrc
            ?ce('div',null,
                ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}},
                  ce('div',null,
                    ce('div',{style:{fontSize:20,fontWeight:800,color:'#111827',letterSpacing:'-.02em'}},
                      insights.highDupSrc.src),
                    ce('div',{style:{fontSize:11,color:'#6b7280',marginTop:2}},
                      Nf(insights.highDupSrc.total.total)+' leads · Duplicates: '+Nf(insights.highDupSrc.total.dup))
                  ),
                  ce('div',{style:{textAlign:'right'}},
                    ce('div',{style:{fontSize:28,fontWeight:900,color:'#d97706',fontFamily:'DM Mono'}},
                      insights.highDupSrc.total.dupPct.toFixed(1)+'%'),
                    ce('div',{style:{fontSize:9,color:'#d97706',fontWeight:700,letterSpacing:'.05em'}},
                      'DUPLICITY%')
                  )
                ),
                ce('div',{style:{marginTop:10,display:'flex',gap:16,flexWrap:'wrap'}},
                  [{label:'Unique',val:Nf(insights.highDupSrc.total.unique),c:'#16a34a'},
                   {label:'Duplicate',val:Nf(insights.highDupSrc.total.dup),c:'#dc2626'},
                   {label:'L2E%',val:insights.highDupSrc.total.convPct.toFixed(1)+'%',c:'#2563eb'},
                  ].map((k,i)=>ce('div',{key:i},
                    ce('div',{style:{fontSize:8,fontWeight:700,textTransform:'uppercase',
                      letterSpacing:'.07em',color:'#9ca3af'}},k.label),
                    ce('div',{style:{fontSize:13,fontWeight:700,color:k.c,fontFamily:'DM Mono'}},k.val)
                  ))
                )
              )
            :ce('span',{style:{color:'#9ca3af',fontSize:11}},'Insufficient data')
        )
      ),

      /* ── Row 2: Worst LT vs Best LT at source level ─────────────────── */
      ce('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}},

        /* Worst LT per source */
        ce('div',{className:'card',style:{padding:'14px 18px',borderLeft:'4px solid #dc2626'}},
          ce('div',{style:{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',
            color:'#dc2626',marginBottom:10}},'❷  Worst Performing Lead Type — by Source'),
          ce('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:11}},
            ce('thead',null,
              ce('tr',null,
                ce('th',{style:{background:'#7C2D12',color:'#fff',padding:'5px 8px',textAlign:'left',fontSize:9,fontWeight:700,letterSpacing:'.06em'}},'Source'),
                ce('th',{style:{background:'#7C2D12',color:'#fff',padding:'5px 8px',textAlign:'center',fontSize:9,fontWeight:700,letterSpacing:'.06em'}},'LT'),
                ce('th',{style:{background:'#7C2D12',color:'#fff',padding:'5px 8px',textAlign:'right',fontSize:9,fontWeight:700,letterSpacing:'.06em'}},'Leads'),
                ce('th',{style:{background:'#7C2D12',color:'#fff',padding:'5px 8px',textAlign:'right',fontSize:9,fontWeight:700,letterSpacing:'.06em'}},'L2E%'),

            ce('tbody',null,
              insights.srcs.map((s,i)=>{

                  ce('td',{style:{padding:'5px 8px',fontWeight:600,color:'#431407',borderBottom:'1px solid #FFEDD5'}},s),

                  ce('td',{style:{padding:'5px 8px',textAlign:'right',fontFamily:'DM Mono',borderBottom:'1px solid #FFEDD5'}},e?Nf(e.m.interested):'—')

        ce('div',{className:'card',style:{padding:'14px 18px',borderLeft:'4px solid #16a34a'}},

                ce('th',{style:{background:'#7C2D12',color:'#fff',padding:'5px 8px',textAlign:'left',fontSize:9,fontWeight:700,letterSpacing:'.06em'}},'Source'),
                ce('th',{style:{background:'#7C2D12',color:'#fff',padding:'5px 8px',textAlign:'center',fontSize:9,fontWeight:700,letterSpacing:'.06em'}},'LT'),
                ce('th',{style:{background:'#7C2D12',color:'#fff',padding:'5px 8px',textAlign:'right',fontSize:9,fontWeight:700,letterSpacing:'.06em'}},'Leads'),
                ce('th',{style:{background:'#7C2D12',color:'#fff',padding:'5px 8px',textAlign:'right',fontSize:9,fontWeight:700,letterSpacing:'.06em'}},'L2E%'),

/* Parse "MMM-YY" / "Mon-YYYY" / date-ish month strings into a sortable key (latest first) */
function monthSortKey(m){
  const MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const s=String(m||'').trim();
  const match=s.match(/([A-Za-z]{3,})[\s\-\/']?(\d{2,4})/);
  if(match){
    const mon=MONTHS[match[1].slice(0,3).toLowerCase()];
    let yr=parseInt(match[2],10);
    if(yr<100) yr+=2000;
    if(mon!==undefined) return yr*12+mon;
  }
  return -Infinity; /* unparseable months sink to bottom */
}

  /* ── Month-wise breakdown — latest month first ─────────────────────────── */
  const months=useMemo(()=>
    [...new Set(rows.map(r=>r.month))].filter(Boolean)
      .sort((a,b)=>monthSortKey(b)-monthSortKey(a))
  ,[rows]);

  const monthlyTables=useMemo(()=>months.map(mo=>{

        ]
      },

        }

    return ()=>{try{if(chartInst.current)chartInst.current.destroy();}catch(e){}};

  /* Reusable table renderer — used for overall + each month */
  function renderSourceTable(title, data, grand, key){

      ),

/* ══════════════════════════════════════════════════════════════════════════
   GENERIC CROSS-TAB COMPONENT  (used for LT×Source and State×Source)
══════════════════════════════════════════════════════════════════════════ */
function CrossTabView({rows, rowKey, colKey, rowLabel, limit=50}){
  const [expanded, setExpanded] = useState({});
  const [showAll, setShowAll] = useState(false);

  const {rowKeys,colKeys,cells}=useMemo(()=>crossTab(rows,rowKey,colKey),[rows,rowKey,colKey]);

  /* Sort rows by total leads desc */
  const sortedRows=useMemo(()=>[...rowKeys].sort((a,b)=>{
    const totA=colKeys.reduce((s,c)=>s+(cells[a]?.[c]?.length||0),0);
    const totB=colKeys.reduce((s,c)=>s+(cells[b]?.[c]?.length||0),0);
    return totB-totA;
  }),[rowKeys,colKeys,cells]);

  const displayRows = showAll?sortedRows:sortedRows.slice(0,limit);

  /* Grand totals */
  const grandM = useMemo(()=>agg(rows),[rows]);
  /* Per-column totals */
  const colTotals = useMemo(()=>{
    const t={};
    for(const c of colKeys) t[c]=agg(rows.filter(r=>r[colKey]===c));
    return t;
  },[rows,colKeys,colKey]);

  /* Cols: for each colKey value → sub-cols: Leads, Int, Open%, Dup%, AvgAtt */
  /* We render a compact table: rowLabel | [per col: Tot / Int / Open% / Dup% / AvgAtt] | Total */
  const SC_COLORS=['#2563eb','#d97706','#16a34a','#7c3aed']; /* source colours */

  return ce('div',{className:'fade-up'},
    ce('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      /* Table */
      ce('div',{className:'scroll-x'},
        ce('table',null,
          ce('thead',null,
            /* Row 1: group headers */
            ce('tr',null,
              ce('th',{rowSpan:2,className:'left',style:{minWidth:180,position:'sticky',left:0,zIndex:4,top:0,background:'#7C2D12'}},rowLabel),
              colKeys.map((c,i)=>ce('th',{key:c,colSpan:5,style:{background:SC_COLORS[i%4],borderLeft:'2px solid rgba(255,255,255,.25)',borderRight:'2px solid rgba(255,255,255,.25)'}},c)),
              ce('th',{colSpan:5,style:{background:'#92400E',borderLeft:'2px solid rgba(255,255,255,.3)'}},'∑ Total')
            ),
            /* Row 2: sub-headers */
            ce('tr',null,
              [...colKeys,'__total__'].map((c,ci)=>[
                ce('th',{key:c+'_t',className:'sub'},'Leads'),
                ce('th',{key:c+'_i',className:'sub',style:{color:'#86efac'}},'Int'),
                ce('th',{key:c+'_o',className:'sub',style:{color:'#c4b5fd'}},'Open%'),
                ce('th',{key:c+'_d',className:'sub',style:{color:'#fbbf24'}},'Dup%'),
                ce('th',{key:c+'_a',className:'sub',style:{color:'#67e8f9'}},'AvgAtt'),
              ])
            )
          ),
          ce('tbody',null,
            /* Grand total first */
            ce('tr',{className:'total-row'},
              ce('td',{className:'label',style:{background:'#7C2D12',color:'#fed7aa'}},'∑ Grand Total'),
              [...colKeys,'__total__'].map((c)=>{
                const m = c==='__total__'?grandM:colTotals[c]||agg([]);
                return[
                  ce('td',{key:c+'_t',style:{color:'#e2e8f0'}},Nf(m.total)),
                  ce('td',{key:c+'_i',style:{color:'#86efac',fontWeight:700}},Nf(m.interested)),
                  ce('td',{key:c+'_o'},ce('span',{style:{color:'#c4b5fd',fontWeight:700}},m.total>0?m.openPct.toFixed(1)+'%':'—')),
                  ce('td',{key:c+'_d'},ce('span',{style:{color:'#fbbf24',fontWeight:700}},m.total>0?m.dupPct.toFixed(1)+'%':'—')),
                  ce('td',{key:c+'_a'},ce('span',{style:{color:'#67e8f9'}},m.avgAtt>0?m.avgAtt.toFixed(1):'—')),
                ];
              })
            ),
            ce('tr',{key:'__div__'},ce('td',{colSpan:1+colKeys.length*5+5,style:{padding:0,background:'#92400E',height:2}})),

            displayRows.map((rk,ri)=>{
              const rowTotal=agg(rows.filter(r=>r[rowKey]===rk));
              return ce('tr',{key:rk,style:{background:ri%2===0?'#fff':'#FFF7ED'}},
                ce('td',{className:'label'},rk),
                [...colKeys,'__total__'].map((c)=>{
                  const cellRows=c==='__total__'?rows.filter(r=>r[rowKey]===rk):(cells[rk]?.[c]||[]);
                  const m=agg(cellRows);
                  return[
                    ce('td',{key:c+'_t'},m.total?Nf(m.total):'—'),
                    ce('td',{key:c+'_i',style:{color:'#16a34a',fontWeight:m.interested>0?700:400}},m.interested?Nf(m.interested):'—'),
                    ce('td',{key:c+'_o'},m.total>0?ce('span',{className:'badge badge-'+(m.openPct>=20?'red':m.openPct>=10?'amber':'green')},m.openPct.toFixed(1)+'%'):ce('span',{className:'badge-gray'},'—')),
                    ce('td',{key:c+'_d'},m.total>0?dupBadge(m.dupPct):ce('span',{className:'badge-gray'},'—')),
                    ce('td',{key:c+'_a'},m.avgAtt>0?m.avgAtt.toFixed(1):'—'),
                  ];
                })
              );
            }),
            sortedRows.length>limit&&!showAll&&
              ce('tr',{key:'__more__'},
                ce('td',{colSpan:1+colKeys.length*5+5,style:{textAlign:'center',padding:'10px',background:'#FFF7ED'}},
                  ce('button',{
                    onClick:()=>setShowAll(true),
                    style:{padding:'5px 20px',border:'1px solid #e2e8f0',borderRadius:20,
                      background:'#fff',cursor:'pointer',fontSize:11,color:'#2563eb',fontFamily:'inherit'}
                  },'Show all '+(sortedRows.length-limit)+' more rows ▾')
                )
              )
          )
        )
      )
    )
  );
}

function LTSourceTab({rows}){
  /* Merge #N/A → Organic */
  const normRows=useMemo(()=>rows,[rows]);

  const sources=useMemo(()=>[...new Set(normRows.map(r=>r.source))].filter(Boolean).sort(),[normRows]);
  const lts    =useMemo(()=>[...new Set(normRows.map(r=>r.lt))].filter(Boolean),[normRows]);

  const sortedLTs=useMemo(()=>[...lts].sort((a,b)=>
    normRows.filter(r=>r.lt===b).length - normRows.filter(r=>r.lt===a).length
  ),[lts,normRows]);

  const grandM   =useMemo(()=>agg(normRows),[normRows]);
  const srcTotals=useMemo(()=>{
    const t={};
    for(const s of sources) t[s]=agg(normRows.filter(r=>r.source===s));
    return t;
  },[normRows,sources]);

  /* ── Month-wise breakdown — latest month first ─────────────────────────── */
  const months=useMemo(()=>
    [...new Set(normRows.map(r=>r.month))].filter(Boolean)
      .sort((a,b)=>monthSortKey(b)-monthSortKey(a))
  ,[normRows]);

  /* Pastel cell bg per source group */
  const CELL_BG={'__total__':'#FFF7ED','Adwords':'#EFF6FF','Organic':'#F0FDF4','Non MS':'#FAF5FF'};
  function getCellBg(src){return CELL_BG[src]||'#FFF8F1';}

  /* 7-column renderer — plain black, center-aligned, no badges */
  const TD={padding:'4px 6px',border:'1px solid #FFEDD5',fontSize:10,textAlign:'center',
    fontFamily:'DM Mono,monospace',verticalAlign:'middle'};
  const TDL={...TD,textAlign:'left',fontFamily:'inherit',fontWeight:600,color:'#431407',
    background:'#fff',position:'sticky',left:0,zIndex:1,borderRight:'2px solid #FED7AA'};

  const TDTl={...TDT,textAlign:'left',fontFamily:'inherit',color:'#fed7aa',borderRight:'2px solid #92400E'};

  function mk(m,pfx,dark=false,cellBg='#fff'){
    const bg  = dark?'#7C2D12':cellBg;
    const tc  = dark?'#fff7ed':'#111827';
    const dim = dark?'#fed7aa88':'#6b7280';
    const b   = {...TD,background:bg};

      ce('td',{key:pfx+'t',style:{...b,color:tc,fontWeight:700,borderLeft:'2px solid rgba(0,0,0,.06)'}},
        m.total?Nf(m.unique):'—'),
      ce('td',{key:pfx+'i',style:{...b,color:tc,fontWeight:m.interested?600:400}},
        m.interested?Nf(m.interested):'—'),
      ce('td',{key:pfx+'l',style:{...b,color:m.total>0?tc:dim}},
        m.total>0?m.convPct.toFixed(1)+'%':'—'),

        m.total>0?m.connPct.toFixed(1)+'%':'—'),
      ce('td',{key:pfx+'lc',style:{...b,color:m.connected>0?tc:dim}},
        m.connected>0?m.l2eOnConn.toFixed(1)+'%':'—'),
      ce('td',{key:pfx+'op',style:{...b,color:m.total>0?tc:dim}},
        m.total>0?m.openPct.toFixed(1)+'%':'—'),
      ce('td',{key:pfx+'dp',style:{...b,color:m.total>0?tc:dim}},
        m.total>0?m.dupPct.toFixed(1)+'%':'—'),
    ];
  }

  /* Sub-header labels */
  const SUB=[
    {l:'Uniq Leads',t:'Unique Leads = Distinct mobile numbers in this month'},
    {l:'Int',       t:'Interested'},
    {l:'L2E%',      t:'L2E% = Interested ÷ Total'},
    {l:'Conn%',     t:'Connectivity% = Connected ÷ Total'},
    {l:'L2E↑Conn',  t:'L2E% on Connected = Interested ÷ Connected'},
    {l:'Open%',     t:'Open% = Open ÷ Total'},
    {l:'Dup%',      t:'Duplicity% = Duplicates ÷ Total'},
  ];

    letterSpacing:'.05em',color:'#fff',background:'#7C2D12',textAlign:'center',
    border:'1px solid rgba(255,255,255,.12)',whiteSpace:'nowrap',position:'sticky',top:0,zIndex:2};
